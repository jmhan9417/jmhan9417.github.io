<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Veeva Master Class Interview Simulator | R&D Business Consultant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#1a3a63; --navy-deep:#12294a; --ink:#1f2733; --slate:#5a6675;
    --line:#e2e6ec; --paper:#f6f7f9; --card:#ffffff;
    --accent:#1d4ed8; --accent-soft:#eaf0fe;
    --green:#127a4b; --green-soft:#e5f4ec;
    --amber:#9a6a12; --amber-soft:#fbf1dd;
    --red:#a52833; --red-soft:#fbe9ea;
    --shadow:0 1px 2px rgba(16,24,40,.05), 0 8px 24px rgba(16,24,40,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:"IBM Plex Serif",Georgia,serif;color:var(--navy-deep);line-height:1.25;margin:0}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit}

  /* Header */
  header.top{position:sticky;top:0;z-index:40;color:#eaf0f8;border-bottom:1px solid #0d1f38;background:linear-gradient(180deg,#12294a,#173257)}
  .top-inner{max-width:1180px;margin:0 auto;padding:14px 22px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between}
  .brand{display:flex;flex-direction:column;gap:2px}
  .brand h1{color:#fff;font-size:19px;font-weight:600;letter-spacing:.2px}
  .brand span{color:#a9bcd6;font-size:12.5px;font-weight:500}
  .meters{display:flex;gap:16px;flex-wrap:wrap}
  .meter{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:9px 14px;min-width:186px}
  .meter{min-width:196px}
  .meter .mlabel{display:flex;gap:12px;justify-content:space-between;align-items:baseline;font-size:11px;color:#c4d3e8;letter-spacing:.3px;text-transform:uppercase;font-weight:600;white-space:nowrap}
  .meter .mval{font-size:15px;color:#fff;font-weight:700;font-family:"IBM Plex Serif",serif}
  .bar{height:7px;background:rgba(255,255,255,.14);border-radius:99px;margin-top:7px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .bar.k > i{background:linear-gradient(90deg,#5aa9ff,#8ec5ff)}
  .bar.r > i{background:linear-gradient(90deg,#43c78a,#8be0b4)}

  /* Layout */
  .wrap{max-width:1180px;margin:0 auto;padding:22px;display:grid;grid-template-columns:248px 1fr;gap:22px;align-items:start}
  nav.side{position:sticky;top:96px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow)}
  nav.side .navhdr{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--slate);font-weight:700;padding:8px 10px 4px}
  .navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:transparent;color:var(--ink);padding:9px 10px;border-radius:9px;font-size:13.5px;cursor:pointer;font-weight:500;transition:background .15s}
  .navbtn:hover{background:#f1f4f8}
  .navbtn.active{background:var(--accent-soft);color:var(--navy-deep);font-weight:600}
  .navbtn .num{flex:0 0 22px;height:22px;border-radius:6px;background:#eef1f5;color:var(--slate);font-size:11.5px;font-weight:700;display:grid;place-items:center;font-family:"IBM Plex Serif",serif}
  .navbtn.active .num{background:var(--accent);color:#fff}
  .navbtn .dot{margin-left:auto;font-size:12px;color:var(--green)}

  main{min-width:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;margin-bottom:20px}
  .eyebrow{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;color:var(--accent)}
  .card h2{font-size:23px;margin:6px 0 4px}
  .card .sub{color:var(--slate);font-size:14px;margin-bottom:2px}

  .brief{background:linear-gradient(180deg,#fbfcfe,#f3f6fb);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;padding:18px 20px;margin:18px 0 6px}
  .brief .btag{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy);margin-bottom:8px}
  .brief p{margin:0 0 10px;font-size:14.5px;color:#2b3542}
  .brief p:last-child{margin-bottom:0}
  .brief .we{background:#fff;border:1px dashed var(--line);border-radius:9px;padding:12px 14px;font-size:13.8px}
  .brief .we b{color:var(--navy-deep)}

  .concept-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .chip{background:#eef1f5;color:#3a4657;border:1px solid var(--line);border-radius:99px;padding:4px 11px;font-size:12px;font-weight:600;cursor:pointer}
  .chip:hover{background:var(--accent-soft);border-color:#c9d9fb}

  .drill{border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:16px;background:#fff}
  .drill .dhead{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .kind{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:6px}
  .kind.know{background:var(--accent-soft);color:#1442ad}
  .kind.scen{background:#ece7fb;color:#5a3fb0}
  .qmeta{margin-left:auto;font-size:12px;color:var(--slate)}
  .speaker{font-size:12.5px;color:var(--slate);font-style:italic;margin:2px 0 8px}
  .qtext{font-size:15.5px;font-weight:600;color:var(--ink);margin:6px 0 14px}
  .qtext.scenq{font-weight:600}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{position:relative;text-align:left;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:12px 14px 12px 42px;font-size:14px;color:#2b3542;cursor:pointer;transition:border-color .15s,background .15s;width:100%}
  .opt:hover{border-color:#c9d9fb;background:#fbfcff}
  .opt .mk{position:absolute;left:12px;top:12px;width:20px;height:20px;border-radius:50%;border:1.5px solid #c4ccd6;display:grid;place-items:center;font-size:12px;font-weight:700;color:#8a94a2;background:#fff}
  .opt.chosen{border-color:var(--accent)}
  .opt.disabled{cursor:default}
  .opt.reveal-strong{border-color:var(--green);background:var(--green-soft)}
  .opt.reveal-weak{border-color:var(--amber);background:var(--amber-soft)}
  .opt.reveal-trap{border-color:var(--red);background:var(--red-soft)}
  .opt.reveal-correct{border-color:var(--green);background:var(--green-soft)}
  .opt.reveal-wrong{border-color:var(--red);background:var(--red-soft)}
  .opt .mk.strong,.opt .mk.correct{border-color:var(--green);color:#fff;background:var(--green)}
  .opt .mk.weak{border-color:var(--amber);color:#fff;background:var(--amber)}
  .opt .mk.trap,.opt .mk.wrong{border-color:var(--red);color:#fff;background:var(--red)}
  .tier-tag{display:inline-block;margin-left:8px;font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:5px;vertical-align:middle}
  .tier-tag.strong{background:var(--green);color:#fff}
  .tier-tag.weak{background:var(--amber);color:#fff}
  .tier-tag.trap{background:var(--red);color:#fff}
  .tier-tag.correct{background:var(--green);color:#fff}
  .tier-tag.wrong{background:var(--red);color:#fff}
  .fb{margin-top:8px;font-size:13.2px;color:#37424f;background:#fff;border-top:1px dashed var(--line);padding-top:9px;display:none}
  .opt.show-fb .fb{display:block}
  .pts{font-size:12px;font-weight:700;color:var(--slate);margin-left:6px}

  .banner{margin-top:14px;border-radius:10px;padding:12px 15px;font-size:13.5px;display:none;align-items:center;gap:10px}
  .banner.show{display:flex}
  .banner.strong{background:var(--green-soft);color:#0d5c39;border:1px solid #b7e2ca}
  .banner.weak{background:var(--amber-soft);color:#7a5310;border:1px solid #ecd7a6}
  .banner.trap{background:var(--red-soft);color:#8a1f28;border:1px solid #eebfc3}
  .banner.correct{background:var(--green-soft);color:#0d5c39;border:1px solid #b7e2ca}
  .banner.wrong{background:var(--red-soft);color:#8a1f28;border:1px solid #eebfc3}

  /* Home */
  .hero h2{font-size:27px}
  .lede{font-size:15.5px;color:#39434f;max-width:66ch}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px}
  .mini{border:1px solid var(--line);border-radius:11px;padding:15px 16px;background:#fbfcfe}
  .mini h4{font-size:14.5px;margin-bottom:6px}
  .mini p{margin:0;font-size:13.4px;color:var(--slate)}
  .steps{counter-reset:s;margin:10px 0 0;padding:0;list-style:none}
  .steps li{position:relative;padding:10px 0 10px 40px;border-bottom:1px solid var(--line);font-size:14px}
  .steps li:last-child{border-bottom:none}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:9px;width:26px;height:26px;border-radius:8px;background:var(--accent-soft);color:#1442ad;font-weight:700;display:grid;place-items:center;font-family:"IBM Plex Serif",serif;font-size:13px}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .lg{display:flex;align-items:center;gap:8px;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:8px 12px;background:#fff}
  .lg b{font-family:"IBM Plex Serif",serif}
  .sw{width:12px;height:12px;border-radius:3px}
  .callout{background:var(--accent-soft);border:1px solid #cddcfb;border-radius:11px;padding:14px 16px;font-size:13.6px;color:#1b3566;margin-top:14px}

  /* Glossary */
  .gtools{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:16px 0}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;background:#fff}
  .search input{border:none;outline:none;font-size:14px;width:100%;color:var(--ink);font-family:inherit}
  .filters{display:flex;gap:7px;flex-wrap:wrap}
  .fbtn{border:1px solid var(--line);background:#fff;color:#3a4657;border-radius:99px;padding:6px 12px;font-size:12.5px;font-weight:600;cursor:pointer}
  .fbtn.active{background:var(--navy-deep);color:#fff;border-color:var(--navy-deep)}
  .gitem{border:1px solid var(--line);border-radius:11px;padding:15px 17px;margin-bottom:11px;background:#fff}
  .gitem h4{font-size:15.5px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .gcat{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:5px;background:#eef1f5;color:#54606f}
  .gitem .def{font-size:14px;color:#2b3542;margin:7px 0}
  .gitem .ex{font-size:13.2px;color:var(--slate);background:#fbfcfe;border-left:3px solid var(--line);padding:8px 12px;border-radius:0 8px 8px 0}
  .gitem .ex b{color:var(--navy)}
  .empty{color:var(--slate);font-size:14px;padding:18px;text-align:center}


  .casegrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .casebox{border:1px solid var(--line);border-radius:11px;background:#fbfcfe;padding:14px 16px}
  .casebox h4{font-size:14.5px;margin-bottom:8px;color:var(--navy-deep)}
  .casebox ul{margin:0;padding-left:18px;color:#3a4657;font-size:13.6px}
  .casebox li{margin:6px 0}
  .case-table{width:100%;border-collapse:collapse;font-size:13.4px;margin-top:10px;overflow:hidden;border-radius:10px}
  .case-table th,.case-table td{border:1px solid var(--line);padding:10px 11px;text-align:left;vertical-align:top}
  .case-table th{background:#eef3fb;color:var(--navy-deep);font-weight:700}
  .case-table td{background:#fff}
  @media (max-width:880px){.casegrid{grid-template-columns:1fr}}

  .foot{max-width:1180px;margin:0 auto;padding:6px 22px 34px;color:#9aa4b1;font-size:12px}
  .ghost{border:1px solid var(--line);background:#fff;color:var(--slate);border-radius:9px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer}
  .ghost:hover{background:#f1f4f8;color:var(--ink)}

  @media (max-width:880px){
    .wrap{grid-template-columns:1fr;padding:16px}
    nav.side{position:static}
    .grid2{grid-template-columns:1fr}
    header.top{position:static}
  }
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">
      <h1>Veeva Master Class Simulator</h1>
      <span>R&amp;D Business Consultant &nbsp;&middot;&nbsp; Learn the fundamentals, then drill under pressure</span>
    </div>
    <div class="meters">
      <div class="meter">
        <div class="mlabel"><span>Knowledge</span><span class="mval" id="kPct">0%</span></div>
        <div class="bar k"><i id="kBar" style="width:0%"></i></div>
      </div>
      <div class="meter">
        <div class="mlabel"><span>Interview Readiness</span><span class="mval" id="rPct">0%</span></div>
        <div class="bar r"><i id="rBar" style="width:0%"></i></div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <nav class="side" id="side"></nav>
  <main id="main"></main>
</div>
<div class="foot" id="foot"></div>

<script>
/* =====================================================================
   DATA. Edit here to change every level, drill, and glossary entry.
   All learner content is written in plain professional English.
   Scenario tiers: strong = 10 pts, weak = 5 pts, trap = 0 pts.
   ===================================================================== */

const DATA = {
  levels: [
    /* ---------- LEVEL 1 ---------- */
    {
      title: "Structured Thinking: MECE and Issue Trees",
      subtitle: "Break any problem into clean, testable pieces",
      concepts: ["MECE","Issue tree","Framework","Driver tree"],
      brief: [
        "MECE stands for Mutually Exclusive, Collectively Exhaustive. A set of buckets is Mutually Exclusive when nothing falls into two buckets at once, and Collectively Exhaustive when the buckets together cover everything with no gaps. Consultants prize MECE because it prevents both double-counting and blind spots, which is how you keep an analysis trustworthy.",
        "An issue tree is a MECE breakdown built specifically for the problem in front of you. You take the core question, split it into a few non-overlapping drivers, then split each of those again until you reach something you can actually measure or test. A framework, by contrast, is a pre-made template such as a generic profit or market-entry model that you borrow. Frameworks are fast, but they often fit the problem loosely. A strong consultant usually builds a bespoke issue tree rather than forcing a stock framework onto a client situation."
      ],
      worked: "A sponsor asks why a clinical trial is enrolling patients too slowly. A weak answer lists random ideas. A MECE issue tree splits enrollment into number of active sites, times patients screened per site, times screen-to-enroll conversion rate. Every possible cause now lives under exactly one branch, so you can investigate methodically instead of guessing.",
      drills: [
        { type:"knowledge", q:"A consultant splits a hospital pharmacy's costs into: (a) drug purchasing, (b) staff labor, (c) high-cost specialty drugs, (d) other overhead. Is this split MECE?",
          options:[
            {text:"No. It is not mutually exclusive.", correct:true, fb:"Correct. High-cost specialty drugs are a subset of drug purchasing, so those two buckets overlap and the split double-counts. A MECE version would be purchasing, labor, and overhead, with specialty as a sub-branch under purchasing."},
            {text:"Yes. It is fully MECE.", correct:false, fb:"Not quite. Specialty drugs already sit inside drug purchasing, so the buckets overlap. Overlap breaks the Mutually Exclusive half of MECE."},
            {text:"Yes, because the 'other overhead' bucket makes it exhaustive.", correct:false, fb:"An 'other' bucket can help with the exhaustive half, but it does nothing about the overlap between specialty drugs and purchasing, which is the actual problem here."}
          ]},
        { type:"knowledge", q:"Which statement about issue trees versus frameworks is true?",
          options:[
            {text:"An issue tree is built for the specific problem; a framework is a reusable, pre-made template.", correct:true, fb:"Correct. Issue trees are custom-built and tend to fit the situation exactly. Frameworks are borrowed templates that are fast but often fit loosely."},
            {text:"They are two names for the same thing.", correct:false, fb:"They are related but not the same. One is bespoke to the problem, the other is a stock template."},
            {text:"A framework is always more rigorous than an issue tree.", correct:false, fb:"Often the reverse. A stock framework forced onto a client problem can miss the real drivers that a bespoke issue tree would catch."}
          ]},
        { type:"scenario", speaker:"Practice Leader", q:"A sponsor's clinical trial is enrolling patients far too slowly. Take a moment. How would you structure this problem?",
          options:[
            {tier:"strong", fb:"This is the structured, hypothesis-ready thinking Veeva rewards. It is bespoke, MECE, testable, and it resists jumping to a solution.", text:"I would build an issue tree. Enrollment equals number of active sites, times patients screened per site, times screen-to-enroll conversion rate. I would test each branch to find where the drop-off is before recommending anything."},
            {tier:"weak", fb:"It shows effort but not structure. The factors overlap, nothing is prioritized, and there is no clear tree to test against.", text:"There could be many reasons: the protocol, the sites, the patients, the competition. I would look into all of them."},
            {tier:"trap", fb:"Jumping to a solution before structuring the problem is the classic trap. Adding sites is useless if the real bottleneck is conversion. Veeva screens for people who analyze before they prescribe.", text:"They should add more trial sites and run more patient advertising."}
          ]},
        { type:"scenario", speaker:"Practice Leader", q:"Give me a MECE way to break down a pharmacy's total prescription volume.",
          options:[
            {tier:"strong", fb:"Clean and MECE. Every prescription is either new or a refill, with no overlap and no gap.", text:"New prescriptions and refills. Every script is one or the other, nothing overlaps, and nothing is left out."},
            {tier:"weak", fb:"Brand, generic, and specialty is a common split, but specialty drugs can themselves be brand or generic, so the buckets overlap. It is close but not clean.", text:"Brand-name, generic, and specialty prescriptions."},
            {tier:"trap", fb:"These categories overlap heavily. A single script could be profitable and insured and from a frequent customer all at once, so this is not a real breakdown.", text:"Profitable scripts, insured scripts, and frequent-customer scripts."}
          ]}
      ]
    },

    /* ---------- LEVEL 2 ---------- */
    {
      title: "Hypothesis-Driven Problem Solving and the So-What",
      subtitle: "Move fast with a testable answer, and always land the implication",
      concepts: ["Hypothesis-driven","So-what","Synthesis vs summary","80/20"],
      brief: [
        "Hypothesis-driven problem solving means you start with a best-guess answer and then test it, instead of boiling the ocean by analyzing everything. You form a clear, falsifiable statement such as 'enrollment is slow mainly because screen-to-enroll conversion is low at three large sites,' then you go pull only the data that would confirm or kill that hypothesis. This keeps the work fast and focused, which is how consultants operate under tight timelines.",
        "The so-what is the decision-relevant implication of a fact. Data on its own is inert. Synthesis turns it into a conclusion the client can act on. Beginners tend to summarize, meaning they restate what the numbers say. Experts synthesize, meaning they tell you what the numbers mean and what to do next. The 80/20 rule is the habit of spending your energy on the 20 percent of drivers that explain 80 percent of the outcome."
      ],
      worked: "The fact is 'Site A converts 8 percent of screened patients while Sites B and C convert 30 percent.' A summary repeats that. The so-what is: 'Site A's screening funnel is the bottleneck, so fixing its eligibility pre-check would lift total enrollment more than adding new sites, and that is where we should focus first.' The synthesis names the driver, ranks the action, and points to a next step.",
      drills: [
        { type:"knowledge", q:"A safety team clears about 500 cases per associate per year, but one site clears only 300 per associate. What is the so-what?",
          options:[
            {text:"That site is understaffed or has a process bottleneck, so it is the first place to investigate for added capacity.", correct:true, fb:"Correct. This names the likely driver and points to an action, which is synthesis."},
            {text:"That site clears 300 cases per associate per year.", correct:false, fb:"That just restates the fact. Restating is a summary, not a so-what."},
            {text:"The whole team is failing and should be replaced.", correct:false, fb:"That over-reaches. One low site does not mean the whole team is failing, and you have not diagnosed the cause yet."}
          ]},
        { type:"knowledge", q:"Which is the best one-line definition of hypothesis-driven problem solving?",
          options:[
            {text:"Start with a likely answer, then test it with targeted data.", correct:true, fb:"Correct. You lead with a falsifiable best guess and gather only the data that confirms or kills it."},
            {text:"Analyze every possible factor exhaustively before forming any view.", correct:false, fb:"That is boiling the ocean, which is the opposite of hypothesis-driven work. It is thorough but slow and unfocused."},
            {text:"Ask the client what they think the answer is and go with that.", correct:false, fb:"A hypothesis is your own testable guess, not a handoff of the thinking to the client."}
          ]},
        { type:"scenario", speaker:"Practice Leader", q:"Here is the data: Site A converts 8 percent of screened patients, Sites B and C convert 30 percent. So what?",
          options:[
            {tier:"strong", fb:"This is a real so-what. It names the bottleneck, ranks the highest-leverage action, and gives a next step.", text:"Site A's screening funnel is the bottleneck. Fixing its eligibility pre-check would lift total enrollment more than adding new sites, so I would focus there first."},
            {tier:"weak", fb:"This is a summary, not a so-what. It restates the numbers without telling the client what to do.", text:"Site A is converting much lower than Sites B and C."},
            {tier:"trap", fb:"This over-reaches beyond the data. Low conversion could be a fixable process issue; you have not diagnosed the cause, so recommending a shutdown is premature.", text:"Site A is failing and should be shut down."}
          ]},
        { type:"scenario", speaker:"Practice Leader", q:"A client's safety case backlog keeps growing and you have limited time. How would you approach it?",
          options:[
            {tier:"strong", fb:"Focused and hypothesis-driven. You lead with a testable cause and pull only the data that settles it.", text:"I would go hypothesis-driven. My lead hypothesis is that intake volume rose faster than processing capacity at one step. I would pull just the volume trend and per-step cycle times to confirm or kill that before widening."},
            {tier:"weak", fb:"Thorough but slow. Gathering everything before forming a view is boiling the ocean, and the timeline will not allow it.", text:"I would gather all available data on every part of the safety process and analyze it fully before deciding anything."},
            {tier:"trap", fb:"This assumes the answer with no test. A backlog can come from a process or system issue, not just headcount, so prescribing hiring first is a guess dressed up as a conclusion.", text:"Backlogs are always a staffing problem, so I would tell them to hire more associates."}
          ]}
      ]
    },

    /* ---------- LEVEL 3 ---------- */
    {
      title: "The Case Exercise: Estimation and Quantification",
      subtitle: "Reach a defensible number and keep it honest",
      concepts: ["Market sizing","Back-of-envelope","Segmentation","Sanity check"],
      brief: [
        "Veeva's take-home case exercise gives you a real customer scenario and about a week to build and present a solution. Interviewers are not grading whether your final number is exactly right. They are grading how you structure the problem, how you reason with numbers, and how clearly you communicate.",
        "Estimation, also called market sizing, is the skill of reaching a defensible number when you lack perfect data. You build it top-down or bottom-up from a few stated assumptions, then sanity-check the result. The rule is simple: make every assumption explicit, keep the math clean, and flag where a real project would replace your guess with actual data. A sanity check compares your answer against a second, independent angle, so a mismatch is a signal to recheck, not to hide."
      ],
      worked: "Estimate the yearly volume of adverse-event case reports a mid-size pharma safety team processes. Bottom-up: 15 marketed products, times about 400 reports per product per year, gives about 6,000 cases. Sanity-check against headcount: if one associate handles about 500 cases a year, 6,000 cases implies a team of about 12, which is plausible for mid-size. State the assumptions, show the arithmetic, and label it an estimate. In a case exercise, a clearly structured estimate with honest assumptions beats a falsely precise number every time.",
      drills: [

            {text:"Recall the exact figure from memory and present it as fact.", correct:false, fb:"Presenting an unverifiable figure as fact is the honesty trap. An estimate you can show your work on is stronger and safer."}

        { type:"knowledge", q:"Your sizing yields 6,000 cases per year, which would need about 12 associates. The client actually has 3. What should you do?",

            {text:"Keep your number. The assumptions were fine.", correct:false, fb:"A four-times gap is a red flag, not noise. Ignoring it means presenting a number you have reason to doubt."},
            {text:"Quietly lower the number to whatever matches 3 people.", correct:false, fb:"Back-solving to a tidy answer without explaining why hides the reasoning and can bury a real insight about the client's capacity."}

        "Consultants communicate answer-first because senior stakeholders are busy and want the punchline immediately. Leading with the conclusion also proves you can tell what matters from what does not. Signposting is the habit of telling the listener your structure before you fill it in. For example: 'I have three reasons; the first is cost, the second is timeline, the third is risk.' The listener can now follow you without effort."

      worked: "A partner asks whether a client should consolidate two trial-management systems. Weak and bottom-up: 'Well, in 2021 they bought Company X, which had its own system, and then...' Strong and top-down: 'Yes, consolidate onto one system. Three reasons: it cuts duplicate license cost by roughly a third, it removes a manual reconciliation step that delays reporting, and it lowers audit risk. I can walk through any of those.' Same facts, far more credible delivery.",

    {term:"Driver tree", cat:"Consulting Method", def:"An issue tree whose branches are the quantitative drivers of an outcome, so you can see which lever moves the result most.", ex:"Total revenue equals volume times price times mix, each of which can be pulled apart further."},
    {term:"Hypothesis-driven", cat:"Consulting Method", def:"Start with a likely, falsifiable answer, then gather only the data that would confirm or kill it. The opposite of boiling the ocean.", ex:"Lead hypothesis: the backlog grew because intake outpaced one processing step. Then pull just that step's cycle time."},
    {term:"80/20", cat:"Consulting Method", def:"The Pareto habit of focusing on the roughly 20 percent of drivers that explain about 80 percent of the outcome.", ex:"Two of eight sites drive most of the enrollment shortfall, so fix those first."},

    {term:"So-what", cat:"Communication", def:"The decision-relevant implication of a fact. It names the driver, ranks the action, and points to a next step.", ex:"Site A is the bottleneck, so fixing its pre-check lifts enrollment more than adding sites."},

const STORE_KEY = "veeva-master-class-sim-v1";
let state = { view:"home", answers:{} };
try { const s = JSON.parse(localStorage.getItem(STORE_KEY)); if (s && s.answers) state.answers = s.answers; } catch(e){}

const PTS = { strong:10, weak:5, trap:0 };

function save(){ localStorage.setItem(STORE_KEY, JSON.stringify({answers:state.answers})); }

function allKnowledge(){ let a=[]; DATA.levels.forEach((l,li)=>l.drills.forEach((d,di)=>{ if(d.type==="knowledge") a.push({li,di,d}); })); return a; }
function allScenario(){ let a=[]; DATA.levels.forEach((l,li)=>l.drills.forEach((d,di)=>{ if(d.type==="scenario") a.push({li,di,d}); })); return a; }
function keyOf(li,di){ return "l"+li+"-"+di; }

function computeKnowledge(){
  const ks = allKnowledge(); let correct=0;
  ks.forEach(({li,di,d})=>{ const idx=state.answers[keyOf(li,di)]; if(idx!=null && d.options[idx] && d.options[idx].correct) correct++; });
  return { correct, total:ks.length, pct: ks.length? Math.round(correct/ks.length*100):0 };
}
function computeReadiness(){
  const ss = allScenario(); let earned=0, max=0;
  ss.forEach(({li,di,d})=>{ max+=PTS.strong; const idx=state.answers[keyOf(li,di)]; if(idx!=null && d.options[idx]) earned += PTS[d.options[idx].tier]; });
  return { earned, max, pct: max? Math.round(earned/max*100):0 };
}
function levelDone(li){
  const l=DATA.levels[li]; return l.drills.every((d,di)=> state.answers[keyOf(li,di)]!=null);
}

function updateMeters(){
  const k=computeKnowledge(), r=computeReadiness();
  document.getElementById("kPct").textContent=k.pct+"%";
  document.getElementById("rPct").textContent=r.pct+"%";
  document.getElementById("kBar").style.width=k.pct+"%";
  document.getElementById("rBar").style.width=r.pct+"%";
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ---------- Sidebar ---------- */
function renderSide(){
  const side=document.getElementById("side");
  let h='<div class="navhdr">Simulator</div>';
  h+=navBtn("home","Overview","",state.view==="home");
  h+=navBtn("case","Case Study Lab","C",state.view==="case");
  h+='<div class="navhdr" style="margin-top:6px">Levels</div>';
  DATA.levels.forEach((l,i)=>{
    const active = state.view==="level-"+i;
    const done = levelDone(i);
    h+=`<button class="navbtn ${active?'active':''}" data-view="level-${i}">
        <span class="num">${i+1}</span>
        <span style="flex:1">${esc(l.title.split(":")[0])}</span>
        ${done?'<span class="dot">&#10003;</span>':''}
      </button>`;
  });
  h+='<div class="navhdr" style="margin-top:6px">Reference</div>';
  h+=navBtn("glossary","Glossary and Knowledge Base","&#9776;",state.view==="glossary");
  h+='<div style="padding:10px 6px 4px"><button class="ghost" id="resetBtn" style="width:100%">Reset progress</button></div>';
  side.innerHTML=h;
  side.querySelectorAll("[data-view]").forEach(b=> b.onclick=()=>{ state.view=b.getAttribute("data-view"); render(); window.scrollTo({top:0,behavior:"smooth"}); });
  const rb=document.getElementById("resetBtn"); if(rb) rb.onclick=()=>{ if(confirm("Clear all answers and reset both meters to 0 percent?")){ state.answers={}; save(); render(); } };
}
function navBtn(view,label,icon,active){
  return `<button class="navbtn ${active?'active':''}" data-view="${view}"><span class="num">${icon||'&#9679;'}</span><span style="flex:1">${label}</span></button>`;
}

/* ---------- Main router ---------- */
function render(){
  renderSide(); updateMeters();
  const m=document.getElementById("main");
  if(state.view==="home") m.innerHTML=renderHome();
  else if(state.view==="case"){ m.innerHTML=renderCaseLab(); wireCaseLab(); }
  else if(state.view==="glossary"){ m.innerHTML=renderGlossaryShell(); wireGlossary(); }
  else if(state.view.startsWith("level-")){ const i=+state.view.split("-")[1]; m.innerHTML=renderLevel(i); wireLevel(i); }
  renderFoot();
}

function renderLevel(i){
  const l=DATA.levels[i];
  let h=`<div class="card">
    <div class="eyebrow">Level ${i+1} of ${DATA.levels.length}</div>
    <h2>${esc(l.title)}</h2>
    <p class="sub">${esc(l.subtitle)}</p>
    <div class="brief">
      <div class="btag">Teaching brief</div>
      ${l.brief.map(p=>`<p>${esc(p)}</p>`).join("")}
      <div class="we"><b>Worked example.</b> ${esc(l.worked)}</div>
    </div>
    <div class="concept-chips">
      ${l.concepts.map(c=>`<span class="chip" data-term="${esc(c)}">${esc(c)}</span>`).join("")}
    </div>
  </div>`;

  l.drills.forEach((d,di)=>{ h+=renderDrill(i,di,d); });

  const done=levelDone(i);
  h+=`<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap">
      <div style="font-size:14px;color:${done?'var(--green)':'var(--slate)'}">${done?'&#10003; Level complete. Your answers are saved.':'Answer every drill to complete this level. Progress saves automatically.'}</div>
      <div style="display:flex;gap:10px">
        ${i>0?`<button class="ghost" data-goto="level-${i-1}">Previous</button>`:''}
        ${i<DATA.levels.length-1?`<button class="ghost" data-goto="level-${i+1}" style="background:var(--accent);color:#fff;border-color:var(--accent)">Next level</button>`:`<button class="ghost" data-goto="glossary" style="background:var(--accent);color:#fff;border-color:var(--accent)">Open Glossary</button>`}
      </div>
    </div>`;
  return h;
}

function renderDrill(li,di,d){
  const key=keyOf(li,di);
  const chosen=state.answers[key];
  const answered = chosen!=null;
  const isK = d.type==="knowledge";
  let opts="";
  d.options.forEach((o,oi)=>{
    let cls="opt", mk="", tag="", fbShown="";
    const letter=String.fromCharCode(65+oi);
    if(answered){
      cls+=" disabled show-fb";
      if(isK){
        if(o.correct){ cls+=" reveal-correct"; mk="correct"; tag=`<span class="tier-tag correct">Correct</span>`; }
        else if(oi===chosen){ cls+=" reveal-wrong"; mk="wrong"; tag=`<span class="tier-tag wrong">Your pick</span>`; }
      } else {
        cls+=" reveal-"+o.tier; mk=o.tier;
        const label=o.tier==="strong"?"Strong":o.tier==="weak"?"Weak":"Trap";
        tag=`<span class="tier-tag ${o.tier}">${label}</span>`;
        if(oi===chosen) tag+=`<span class="pts">your pick, ${PTS[o.tier]} pts</span>`;
      }
      if(oi===chosen) cls+=" chosen";
      fbShown=`<div class="fb">${esc(o.fb)}</div>`;
    }
    const mkContent = answered ? (isK ? (o.correct?"&#10003;":(oi===chosen?"&#10007;":letter)) : (o.tier==="strong"?"&#10003;":o.tier==="trap"?"&#10007;":"~")) : letter;
    opts+=`<button class="${cls}" data-li="${li}" data-di="${di}" data-oi="${oi}" ${answered?'disabled':''}>
        <span class="mk ${answered?mk:''}">${mkContent}</span>
        <span>${esc(o.text)}${tag}</span>
        ${fbShown}
      </button>`;
  });

  let banner="";
  if(answered){
    if(isK){
      const ok=d.options[chosen].correct;
      banner=`<div class="banner ${ok?'correct':'wrong'} show">${ok?'&#10003; Correct.':'&#10007; Not quite.'} Knowledge meter updated. Review the highlighted answer above.</div>`;
    } else {
      const t=d.options[chosen].tier;
      const msg = t==="strong"?"Strong answer. Full 10 points. This is what a Veeva interviewer wants to hear.":t==="weak"?"Weak answer. 5 points. It is not wrong, but it is not scoring. See the strong option.":"Trap answer. 0 points. Read why the honest, structured option outscores this one.";
      banner=`<div class="banner ${t} show">${msg}</div>`;
    }
    banner+=`<div style="margin-top:10px"><button class="ghost" data-retry="${key}">Try this drill again</button></div>`;
  }

  return `<div class="card" style="padding:0">
    <div class="drill" style="margin:0;border:none">
      <div class="dhead">
        <span class="kind ${isK?'know':'scen'}">${isK?'Knowledge check':'Application scenario'}</span>
        <span class="qmeta">${isK?'Concept comprehension':'Interviewer question &middot; choose the best answer'}</span>
      </div>
      ${!isK && d.speaker?`<div class="speaker">${esc(d.speaker)} asks:</div>`:''}
      <div class="qtext ${isK?'':'scenq'}">${esc(d.q)}</div>
      <div class="opts">${opts}</div>
      ${banner}
    </div>
  </div>`;
}

function wireLevel(i){
  const m=document.getElementById("main");
  m.querySelectorAll(".opt:not([disabled])").forEach(b=>{
    b.onclick=()=>{
      const li=+b.getAttribute("data-li"), di=+b.getAttribute("data-di"), oi=+b.getAttribute("data-oi");
      state.answers[keyOf(li,di)]=oi; save(); render();
      setTimeout(()=>{ const t=document.querySelector(`.card [data-di="${di}"]`); },0);
    };
  });
  m.querySelectorAll("[data-retry]").forEach(b=>{ b.onclick=()=>{ delete state.answers[b.getAttribute("data-retry")]; save(); render(); }; });
  m.querySelectorAll("[data-goto]").forEach(b=>{ b.onclick=()=>{ state.view=b.getAttribute("data-goto"); render(); window.scrollTo({top:0,behavior:"smooth"}); }; });
  m.querySelectorAll(".chip[data-term]").forEach(c=>{ c.onclick=()=>{ state.view="glossary"; state.glossaryQuery=c.getAttribute("data-term"); render(); window.scrollTo({top:0,behavior:"smooth"}); }; });
  const sb=document.getElementById("startBtn"); if(sb) sb.onclick=()=>{ state.view="level-0"; render(); window.scrollTo({top:0}); };
}

/* ---------- Glossary ---------- */
const CATS = ["All","Consulting Method","Communication","Veeva Domain","Regulatory","Fit and Behavioral"];
function renderGlossaryShell(){
  const q = state.glossaryQuery || "";
  return `<div class="card">
    <div class="eyebrow">Persistent reference</div>
    <h2>Glossary and Knowledge Base</h2>
    <p class="sub">Every term and framework taught across all levels, with a definition and one example each. Search or filter anytime.</p>
    <div class="gtools">
      <label class="search">
        <span style="color:var(--slate)">&#128269;</span>
        <input id="gsearch" type="text" placeholder="Search terms, definitions, or examples" value="${esc(q)}" />
      </label>
      <div class="filters" id="gfilters">
        ${CATS.map(c=>`<button class="fbtn ${(state.glossaryCat||'All')===c?'active':''}" data-cat="${esc(c)}">${c}</button>`).join("")}
      </div>
    </div>
    <div id="glist"></div>
  </div>`;
}
function glossaryList(){
  const q=(document.getElementById("gsearch")?.value || state.glossaryQuery || "").trim().toLowerCase();
  const cat=state.glossaryCat||"All";
  const items=DATA.glossary.filter(g=>{
    const catOk = cat==="All" || g.cat===cat;
    const s=(g.term+" "+g.def+" "+g.ex+" "+g.cat).toLowerCase();
    return catOk && (q==="" || s.includes(q));
  });
  const el=document.getElementById("glist");
  if(!items.length){ el.innerHTML=`<div class="empty">No terms match that search. Try a shorter keyword or clear the filter.</div>`; return; }
  el.innerHTML=items.map(g=>`
    <div class="gitem">
      <h4>${esc(g.term)} <span class="gcat">${esc(g.cat)}</span></h4>
      <div class="def">${esc(g.def)}</div>
      <div class="ex"><b>Example.</b> ${esc(g.ex)}</div>
    </div>`).join("");
}
function wireGlossary(){
  glossaryList();
  const s=document.getElementById("gsearch");
  if(s){ s.oninput=()=>{ state.glossaryQuery=s.value; glossaryList(); }; s.focus(); s.setSelectionRange(s.value.length,s.value.length); }
  document.querySelectorAll("#gfilters .fbtn").forEach(b=>{ b.onclick=()=>{ state.glossaryCat=b.getAttribute("data-cat"); render(); }; });
}

render();
</script>
