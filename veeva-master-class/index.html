{"term": "Profitability framework", "cat": "Finance", "def": "A diagnostic framework built on profit equals revenue minus costs. Use it when profits, margins, or earnings are down.", "ex": "A RIM project is not purely a profitability case, but its labor savings still come from cost reduction."},
{"term": "Revenue", "cat": "Finance", "def": "Money earned from selling products or services before subtracting costs.", "ex": "For a pharma product, launch-delay value may relate to delayed revenue, but you need client-provided assumptions."},
{"term": "Cost", "cat": "Finance", "def": "Money spent to operate, build, deliver, or support something.", "ex": "Implementation cost, validation cost, software support, and training are all costs in a Veeva case."},
{"term": "Fixed cost", "cat": "Finance", "def": "A cost that does not change much with volume in the short term.", "ex": "A base safety-team salary pool is mostly fixed over the next few months."},
{"term": "Variable cost", "cat": "Finance", "def": "A cost that moves with volume.", "ex": "Outsourced case-processing fees rise with the number of cases sent to the vendor."},
{"term": "Contribution margin", "cat": "Finance", "def": "Revenue minus variable cost, often used to see how much each unit contributes toward fixed cost and profit.", "ex": "In a trial case, cost per incremental enrolled patient is a similar unit-economics idea."},
{"term": "Gross margin", "cat": "Finance", "def": "Revenue minus direct cost of goods or services, divided by revenue.", "ex": "Less central in R&D operations cases, but useful in broader consulting interviews."},
{"term": "Operating margin", "cat": "Finance", "def": "Operating profit divided by revenue after operating expenses.", "ex": "A transformation may improve operating margin by reducing manual operations cost."},
{"term": "EBITDA", "cat": "Finance", "def": "Earnings before interest, taxes, depreciation, and amortization. Often used as a proxy for operating profitability.", "ex": "If an interviewer mentions EBITDA miss, use profit-tree thinking."},
{"term": "ROI", "cat": "Finance", "def": "Return on investment. A simple version is net benefit divided by investment.", "ex": "300,000 annual net benefit on 650,000 investment is about 46 percent annual simple ROI."},
{"term": "Payback period", "cat": "Finance", "def": "The time required for cumulative benefits to recover the upfront investment.", "ex": "650,000 divided by 300,000 annual net benefit gives about 2.2 years."},
{"term": "NPV", "cat": "Finance", "def": "Net present value. Future cash flows discounted back to today minus the upfront investment.", "ex": "A RIM case may have negative NPV on hard savings but positive NPV if risk-adjusted launch-delay value is included."},
{"term": "Discount rate", "cat": "Finance", "def": "The rate used to convert future cash flows into present value.", "ex": "A 10 percent discount rate values next year's 1 million dollars at about 909,000 dollars today."},
{"term": "WACC", "cat": "Finance", "def": "Weighted average cost of capital, often used as the discount rate in corporate valuation.", "ex": "If no WACC is provided, state the assumption rather than inventing certainty."},
{"term": "CAPEX", "cat": "Finance", "def": "Capital expenditure, money spent on long-term assets or capitalized implementation work.", "ex": "Some enterprise implementation costs may be treated as CAPEX depending on accounting policy."},
{"term": "OPEX", "cat": "Finance", "def": "Operating expense, recurring cost to run the business.", "ex": "Annual software support and business-admin headcount are OPEX."},
{"term": "TCO", "cat": "Finance", "def": "Total cost of ownership across the full lifecycle, not just purchase price.", "ex": "TCO includes implementation, validation, migration, training, licenses, support, and change management."},
{"term": "Run-rate savings", "cat": "Finance", "def": "Annualized savings expected once the change is fully implemented.", "ex": "Avoiding 2 FTE at 140,000 each creates 280,000 dollars of run-rate savings."},
{"term": "One-time cost", "cat": "Finance", "def": "A non-recurring cost required to implement or transition to the new state.", "ex": "Data migration and validation during a Veeva rollout are one-time costs."},
{"term": "Recurring cost", "cat": "Finance", "def": "A cost that continues every year or period after implementation.", "ex": "Support, maintenance, and admin ownership are recurring costs."},
{"term": "Hard savings", "cat": "Finance", "def": "Budget-visible savings, such as avoided hires, vendor spend reduction, or retiring a system.", "ex": "Avoided outsourcing fees are hard savings."},
{"term": "Strategic value", "cat": "Finance", "def": "Business value that is real but assumption-dependent, such as avoided launch delay or improved inspection readiness.", "ex": "Avoiding a 10-day launch delay may be worth more than labor savings, but the client must validate the value."},
{"term": "Sensitivity analysis", "cat": "Finance", "def": "Testing how the recommendation changes when key assumptions move.", "ex": "Vary productivity lift from 5 percent to 15 percent and see if payback still works."},
{"term": "Breakeven", "cat": "Finance", "def": "The point where benefits equal costs.", "ex": "If the pilot costs 300,000 dollars, one avoided 400,000 dollar delay month clears breakeven."},
{"term": "Opportunity cost", "cat": "Finance", "def": "The value of the best alternative use of time, capital, or resources.", "ex": "A delayed submission may tie up regulatory and clinical teams that could support another program."},
{"term": "FTE", "cat": "Operations", "def": "Full-time equivalent. A way to express labor capacity independent of individual headcount details.", "ex": "A 240-case monthly gap at 120 cases per FTE implies 2 FTE of capacity."},
{"term": "Fully loaded cost", "cat": "Operations", "def": "Employee cost including salary, benefits, payroll tax, overhead, and sometimes management burden.", "ex": "A safety associate may have a fully loaded cost of 140,000 dollars per year in a case assumption."},
{"term": "Throughput", "cat": "Operations", "def": "The amount of work completed per unit of time.", "ex": "960 safety cases processed per month is current throughput."},
{"term": "Capacity", "cat": "Operations", "def": "The maximum sustainable amount of work a team or system can process in a period.", "ex": "8 associates times 120 cases each gives 960 monthly case capacity."},
{"term": "Bottleneck", "cat": "Operations", "def": "The slowest or most constrained step that limits the whole process.", "ex": "If medical review queues are longest, adding intake staff may not reduce backlog."},
{"term": "Utilization", "cat": "Operations", "def": "The percentage of available capacity being used.", "ex": "A team at 100 percent utilization has no buffer for spikes or rework."},
{"term": "Cycle time", "cat": "Operations", "def": "The elapsed time from start to finish of a process.", "ex": "Submission assembly cycle time falls from 12 weeks to 8 weeks."},
{"term": "SLA", "cat": "Operations", "def": "Service-level agreement, a target for response or completion time.", "ex": "Serious safety cases may need strict SLA tracking."},
{"term": "Queue", "cat": "Operations", "def": "Work waiting to be processed.", "ex": "A growing safety backlog is a queue where intake exceeds completion."},
{"term": "Go-live", "cat": "Implementation", "def": "The point when a new process or system becomes active for users.", "ex": "Go-live is not the same as adoption or value realization."},
{"term": "Cutover", "cat": "Implementation", "def": "The controlled transition from old process or system to the new one.", "ex": "A safety-system cutover may include open-case migration and user-access validation."},
{"term": "Data migration", "cat": "Implementation", "def": "Moving data from old systems into a new system while preserving quality and traceability.", "ex": "Migrating product registration data into RIM requires ownership and validation."},
{"term": "User acceptance testing", "cat": "Implementation", "def": "Testing by business users to confirm the system supports real workflows.", "ex": "Safety associates test case intake, coding, review, and submission before go-live."},
{"term": "Super-user", "cat": "Implementation", "def": "A trained business user who supports peers and helps drive adoption.", "ex": "A country regulatory super-user helps local teams adopt the new RIM workflow."},
{"term": "Hypercare", "cat": "Implementation", "def": "The intensified support period right after go-live.", "ex": "For the first four weeks after launch, track defects, user questions, and adoption daily."},
{"term": "Source of truth", "cat": "Implementation", "def": "The authoritative system or owner for a data field or record.", "ex": "RIM should define the source of truth for product registration fields."},
{"term": "Data lineage", "cat": "Implementation", "def": "The path data takes from origin to use, including transformations and owners.", "ex": "Submission defects often come from unclear product-data lineage across markets."},
{"term": "Veeva Business Consulting", "cat": "Veeva Domain", "def": "Veeva's consulting group focused on improving life sciences operations through software, AI, data, and consulting working together.", "ex": "A consultant may redesign a safety operating model and align it to Veeva Safety."},
{"term": "Veeva Connections", "cat": "Veeva Domain", "def": "Veeva's approach to connecting processes and data across applications.", "ex": "Connecting clinical data to safety can reduce multiple data entry."},
{"term": "Case Intake Agent", "cat": "Veeva Domain", "def": "Veeva AI for Safety capability described by Veeva as automating case intake and identifying potential data anomalies.", "ex": "Use it as a possible future-state lever, not as a magic answer before diagnosis."},
{"term": "Case Narrative Agent", "cat": "Veeva Domain", "def": "Veeva AI for Safety capability described by Veeva as improving case narratives by correcting grammar, consolidating information, and improving readability.", "ex": "A narrative agent may reduce drafting friction, but the case still needs workflow and quality controls."},
{"term": "Vault Submissions", "cat": "Veeva Domain", "def": "Veeva application area supporting regulatory submission planning, assembly, and publishing.", "ex": "Relevant when the client struggles with eCTD submission cycle time."},
{"term": "Vault Registrations", "cat": "Veeva Domain", "def": "Veeva application area for tracking product registrations and market authorization data.", "ex": "Useful when global registration data are inconsistent across countries."},
{"term": "Study startup", "cat": "Veeva Domain", "def": "The work needed to get a clinical trial site ready to enroll patients.", "ex": "Contracts, regulatory documents, training, and system access can all delay activation."},
{"term": "Screen fail", "cat": "Veeva Domain", "def": "A patient who is screened for a trial but does not meet eligibility or cannot proceed.", "ex": "High screen-fail rate means media spend may create more work without enrollment."},
{"term": "Cost per enrolled patient", "cat": "Finance", "def": "Total recruitment or activation spend divided by incremental patients enrolled.", "ex": "A 300,000 dollar pre-screening program that adds 48 patients costs 6,250 dollars per incremental enrollee."},
{"term": "Drug lifecycle", "cat": "Industry", "def": "The path from discovery through preclinical, clinical trials, approval, launch, post-marketing, and lifecycle management.", "ex": "A regulatory-delay case and a launch-access case sit in different parts of the lifecycle."},
{"term": "Discovery", "cat": "Industry", "def": "Early research to identify targets, compounds, mechanisms, or therapeutic approaches.", "ex": "Discovery risk is mainly scientific and translational."},
{"term": "Preclinical", "cat": "Industry", "def": "Lab and animal work before human testing, including toxicology and pharmacology studies.", "ex": "Preclinical data supports an IND submission."},
{"term": "IND", "cat": "Regulatory", "def": "Investigational New Drug application, which allows clinical testing in humans to begin in the US.", "ex": "An IND package includes preclinical, manufacturing, and protocol information."},
{"term": "Phase 1", "cat": "Industry", "def": "First-in-human trials focused mainly on safety, tolerability, PK, and dose range.", "ex": "A Phase 1 oncology study may include dose escalation."},
{"term": "Phase 2", "cat": "Industry", "def": "Clinical trials focused on dose, early efficacy, and continued safety in the target patient population.", "ex": "A Phase 2 signal can shape Phase 3 endpoint selection."},
{"term": "Phase 3", "cat": "Industry", "def": "Large confirmatory trials designed to prove safety and efficacy for approval.", "ex": "Slow Phase 3 enrollment can delay the entire launch timeline."},
{"term": "NDA", "cat": "Regulatory", "def": "New Drug Application for FDA approval of a small-molecule drug.", "ex": "A successful Phase 3 program supports an NDA submission."},
{"term": "BLA", "cat": "Regulatory", "def": "Biologics License Application for FDA approval of a biologic product.", "ex": "Many monoclonal antibodies are approved through BLAs."},
{"term": "Post-marketing", "cat": "Industry", "def": "The period after approval, when safety, effectiveness, access, and lifecycle strategy continue.", "ex": "PV case processing and signal detection are post-marketing obligations."},
{"term": "Lifecycle management", "cat": "Industry", "def": "Strategies to extend or protect product value after launch.", "ex": "New indication, formulation, device, or adherence support before LOE."},
{"term": "Loss of exclusivity", "cat": "Industry", "def": "The point when patent or regulatory protection weakens and generic or biosimilar competition can enter.", "ex": "LOE can trigger rapid revenue erosion."},
{"term": "Patent cliff", "cat": "Industry", "def": "A period when one or more major products lose exclusivity, threatening company revenue.", "ex": "A client may need portfolio replacement or lifecycle strategy before a patent cliff."},
{"term": "Generic", "cat": "Industry", "def": "A small-molecule product approved as therapeutically equivalent to a reference listed drug, usually through an ANDA.", "ex": "Generic entry often accelerates after LOE."},
{"term": "Biosimilar", "cat": "Industry", "def": "A biological product that is highly similar to an already approved reference biologic, with no clinically meaningful differences.", "ex": "Biosimilar competition affects biologic lifecycle strategy."},
{"term": "Sponsor", "cat": "Stakeholder", "def": "The company or organization responsible for initiating and overseeing a clinical trial or development program.", "ex": "A biotech sponsor may outsource trial operations to a CRO but remains accountable."},
{"term": "CRO", "cat": "Stakeholder", "def": "Contract Research Organization, a vendor that supports clinical development activities.", "ex": "A CRO may manage site monitoring, data management, or trial operations."},
{"term": "Trial site", "cat": "Stakeholder", "def": "A hospital, clinic, or research center that enrolls and treats patients in a clinical trial.", "ex": "Site burden can limit enrollment even when the sponsor advertises heavily."},
{"term": "Investigator", "cat": "Stakeholder", "def": "A physician or researcher responsible for conducting a clinical trial at a site.", "ex": "Investigator engagement can affect enrollment and protocol adherence."},
{"term": "Site coordinator", "cat": "Stakeholder", "def": "The operational person at a trial site who manages screening, scheduling, documents, and patient logistics.", "ex": "Coordinators often know why screening actually fails."},
{"term": "FDA", "cat": "Stakeholder", "def": "US Food and Drug Administration, the regulator that reviews drugs, biologics, devices, labeling, safety, and quality.", "ex": "FDA approval does not automatically mean payer access."},
{"term": "EMA", "cat": "Stakeholder", "def": "European Medicines Agency, the EU agency involved in centralized medicine evaluation.", "ex": "Global regulatory strategy may need both FDA and EMA planning."},
{"term": "Payer", "cat": "Stakeholder", "def": "An organization that pays for healthcare, such as an insurer, Medicare plan, or health system.", "ex": "A payer may restrict coverage even after FDA approval."},
{"term": "PBM", "cat": "Stakeholder", "def": "Pharmacy Benefit Manager, an intermediary that manages pharmacy benefits, formularies, rebates, and utilization controls.", "ex": "PBM formulary status can determine patient access to a drug."},
{"term": "HCP", "cat": "Stakeholder", "def": "Healthcare professional, such as a physician, pharmacist, nurse, or advanced practitioner.", "ex": "HCP awareness and comfort affect uptake after launch."},
{"term": "KOL", "cat": "Stakeholder", "def": "Key Opinion Leader, a respected clinician or researcher who influences medical practice and scientific interpretation.", "ex": "KOL feedback can clarify why physicians hesitate to adopt a therapy."},
{"term": "MSL", "cat": "Stakeholder", "def": "Medical Science Liaison, a field-based medical affairs professional who supports scientific exchange with experts.", "ex": "MSLs gather insights and discuss evidence, not promotional sales claims."},
{"term": "Patient journey", "cat": "Commercial", "def": "The path patients take from symptoms to diagnosis, treatment decision, access, adherence, and outcomes.", "ex": "A launch may fail because patients drop out before diagnosis or prior authorization."},
{"term": "Segmentation and targeting", "cat": "Commercial", "def": "Dividing customers or HCPs into meaningful groups and prioritizing the highest-value or highest-need segments.", "ex": "Commercial teams may target high-volume specialists with relevant patient populations."},
{"term": "Omnichannel", "cat": "Commercial", "def": "Coordinated customer engagement across field, email, web, congress, remote, and other channels.", "ex": "A launch plan may combine rep visits, webinars, medical content, and digital reminders."},
{"term": "Launch strategy", "cat": "Commercial", "def": "The plan for bringing a product to market, including positioning, evidence, access, field model, education, and metrics.", "ex": "A strong launch strategy aligns clinical differentiation with payer value and HCP behavior."},
{"term": "Market access", "cat": "Market Access", "def": "The function focused on payer coverage, pricing, reimbursement, affordability, and patient access.", "ex": "Restrictive prior authorization is a market-access barrier."},
{"term": "Formulary", "cat": "Market Access", "def": "A payer or PBM list of covered drugs and their coverage conditions.", "ex": "Preferred formulary status can materially improve uptake."},
{"term": "Prior authorization", "cat": "Market Access", "def": "A payer requirement that approval be obtained before a therapy is covered.", "ex": "High prior-authorization burden can reduce treated patients."},
{"term": "Step therapy", "cat": "Market Access", "def": "A payer policy requiring patients to try one or more preferred therapies before another therapy is covered.", "ex": "Step therapy can delay access to a newer therapy."},
{"term": "Gross-to-net", "cat": "Market Access", "def": "The difference between list price and net revenue after rebates, discounts, fees, and chargebacks.", "ex": "A drug can have high list price but lower net revenue after rebates."},
{"term": "HEOR", "cat": "HEOR and Evidence", "def": "Health Economics and Outcomes Research, evidence work that studies value, outcomes, cost, burden, and resource use.", "ex": "HEOR supports payer value stories and reimbursement strategy."},
{"term": "RWE", "cat": "HEOR and Evidence", "def": "Real-world evidence generated from data outside traditional randomized trials, such as claims, EHR, registries, or patient-reported data.", "ex": "RWE may support post-launch evidence generation or payer discussions."},
{"term": "Claims data", "cat": "HEOR and Evidence", "def": "Administrative billing data that captures diagnoses, procedures, prescriptions, costs, and utilization.", "ex": "Claims can estimate treatment patterns but may lack clinical detail."},
{"term": "EHR data", "cat": "HEOR and Evidence", "def": "Electronic health record data containing clinical observations, labs, notes, diagnoses, and treatments.", "ex": "EHR data may capture disease severity better than claims but can be messy."},
{"term": "Registry", "cat": "HEOR and Evidence", "def": "A structured dataset tracking patients with a disease, exposure, or treatment over time.", "ex": "A registry can support long-term safety or outcomes evidence."},
{"term": "Value story", "cat": "Market Access", "def": "The evidence-based argument that a product's clinical and economic value justifies coverage and use.", "ex": "A payer value story may combine efficacy, safety, unmet need, budget impact, and real-world outcomes."},
{"term": "Budget impact model", "cat": "Market Access", "def": "A model estimating how adopting a therapy affects a payer's budget over a defined period.", "ex": "Even a cost-effective drug may face resistance if short-term budget impact is high."},
{"term": "Cost-effectiveness", "cat": "HEOR and Evidence", "def": "Analysis comparing cost and health outcomes of alternatives, often using cost per QALY or similar measures.", "ex": "Some markets require cost-effectiveness evidence for reimbursement."},
{"term": "QALY", "cat": "HEOR and Evidence", "def": "Quality-adjusted life year, a measure combining length and quality of life.", "ex": "A therapy may be evaluated by cost per QALY gained."},
{"term": "Medical Affairs", "cat": "Commercial", "def": "The function responsible for scientific exchange, evidence communication, KOL engagement, publications, and medical information.", "ex": "Medical Affairs handles scientific objections through medically governed channels."},
{"term": "Medical Information", "cat": "Commercial", "def": "The function that responds to unsolicited medical questions with accurate, balanced, and approved scientific information.", "ex": "A complex off-label question should route to Medical Information, not sales."},
{"term": "Scientific exchange", "cat": "Commercial", "def": "Non-promotional discussion of scientific evidence, typically led by Medical Affairs or MSLs.", "ex": "MSLs discuss data with KOLs within compliance boundaries."},
{"term": "Unmet need", "cat": "Industry", "def": "A gap where current therapies do not adequately address patient, clinician, or system needs.", "ex": "High unmet need can support priority development and strong launch positioning."},
{"term": "Standard of care", "cat": "Industry", "def": "The usual accepted treatment approach for a disease or patient segment.", "ex": "Payers compare a new therapy against standard of care, not against placebo alone."},
{"term": "Fast Track", "cat": "Regulatory", "def": "An FDA program to speed development and review of drugs for serious conditions with unmet need.", "ex": "Fast Track can add more frequent FDA interaction during development."},
{"term": "Breakthrough Therapy", "cat": "Regulatory", "def": "An FDA designation for therapies showing substantial early improvement over available options, adding intensive guidance.", "ex": "Strong Phase 2 data may support a Breakthrough Therapy request."},
{"term": "Accelerated Approval", "cat": "Regulatory", "def": "Approval based on a surrogate endpoint reasonably likely to predict benefit, with required confirmatory evidence.", "ex": "Accelerated Approval may rely on a biomarker while confirmatory trials continue."},
{"term": "Priority Review", "cat": "Regulatory", "def": "A shorter FDA review timeline for applications that would significantly improve treatment.", "ex": "Priority Review targets a faster action date than standard review."},
{"term": "Pre-IND meeting", "cat": "Regulatory", "def": "An early FDA meeting to align on the development plan before submitting an IND.", "ex": "A pre-IND meeting can de-risk endpoint and trial-design choices."},
{"term": "End-of-Phase-2 meeting", "cat": "Regulatory", "def": "An FDA meeting to align on Phase 3 design before pivotal trials begin.", "ex": "Endpoint agreement at End-of-Phase-2 reduces later approval risk."},
{"term": "eCTD Module 1", "cat": "Regulatory", "def": "The region-specific administrative section of a submission.", "ex": "Cover letters and application forms live in Module 1."},
{"term": "eCTD Module 3", "cat": "Regulatory", "def": "The quality and CMC section of a submission.", "ex": "Manufacturing and control data sit in Module 3."},
{"term": "eCTD Module 5", "cat": "Regulatory", "def": "The clinical study reports section of a submission.", "ex": "Pivotal trial reports are filed in Module 5."},
{"term": "Labeling", "cat": "Regulatory", "def": "The approved description of a product's indication, dosing, safety, and use.", "ex": "A narrow label can limit both commercial reach and access."},
{"term": "Regulatory variation", "cat": "Regulatory", "def": "A post-approval change to an approved product, such as a new indication, formulation, or manufacturing update.", "ex": "Adding an indication is managed as a regulatory variation."},
{"term": "Endpoint", "cat": "Clinical Science", "def": "The measured outcome used to judge a trial, such as survival, symptom change, or a biomarker.", "ex": "A meaningful primary endpoint is essential for approval."},
{"term": "Surrogate endpoint", "cat": "Clinical Science", "def": "A marker used as a stand-in for a clinical outcome, reasonably likely to predict benefit.", "ex": "Tumor shrinkage may serve as a surrogate for later outcomes."},
{"term": "Randomization", "cat": "Clinical Science", "def": "Randomly assigning participants to arms to reduce selection bias.", "ex": "Randomization balances known and unknown factors across groups."},
{"term": "Blinding", "cat": "Clinical Science", "def": "Concealing treatment assignment to reduce measurement bias.", "ex": "Double blinding hides assignment from both patients and assessors."},
{"term": "Control arm", "cat": "Clinical Science", "def": "The comparison group, receiving placebo or standard of care.", "ex": "Without a control arm, effect size is hard to interpret."},
{"term": "Statistical power", "cat": "Clinical Science", "def": "The probability of detecting a true effect if it exists, driving sample size.", "ex": "Underpowered trials risk missing a real benefit."},

function keyOf(li,di){ return "l"+li+"-"+di; }
function caseChallengesFor(ci){ return (typeof CASE_CHALLENGES!=="undefined" && CASE_CHALLENGES[String(ci)]) || []; }
function allKnowledge(){ let a=[];
  DATA.levels.forEach((l,li)=>l.drills.forEach((d,di)=>{ if(d.type==="knowledge") a.push({key:keyOf(li,di), d, where:"level-"+li, title:"Level "+(li+1)+": "+l.title}); }));
  DATA.caseStudies.forEach((c,ci)=>caseChallengesFor(ci).forEach((d,si)=>{ if(d.type==="knowledge") a.push({key:"cc"+ci+"-"+si, d, where:"case:"+ci, title:c.title}); }));
  return a; }
function allScenario(){ let a=[];
  DATA.levels.forEach((l,li)=>l.drills.forEach((d,di)=>{ if(d.type==="scenario") a.push({key:keyOf(li,di), d, where:"level-"+li, title:"Level "+(li+1)+": "+l.title}); }));
  DATA.caseStudies.forEach((c,ci)=>caseChallengesFor(ci).forEach((d,si)=>{ if(d.type==="scenario") a.push({key:"cc"+ci+"-"+si, d, where:"case:"+ci, title:c.title}); }));
  return a; }
function computeKnowledge(){
  const ks = allKnowledge(); let correct=0;
  ks.forEach(({key,d})=>{ const idx=state.answers[key]; if(idx!=null && d.options[idx] && d.options[idx].correct) correct++; });
  return { correct, total:ks.length, pct: ks.length? Math.round(correct/ks.length*100):0 };
}
function computeReadiness(){
  const ss = allScenario(); let earned=0, max=0;
  ss.forEach(({key,d})=>{ max+=PTS.strong; const idx=state.answers[key]; if(idx!=null && d.options[idx]) earned += PTS[d.options[idx].tier]; });
  return { earned, max, pct: max? Math.round(earned/max*100):0 };
}
function levelDone(li){
  const l=DATA.levels[li]; return l.drills.every((d,di)=> state.answers[keyOf(li,di)]!=null);
}

function setRing(id,pct){ const el=document.getElementById(id); if(!el) return; const C=119.38; el.style.strokeDashoffset=(C*(1-pct/100)).toFixed(2); }
function countUp(id,target){ const el=document.getElementById(id); if(!el) return; const cur=parseInt(el.textContent)||0; if(cur===target){ el.textContent=target+"%"; return; } const start=performance.now(), dur=650; function step(t){ const p=Math.min(1,(t-start)/dur); const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2; el.textContent=Math.round(cur+(target-cur)*e)+"%"; if(p<1) requestAnimationFrame(step);} requestAnimationFrame(step); }
function updateMeters(){ const k=computeKnowledge(), r=computeReadiness(); setRing("kRing",k.pct); setRing("rRing",r.pct); countUp("kPct",k.pct); countUp("rPct",r.pct); }

function drillPath(isK){
  const steps = isK ? ['Read the split','Check overlap','Decide'] : ['Clarify the ask','Structure the drivers','Recommend'];
  return `<div class="drill-path" aria-label="Answer path">${steps.map((x,i)=>`<div class="path-step"><span>${String(i+1).padStart(2,'0')}</span><b>${x}</b></div>`).join('')}</div>`;
}

function renderDrill(li,di,d){
  const key=keyOf(li,di);
  const chosen=state.answers[key];
  const answered = chosen!=null;
  const isK = d.type==="knowledge";
  let opts="";
  d.options.forEach((o,oi)=>{
    let cls="opt", mk="", tag="", fbShown="";
    const letter=String.fromCharCode(65+oi);
    if(answered){
      cls+=" disabled show-fb";
      if(isK){
        if(o.correct){ cls+=" reveal-correct"; mk="correct"; tag=`<span class="tier-tag correct">Correct</span>`; }
        else if(oi===chosen){ cls+=" reveal-wrong"; mk="wrong"; tag=`<span class="tier-tag wrong">Your pick</span>`; }
      } else {
        cls+=" reveal-"+o.tier; mk=o.tier;
        const label=o.tier==="strong"?"Strong":o.tier==="weak"?"Weak":"Trap";
        tag=`<span class="tier-tag ${o.tier}">${label}</span>`;
        if(oi===chosen) tag+=`<span class="pts">your pick, ${PTS[o.tier]} pts</span>`;
      }
      if(oi===chosen) cls+=" chosen";
      fbShown=`<div class="fb">${esc(o.fb)}</div>`;
    }
    const mkContent = answered ? (isK ? (o.correct?"&#10003;":(oi===chosen?"&#10007;":letter)) : (o.tier==="strong"?"&#10003;":o.tier==="trap"?"&#10007;":"~")) : letter;
    opts+=`<button class="${cls}" data-li="${li}" data-di="${di}" data-oi="${oi}" ${answered?'disabled':''}>
        <span class="mk ${answered?mk:''}">${mkContent}</span>
        <span>${esc(o.text)}${tag}</span>
        ${answered?'':`<kbd class="opt-key">${oi+1}</kbd>`}
        ${fbShown}
      </button>`;
  });

  let banner="";
  if(answered){
    if(isK){
      const ok=d.options[chosen].correct;
      banner=`<div class="banner ${ok?'correct':'wrong'} show">Knowledge meter updated. Review the answer above.</div>`;
    } else {
      const t=d.options[chosen].tier;
      const msg = t==="strong"?"Strong answer. Full 10 points. This is the standard to internalize.":t==="weak"?"Partial answer. 5 points. Compare it with the stronger option.":"Trap answer. 0 points. Read why the structured option wins.";
      banner=`<div class="banner ${t} show">${msg}</div>`;
    }
    banner+=`<div style="margin-top:10px"><button class="ghost" data-retry="${key}">Try this drill again</button></div>`;
  }

  return `<div class="card" style="padding:0">
    <div class="drill" style="margin:0;border:none">
      <div class="dhead">
        <span class="kind ${isK?'know':'scen'}">${isK?'Knowledge check':'Application scenario'}</span>
        <span class="qmeta">${isK?'Concept comprehension':'Interviewer question &middot; choose the best answer'}</span>
      </div>
      ${!isK && d.speaker?`<div class="speaker">${esc(d.speaker)} asks:</div>`:''}
      <div class="qtext ${isK?'':'scenq'}">${esc(d.q)}</div>
      ${drillPath(isK)}
      <div class="opts">${opts}</div>
      ${banner}
    </div>
  </div>`;
}

function wireLevel(i){
  const m=document.getElementById("main");
  m.querySelectorAll(".opt:not([disabled])").forEach(b=>{
    b.onclick=()=>{
      const li=+b.getAttribute("data-li"), di=+b.getAttribute("data-di"), oi=+b.getAttribute("data-oi");
      state.answers[keyOf(li,di)]=oi; save(); render();
      setTimeout(()=>{ const t=document.querySelector(`.card [data-di="${di}"]`); },0);
    };
  });
  m.querySelectorAll("[data-retry]").forEach(b=>{ b.onclick=()=>{ delete state.answers[b.getAttribute("data-retry")]; save(); render(); }; });
  m.querySelectorAll("[data-goto]").forEach(b=>{ b.onclick=()=>{ state.view=b.getAttribute("data-goto"); render(); window.scrollTo({top:0,behavior:"smooth"}); }; });
  m.querySelectorAll(".chip[data-term]").forEach(c=>{ c.onclick=(e)=>{ e.stopPropagation(); showTermPop(c, c.getAttribute("data-term")); }; });
  const sb=document.getElementById("startBtn"); if(sb) sb.onclick=()=>{ state.view="level-0"; render(); window.scrollTo({top:0}); };
}

const CATS = ["All","Industry","Stakeholder","Consulting Method","Communication","Finance","Regulatory","Clinical Science","Quality","Manufacturing","Commercial","Market Access","HEOR and Evidence","Digital and AI","Operations","Implementation","Veeva Domain","Fit and Behavioral"];
function renderGlossaryShell(){

  return `<div class="card">

      </div>
    </div>
    <div id="glist"></div>
  </div>`;
}
function glossaryList(){
  const q=(document.getElementById("gsearch")?.value || state.glossaryQuery || "").trim().toLowerCase();
  const cat=state.glossaryCat||"All";
  const items=DATA.glossary.filter(g=>{
    const catOk = cat==="All" || g.cat===cat;
    const s=(g.term+" "+g.def+" "+g.ex+" "+g.cat).toLowerCase();
    return catOk && (q==="" || s.includes(q));
  });
  const el=document.getElementById("glist");
  if(!items.length){ el.innerHTML=`<div class="empty">No terms match that search. Try a shorter keyword or clear the filter.</div>`; return; }
  const limit = (!q && cat==="All") ? 36 : items.length;
  const shown = items.slice(0, limit);
  el.innerHTML=(limit<items.length?`<div class="show-all-note"><b>Start with search.</b> Showing the first ${limit} of ${items.length} terms so the knowledge base stays readable. Search or choose a category to narrow it.</div>`:"")+shown.map(g=>`
    <div class="gitem">
      <h4>${esc(g.term)} <span class="gcat">${esc(g.cat)}</span></h4>
      <div class="def">${esc(g.def)}</div>
      <div class="ex"><b>Example.</b> ${esc(g.ex)}</div>
    </div>`).join("");
}
function wireGlossary(){
  glossaryList();
  const s=document.getElementById("gsearch");
  if(s){ s.oninput=()=>{ state.glossaryQuery=s.value; glossaryList(); }; s.focus(); s.setSelectionRange(s.value.length,s.value.length); }
  document.querySelectorAll("#gfilters .fbtn").forEach(b=>{ b.onclick=()=>{ state.glossaryCat=b.getAttribute("data-cat"); render(); }; });
}

function glossaryLookup(term){
  const t=(term||"").toLowerCase();
  return DATA.glossary.find(g=>g.term.toLowerCase()===t)
      || DATA.glossary.find(g=>g.term.toLowerCase().replace(/[^a-z0-9 ]/g,"").startsWith(t.replace(/[^a-z0-9 ]/g,"").split(" ")[0]))
      || null;
}

const V18_TERMS = [
  {term:"Dirty data",cat:"Consulting Method",def:"Data that contains missing values, inconsistent definitions, duplicates, outliers, or conflicting sources.",ex:"A manager expects you to flag dirty data before building a recommendation."},
  {term:"Issue tree",cat:"Consulting Method",def:"A structured breakdown of a problem into mutually exclusive, collectively exhaustive branches.",ex:"A safety backlog issue tree separates demand, capacity, process quality, and governance."},
  {term:"Answer builder",cat:"Consulting Method",def:"A workspace that converts analysis into executive-ready recommendation language.",ex:"The answer builder forces you to write the synthesis, evidence, risk, and next step."},
  {term:"Manager prompt",cat:"Consulting Method",def:"A short instruction from a senior consultant that reframes the analysis and raises the bar.",ex:"A manager prompt may ask what assumption would flip the recommendation."},
  {term:"Data room",cat:"Consulting Method",def:"A collection of case facts, tables, interviews, and exhibits used for analysis.",ex:"A diligence case begins in the data room, not in the final deck."},
  {term:"Client-ready",cat:"Consulting Method",def:"Clear, concise, defensible enough to show to the client without heavy rework.",ex:"A client-ready page names the decision, evidence, risk, and next step."},
  {term:"Triangulation",cat:"Consulting Method",def:"Checking an answer against multiple sources or methods instead of relying on one number.",ex:"Market size should be triangulated from epidemiology, claims, and analog uptake."},
  {term:"Sensitivity",cat:"Finance",def:"A test showing how the conclusion changes when an assumption changes.",ex:"A recommendation is more defensible when the sensitivity shows the break-even point."},
  {term:"Break-even",cat:"Finance",def:"The point where benefit equals cost or where a decision flips.",ex:"If automation uplift falls below 11 percent, the program no longer breaks even."},
  {term:"Payer mix",cat:"Market Access",def:"The distribution of patients across commercial, Medicare, Medicaid, cash, or other payer types.",ex:"Payer mix changes gross-to-net and prior authorization burden."},
  {term:"Line of therapy",cat:"Clinical Science",def:"The treatment sequence position, such as first line, second line, or later line.",ex:"Moving from third line to second line can greatly expand addressable patients."},
  {term:"Evidence gap",cat:"HEOR and Evidence",def:"The missing proof needed for a stakeholder to accept the recommendation.",ex:"A payer evidence gap may be budget impact rather than efficacy."},
  {term:"Operating model",cat:"Operations",def:"How work is owned, governed, staffed, measured, and executed.",ex:"Technology alone fails if the operating model does not change."},
  {term:"Root cause",cat:"Quality",def:"The underlying reason a problem occurs, not merely its visible symptom.",ex:"A data-integrity finding may come from access governance, not one bad record."},
  {term:"Go/no-go",cat:"Finance",def:"A decision to continue, stop, or delay investment based on evidence and risk.",ex:"A diligence memo often ends with a go, no-go, or staged go recommendation."}
];
V18_TERMS.forEach(t=>{ if(!DATA.glossary.some(g=>g.term.toLowerCase()===t.term.toLowerCase())) DATA.glossary.push(t); });
function reEsc(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function termify(txt){
  const source=String(txt);
  const terms=V18_TERMS.concat(DATA.glossary.filter(g=>['rNPV','NPV','HEOR','RWE','ICSR','CAPA','gross-to-net','PoS','eCTD','RIM','Market access','Biosimilar','Interchangeability','Root cause','Operating model'].includes(g.term))).map(g=>g.term).sort((a,b)=>b.length-a.length);
  const ranges=[];
  terms.forEach(term=>{
    const rg=new RegExp('(^|[^A-Za-z0-9-])('+reEsc(term)+')(?=$|[^A-Za-z0-9-])','gi');
    let m;
    while((m=rg.exec(source))){
      const st=m.index+m[1].length, en=st+m[2].length;
      if(!ranges.some(r=>st<r.e && en>r.s)) ranges.push({s:st,e:en,term});
      if(m.index===rg.lastIndex) rg.lastIndex++;
    }
  });
  ranges.sort((a,b)=>a.s-b.s);
  let out='', pos=0;
  ranges.forEach(r=>{ out+=esc(source.slice(pos,r.s)); out+='<span class="term-def chip" tabindex="0" data-term="'+esc(r.term)+'">'+esc(source.slice(r.s,r.e))+'</span>'; pos=r.e; });
  out+=esc(source.slice(pos));
  return out;
}

  {cat:"HEOR", diff:"Very hard", q:"A model shows a therapy is cost-effective, but assumptions depend on durability beyond observed follow-up. How should the recommendation be framed?", options:[["strong","State that the value case depends on durability, show the threshold where it breaks, and propose evidence generation to validate the assumption."],["weak","Present the model because cost-effectiveness supports the therapy."],["trap","Hide the durability assumption because it makes the value story less persuasive."]]},
  {cat:"Manufacturing", diff:"Hard", q:"A launch forecast assumes demand can be met, but batch release history shows recurring QA delays. What is the right synthesis?", options:[["strong","Commercial demand is not the only constraint. The recommendation needs a supply and release-capacity check before committing to launch uptake."],["weak","Note supply risk in the appendix."],["trap","Keep the forecast because manufacturing is outside commercial strategy."]]},
  {cat:"BD diligence", diff:"Very hard", q:"A target asset has attractive rNPV but depends on a single unvalidated biomarker subgroup. What should the diligence memo say?", options:[["strong","The financial upside is conditional on biomarker validation. Recommend staged diligence focused on evidence quality before a full go decision."],["weak","Proceed because high rNPV justifies the risk."],["trap","Treat the biomarker as proven if management believes in it."]]},
  {cat:"AI governance", diff:"Hard", q:"A client wants to use an LLM to draft safety narratives. What is the strongest consultant response?", options:[["strong","Define human review, audit trail, validation, error monitoring, and scope limits before using LLM output in a regulated workflow."],["weak","Pilot it in a low-risk workflow first."],["trap","Use it immediately because LLMs are good at writing narratives."]]},
  {cat:"Manager review", diff:"Very hard", q:"Your manager asks, 'What would you cut if the client only funds half the plan?' What should you answer?", options:[["strong","Cut lower-value activities first while preserving the decision-critical workstream, risk control, and measurement plan. State the tradeoff explicitly."],["weak","Cut the most expensive workstream to meet budget."],["trap","Say the full plan is required and refuse to prioritize."]]}
);
function practicalScore(){ const qs=DEEP_QS.length; const ans=Object.values(practicalState.qbank||{}); let earned=0; ans.forEach(a=>{ const tier=(DEEP_QS[a.i]&&DEEP_QS[a.i].options[a.oi]&&DEEP_QS[a.i].options[a.oi][0])||'trap'; earned+=tier==='strong'?10:tier==='weak'?5:0; }); const rub=Object.values(practicalState.rubrics||{}).reduce((n,x)=>n+Object.values(x||{}).filter(Boolean).length,0); return {qAnswered:ans.length, qTotal:qs, qPts:earned, qMax:qs*10, rubric:rub}; }

DEEP_QS.push(
  {cat:"Portfolio", diff:"Partner", q:"A biotech has one large-market asset with payer evidence gaps and one orphan asset with cleaner biomarker data. The CEO asks which one to fund before a financing. What is the best framing?", options:[["strong","Frame the decision around risk-adjusted value to the next financing milestone, not raw market size. Compare endpoint credibility, access path, cost, time to inflection, and option value."],["weak","Pick the large-market asset because investors prefer big TAM stories."],["trap","Pick the orphan asset only because orphan pricing is high."]]},
  {cat:"Clinical strategy", diff:"Partner", q:"A rare-disease trial is behind enrollment. Adding countries is faster on paper, but patient groups say travel burden is the bottleneck. What should you do first?", options:[["strong","Diagnose the enrollment funnel before adding sites: activation time, screen failure, travel burden, retention, protocol deviations, and country data quality. Then combine patient-support levers with selective site expansion."],["weak","Add the countries with the largest diagnosed pools immediately."],["trap","Loosen inclusion criteria because it is the cheapest way to increase eligible patients."]]},
  {cat:"Market access", diff:"Partner", q:"A launch team wants to promote the broadest GLP-1 population first, but payer restrictions and supply caps are severe. What is the senior answer?", options:[["strong","Prioritize a defensible launch wedge where evidence, access, HCP readiness, and supply can support uptake. Track PA approval, fill capacity, abandonment, and persistence before widening promotion."],["weak","Launch broadly because demand is already very high."],["trap","Focus on self-pay only because payer friction is lower."]]},
  {cat:"AI and evidence", diff:"Partner", q:"Medical Affairs wants an AI engine for KOL insights, evidence gaps, and field next-best actions. Compliance is worried. Which pilot is most defensible?", options:[["strong","Start with reviewable evidence gap mapping or literature surveillance, with source traceability, human review, approved-use boundaries, monitoring, and audit logs before any field-facing recommendation."],["weak","Start with all use cases so the organization can learn faster."],["trap","Start with field next-best action because it is the most visible demo."]]},
  {cat:"RWE", diff:"Hard", q:"A payer rejects a value story because the RWE comparator cohort is sicker than the treated cohort. What should the consultant say?", options:[["strong","Do not oversell the result. Diagnose confounding, define a better comparator strategy, run sensitivity analyses, and state what claim the evidence can and cannot support."],["weak","Explain that RWE is always accepted because it is real-world."],["trap","Remove the comparator slide and keep the positive result only."]]},
  {cat:"Operations", diff:"Partner", q:"A sponsor wants to cut clinical operations cost by centralizing monitoring, but site burden and data-query cycle time are worsening. What is the right problem statement?", options:[["strong","This is a throughput and quality trade-off, not just a cost case. Analyze monitoring productivity, query cycle time, protocol complexity, site burden, risk-based monitoring thresholds, and patient-impact metrics."],["weak","Centralization is always better because it reduces fixed cost."],["trap","Push more queries to sites because that improves data quality."]]}
);

function renderDeepQBank(){ const cats=['All',...Array.from(new Set(DEEP_QS.map(q=>q.cat)))]; const active=practicalState.activeQCat||'All'; let list=DEEP_QS.map((q,i)=>Object.assign({i},q)).filter(q=>active==='All'||q.cat===active); const compactAll=active==='All'; const sc=practicalScore(); return `<div class="card studio-hero drill-hero"><div class="eyebrow">Drills</div><h2>Sharp reps for messy judgment.</h2><p class="lede">Not trivia. These prompts train the kind of answer you can defend when a manager pushes back.</p><div class="section-guide" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22);color:#eef7ff"><b style="color:#fff">Drill flow:</b> choose one category, answer a few prompts, then review the misses while the logic is fresh.</div><div class="studio-progress"><div class="mini"><h4>${sc.qAnswered}/${sc.qTotal}</h4><p>answered</p></div><div class="mini"><h4>${sc.qPts}/${sc.qMax}</h4><p>points</p></div><div class="mini"><h4>${sc.qMax?Math.round(sc.qPts/sc.qMax*100):0}%</h4><p>practical score</p></div></div><div class="q-tabs">${cats.map(c=>`<button class="q-tab ${active===c?'active':''}" data-q-cat="${esc(c)}">${esc(c)}</button>`).join('')}</div></div><div class="qbank-grid ${compactAll?'compact':''}">${list.map(q=>renderDeepQ(q)).join('')}</div>${compactAll?`<div class="show-all-note"><b>Keep it focused:</b> the default view shows five prompts. Pick a category when you want a targeted rep.</div>`:''}`; }
function renderDeepQ(q){

function qFeedback(t){ return t==='strong'?'This is manager-ready because it states the decision logic, caveat, and next analytic step.':t==='weak'?'Partly right, but it is too generic or misses the decision-driving assumption.':'Trap answer. It overclaims, skips structure, or confuses a symptom for the underlying problem.'; }
function wireDeepQBank(){ document.querySelectorAll('[data-q-cat]').forEach(b=>b.onclick=()=>{ practicalState.activeQCat=b.getAttribute('data-q-cat'); savePractical(); render(); window.scrollTo({top:0,behavior:'smooth'}); }); document.querySelectorAll('[data-q-pick]').forEach(b=>b.onclick=()=>{ const [i,oi]=b.getAttribute('data-q-pick').split(':').map(Number); practicalState.qbank[i]={i,oi}; savePractical(); render(); }); }

function snapshotForCloud(){ return {version:READYTOCONSULT_VERSION, updatedAt:new Date().toISOString(), lastView:state.view, answers:state.answers, ui:uiState, capstone:capState, strategy:stratState, notebook:notebookState, practical:practicalState}; }

let __cloudSaveTimer=null;

async function saveCloudProgress(){ if(!cloud.user || !cloud.client) return; cloud.saving=true; updateAuthButton(); const payload=snapshotForCloud(); const {error}=await cloud.client.from('readytoconsult_progress').upsert({user_id:cloud.user.id,data:payload,updated_at:payload.updatedAt}); cloud.saving=false; if(error){ cloud.status='error'; cloud.message='Cloud save failed'; console.warn(error); } else { cloud.status='cloud'; cloud.message='Synced'; cloud.lastSync=payload.updatedAt; } updateAuthButton(); }
async function loadCloudProgress(){ if(!cloud.user || !cloud.client) return; const {data,error}=await cloud.client.from('readytoconsult_progress').select('data,updated_at').eq('user_id',cloud.user.id).maybeSingle(); if(error){ cloud.status='error'; cloud.message='Cloud load failed'; updateAuthButton(); return; } if(data && data.data){ applyCloudSnapshot(data.data); cloud.status='cloud'; cloud.message='Cloud loaded'; cloud.lastSync=data.updated_at; } else { await saveCloudProgress(); cloud.status='cloud'; cloud.message='Cloud initialized'; } cloud.loaded=true; render(); }
async function initAuth(){ const client=initCloudClient(); if(!client){ cloud.status='local'; cloud.message='Cloud not configured'; updateAuthButton(); return; } const {data}=await client.auth.getSession(); cloud.user=data.session&&data.session.user||null; client.auth.onAuthStateChange((event,session)=>{ cloud.user=session&&session.user||null; cloud.status=cloud.user?'cloud':'local'; cloud.message=cloud.user?'Signed in':'Local only'; updateAuthButton(); if(cloud.user) loadCloudProgress(); }); if(cloud.user) await loadCloudProgress(); else updateAuthButton(); }

d.status='local'; cloud.message='Local only'; closeAuthModal(); render(); }; const magic=document.getElementById('magicBtn'); if(magic) magic.onclick=sendMagicLink;  }

function stratCalc(prefix){ const m=stratState.model; const patients=m[prefix+'Patients'], elig=m[prefix+'Eligible']/100, share=m[prefix+'Share']/100, price=m[prefix+'Price'], gtn=m[prefix+'GTN']/100, cogs=m[prefix+'COGS']/100, launch=m[prefix+'Launch'], pos=m[prefix+'PoS']/100; const treated=patients*elig*share; const gross=treated*price; const net=gross*(1-gtn); const gm=net*(1-cogs); const peak=net; const risk=gm*pos-launch; return {treated,gross,net,gm,peak,risk,pos}; }

]; return `<div class="card"><div class="eyebrow">Synthetic data pack</div><h2 style="font-size:20px">Proprietary-style diligence file, built from public-case patterns</h2><div class="synthetic-note"><b>Training data.</b> Synthetic case data, built to mimic an internal diligence pack: mixed sources, missing fields, conflicting ranges, and reliability flags.</div><table class="dirty-table"><thead><tr>${rows[0].map(x=>`<th>${esc(x)}</th>`).join('')}</tr></thead><tbody>${rows.slice(1).map(r=>`<tr><td>${esc(r[0])}</td><td><span class="source-pill">${esc(r[1])}</span></td><td>${esc(r[2])}</td><td>${esc(r[3])}</td><td>${esc(r[4])}</td><td class="${r[4]==='Low'?'flag':'okflag'}">${esc(r[5])}</td></tr>`).join('')}</tbody></table><div class="callout"><b>Analyst task:</b> never average sources blindly. Decide which source drives the model, which source is a risk flag, and which missing field requires diligence.</div></div>`; }
function stratDCF(prefix,over){ const base=Object.assign({},stratState.model,over||{}); const old=stratState.model; stratState.model=base; const c=stratCalc(prefix); stratState.model=old; const ramp=[.15,.35,.60,.80,1.0]; const disc=(base.discount||10)/100; let pv=0; ramp.forEach((r,i)=>{ const cf=c.gm*r; pv+=cf/Math.pow(1+disc,i+1); }); const npv=pv-base[prefix+'Launch']; const rnpv=(pv*(base[prefix+'PoS']/100))-base[prefix+'Launch']; return {npv,rnpv,peak:c.peak,gm:c.gm}; }
function strategySensitivity(){ const prefix=stratState.asset||'oph'; const label=prefix==='oph'?'Ophthalmology biosimilar':'Dermatology therapy'; const base=stratDCF(prefix,{}); const m=stratState.model; const tests=[

  const tabs=[['brief','Brief'],['data','Data room'],['model','Model'],['scenarios','Scenarios'],['hypotheses','Hypotheses'],['inbox','Inbox'],['slides','Slide builder'],['redteam','Red team'],['memo','Memo'],['rubric','Partner review']];
  let h=`<div class="card cap-hero"><div class="eyebrow">75-minute capstone</div><h2>${esc(CAPSTONE.title)}</h2><p class="lede">${esc(CAPSTONE.prompt)}</p><div class="cap-timer"><div><div style="font-size:12px;color:#cfe0f5;font-weight:850;text-transform:uppercase;letter-spacing:.6px">Capstone clock</div><div class="cap-clock" id="capClock">${capTime()}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="ghost" id="capStart">${capState.started?'Pause':'Start 75 min'}</button><button class="ghost" id="capReset">Reset timer</button></div></div><div class="cap-tabs">${tabs.map(t=>`<button class="cap-tab ${capState.tab===t[0]?'active':''}" data-cap-tab="${t[0]}">${t[1]}</button>`).join('')}</div></div>`;
  if(capState.tab==='brief') h+=capBrief();
  if(capState.tab==='data') h+=capDataRoom();
  if(capState.tab==='model') h+=capModel();
  if(capState.tab==='scenarios') h+=capScenarios();
  if(capState.tab==='hypotheses') h+=capHypotheses();
  if(capState.tab==='inbox') h+=capInbox();
  if(capState.tab==='slides') h+=capSlides();
  if(capState.tab==='redteam') h+=capRedTeam();
  if(capState.tab==='memo') h+=capMemo();
  if(capState.tab==='rubric') h+=capRubric();
  return h;
}
function capTime(){ const s=Math.max(0,capState.secondsLeft|0); const m=Math.floor(s/60), r=s%60; return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0'); }
function capBrief(){ return `<div class="card"><div class="eyebrow">Client context</div><h2 style="font-size:20px">${esc(CAPSTONE.client)}</h2><p class="sub">Your task is not to guess a product. Your task is to turn messy operations data into a fundable recommendation.</p><ol class="steps"><li><b>Clarify the problem.</b> Is this demand, capacity, quality, governance, or adoption?</li><li><b>Use the data room.</b> Do not trust any single stakeholder quote without checking the numbers.</li><li><b>Build a model.</b> Test how automation, temporary capacity, and implementation cost change the answer.</li><li><b>Write the deck.</b> Synthesize the answer first, then show the evidence and risk.</li><li><b>Score yourself.</b> Use the partner rubric before calling the answer done.</li></ol><div class="callout"><b>Real-work standard:</b> the strongest answer separates the operating diagnosis from the technology recommendation. It names the bottleneck, quantifies the impact, and explains what must be governed so the solution sticks.</div></div>`; }
function capTable(rows){ return `<table><thead><tr>${rows[0].map(x=>`<th>${esc(x)}</th>`).join('')}</tr></thead><tbody>${rows.slice(1).map(r=>`<tr>${r.map(x=>`<td>${esc(x)}</td>`).join('')}</tr>`).join('')}</tbody></table>`; }
function capDataRoom(){ return `<div class="card"><div class="eyebrow">Client data room</div><h2 style="font-size:20px">Messy but decision-relevant inputs</h2><p class="sub">The data is intentionally incomplete. A consultant should state assumptions, triangulate, and avoid pretending precision that is not supported.</p><div class="data-grid"><div class="data-card"><h4>Safety operations</h4>${capTable(CAPSTONE.safety)}<div class="data-note">Backlog keeps rising even though processed volume is stable.</div></div><div class="data-card"><h4>Clinical operations</h4>${capTable(CAPSTONE.clinical)}<div class="data-note">Enrollment issue may compete for the same leadership budget.</div></div><div class="data-card"><h4>Launch access funnel</h4>${capTable(CAPSTONE.access)}<div class="data-note">Access constraints mean launch value is not equal to diagnosed population.</div></div></div></div><div class="card"><div class="eyebrow">Stakeholder notes</div><h2 style="font-size:20px">Conflicting quotes to reconcile</h2><div class="quote-stack">${CAPSTONE.quotes.map(q=>`<div class="quote ${q.type}"><b>${esc(q.who)}:</b> ${esc(q.text)}</div>`).join('')}</div></div>`; }
function capCalc(){ const m=capState.model; const proposed=m.capacity*(1+m.automation/100)+m.fte*m.fteOutput; const status=m.intake-m.capacity; const burn=proposed-m.intake; const months=burn>0?m.backlog/burn:999; const backlogReduced=Math.min(m.backlog,Math.max(0,burn)*12); const gross=backlogReduced*m.lateCost; const cost=m.implementation+(m.fte*m.contractorCost*12); const net=gross-cost; const payback=net>0?cost/(Math.max(1,gross/12)):999; return {proposed,status,burn,months,backlogReduced,gross,cost,net,payback}; }
function money(n){ return '$'+Math.round(n).toLocaleString(); }
function capModel(){ const m=capState.model, c=capCalc(); const field=(k,label)=>`<div class="model-field"><label>${label}</label><input type="number" data-cap-model="${k}" value="${esc(m[k])}"></div>`; return `<div class="card"><div class="eyebrow">Interactive model</div><h2 style="font-size:20px">Capacity and business case builder</h2><p class="sub">Change assumptions and watch the recommendation economics move. This is the closest part to real work.</p><div class="work-grid"><div><div class="model-grid">${field('intake','Monthly intake')}${field('capacity','Current processed')}${field('backlog','Current backlog')}${field('automation','Automation uplift %')}${field('fte','Temporary FTE')}${field('fteOutput','Cases per FTE')}${field('lateCost','Value per late case avoided')}${field('implementation','Implementation cost')}${field('contractorCost','Monthly cost per FTE')}</div></div><div><div class="model-output"><div class="metric ${c.status>0?'bad':'good'}"><small>Status quo monthly gap</small><b>${Math.round(c.status)}</b></div><div class="metric ${c.burn>0?'good':'bad'}"><small>Proposed net burn</small><b>${Math.round(c.burn)}</b></div><div class="metric"><small>Months to clear backlog</small><b>${c.months>60?'Never':c.months.toFixed(1)}</b></div><div class="metric ${c.net>0?'good':'bad'}"><small>12-month net value</small><b>${money(c.net)}</b></div><div class="metric"><small>Backlog reduced in 12 mo</small><b>${Math.round(c.backlogReduced)}</b></div><div class="metric"><small>Payback months</small><b>${c.payback>60?'N/A':c.payback.toFixed(1)}</b></div></div></div></div><div class="callout" style="margin-top:14px"><b>Consultant synthesis prompt:</b> Does the model support funding the program? If yes, what governance condition must be true for the recommendation to hold?</div></div>`; }
function capCalcFor(overrides){ const old=capState.model; capState.model=Object.assign({},old,overrides||{}); const out=capCalc(); capState.model=old; return out; }
function capScenarios(){ const m=capState.model; const rows=[
  ['Conservative',{automation:12,fte:2,implementation:700000}],
  ['Base case',{}],
  ['Aggressive',{automation:30,fte:6,implementation:900000}]
].map(x=>{ const mm=Object.assign({},m,x[1]); const c=capCalcFor(mm); return {name:x[0],m:mm,c}; });
return `<div class="card"><div class="eyebrow">Scenario compare</div><h2 style="font-size:20px">Stress-test the recommendation</h2><p class="sub">Managers will ask what happens if the assumptions are wrong. Compare conservative, base, and aggressive cases before presenting.</p><table class="scenario-table"><thead><tr><th>Scenario</th><th>Automation</th><th>Temp FTE</th><th>Months to clear</th><th>12-mo net value</th><th>Payback</th><th>Readout</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.name}</td><td>${r.m.automation}%</td><td>${r.m.fte}</td><td>${r.c.months>60?'Never':r.c.months.toFixed(1)}</td><td><b class="${r.c.net>0?'good':'bad'}">${money(r.c.net)}</b></td><td>${r.c.payback>60?'N/A':r.c.payback.toFixed(1)+' mo'}</td><td>${r.c.net>0?'Fundable if governance holds':'Not fundable on economics alone'}</td></tr>`).join('')}</tbody></table><div class="callout"><b>Partner prompt:</b> If the conservative case is weak, explain which risk you would de-risk first before asking for full funding.</div></div>`; }
function capHypotheses(){ const hs=capState.hypotheses||[]; return `<div class="card"><div class="eyebrow">Hypothesis tracker</div><h2 style="font-size:20px">Manage the case like a consultant</h2><p class="sub">Write hypotheses, evidence, and confidence. This trains the habit of testing a point of view rather than collecting facts forever.</p><div class="hyp-grid"><label>Hypothesis</label><label>Evidence or disconfirming fact</label><label>Confidence</label>${hs.map((h,i)=>`<div class="hyp-row"><textarea data-cap-hyp="${i}:h">${esc(h.h)}</textarea><textarea data-cap-hyp="${i}:e">${esc(h.e)}</textarea><select data-cap-hyp="${i}:c"><option ${h.c==='Low'?'selected':''}>Low</option><option ${h.c==='Medium'?'selected':''}>Medium</option><option ${h.c==='High'?'selected':''}>High</option></select></div>`).join('')}</div><div style="margin-top:12px"><button class="ghost" id="addHyp">Add hypothesis</button></div></div>`; }
const INBOX=[
  {id:'coo', from:'COO', body:'I need a simple answer by Friday. Is this worth funding, or are we over-engineering the safety process?', replies:[['strong','Yes, but I would fund it in two gates: immediate triage standardization plus temporary capacity, then automation after governance rules are locked.'],['weak','Yes, because the model has a positive ROI and the team needs a better workflow.'],['trap','Absolutely. The technology will solve the backlog and should be approved immediately.']]},
  {id:'finance', from:'Finance VP', body:'Your business case depends on value per late case avoided. What if that number is too high?', replies:[['strong','I would show the conservative case separately and frame the decision around compliance risk plus backlog burn, not only financial upside.'],['weak','We can adjust the assumption later if needed.'],['trap','The assumption is directionally correct, so the exact value does not matter.']]},
  {id:'safety', from:'Head of Safety', body:'My team thinks the backlog is caused by inconsistent triage, not low effort. How will you avoid blaming the team?', replies:[['strong','I would position this as a system design issue: standardize intake rules, protect quality, and add capacity where the process is currently overloaded.'],['weak','I would reassure them that the project is meant to help, not blame.'],['trap','I would avoid discussing process variation and focus on the executive ROI case.']]}
];
function capInbox(){ return `<div class="card"><div class="eyebrow">Stakeholder inbox</div><h2 style="font-size:20px">Choose client-ready replies</h2><p class="sub">Real projects require short, precise responses to anxious stakeholders. Pick the strongest reply, then read the feedback.</p><div class="inbox-list">${INBOX.map(msg=>{ const chosen=capState.inbox[msg.id]; return `<div class="inbox-msg"><div class="inbox-from">${esc(msg.from)}</div><div class="inbox-body">${esc(msg.body)}</div><div class="inbox-replies">${msg.replies.map((r,i)=>{ const is=chosen===i; const fb=r[0]==='strong'?'Best. It answers directly, shows judgment, and protects the client relationship.':r[0]==='weak'?'Partial. It is polite but does not resolve the decision risk.':'Trap. It overclaims or avoids the real issue.'; return `<button class="reply ${is?'chosen '+r[0]:''}" data-cap-inbox="${msg.id}:${i}">${esc(r[1])}${is?`<div class="reply-fb">${fb}</div>`:''}</button>`; }).join('')}</div></div>`; }).join('')}</div></div>`; }
function capRedTeam(){ const qs=[['What would make your recommendation wrong?','Name the assumption that would flip the answer, then show how you would test it.'],['Why is this not just a technology implementation?','Separate workflow, governance, adoption, and system enablement.'],['What would you cut if the client only funds half the program?','Prioritize actions by risk reduction and payback.'],['How do you avoid disrupting safety quality while increasing throughput?','Discuss quality gates, medical review, and signal detection controls.'],['What is your first 30-day plan?','Turn the recommendation into actions, owners, and decision milestones.']]; return `<div class="card"><div class="eyebrow">Red team review</div><h2 style="font-size:20px">Prepare for partner challenge questions</h2><p class="sub">These are the questions a manager asks before letting a junior consultant present to the client.</p><div class="red-grid">${qs.map((q,i)=>`<div class="red-q"><b>${i+1}. ${esc(q[0])}</b><textarea data-cap-red="${i}" placeholder="Draft your answer here.">${esc(capState.redteam[i]||'')}</textarea><div class="red-hint">Strong answer cue: ${esc(q[1])}</div></div>`).join('')}</div></div>`; }
function capMemoText(){ const c=capCalc(), s=capState.slides; return `To: COO and R&D leadership\nSubject: Safety operations transformation recommendation\n\nRecommendation\n${s.summary||'Fund a staged 12-month safety operations program if governance and triage standardization are included, not as a technology-only implementation.'}\n\nEvidence\nCurrent intake is ${capState.model.intake} cases per month against ${capState.model.capacity} processed, creating a status quo gap of ${Math.round(c.status)} cases per month. Under the current modeled assumptions, proposed net burn is ${Math.round(c.burn)} cases per month, backlog reduction over 12 months is ${Math.round(c.backlogReduced)} cases, and 12-month net value is ${money(c.net)}.\n\nOperating answer\n${s.recommendation||'Sequence the work in two gates: first standardize triage and add temporary capacity, then implement workflow automation once rules and ownership are clear.'}\n\nRisks and next steps\n${s.risks||'The main risk is overstating the value per late case avoided or underestimating adoption friction. First 30 days should validate triage variation, confirm quality controls, and lock the conservative case.'}`; }
function capMemo(){ const memo=capMemoText(); return `<div class="card"><div class="eyebrow">Client-ready memo</div><h2 style="font-size:20px">Generate a one-page executive memo</h2><p class="sub">This converts your model and slide work into a concise written deliverable. Use it to rehearse executive communication.</p><div class="memo-box" id="memoBox">${esc(memo)}</div><div class="memo-actions"><button class="ghost" id="copyMemo">Copy memo</button><span class="copy-note" id="copyNote"></span></div></div>`; }
function capSlides(){ const s=capState.slides; const input=(k,title,ph)=>`<div class="slide-input"><label style="font-size:11px;text-transform:uppercase;letter-spacing:.55px;color:var(--muted);font-weight:900">${title}</label><textarea data-cap-slide="${k}" placeholder="${ph}">${esc(s[k])}</textarea></div>`; const fallback={summary:'Recommendation in one sentence. Include funding decision and expected impact.',analysis:'Key math and facts from the model or data room.',recommendation:'Operating model, technology, governance, and sequencing.',risks:'Main assumption, risk, and next step to de-risk.'}; return `<div class="card"><div class="eyebrow">Slide builder</div><h2 style="font-size:20px">Build a mini executive deck</h2><p class="sub">Write concise slide content. The preview forces answer-first consulting communication.</p><div class="slide-grid"><div>${input('summary','Slide 1: Executive summary','Fund the 12-month program because...')}${input('analysis','Slide 2: Evidence and math','The backlog is growing by...')}${input('recommendation','Slide 3: Recommendation','Prioritize triage standardization, workflow automation, and temporary capacity...')}${input('risks','Slide 4: Risks and next steps','The recommendation depends on...')}</div><div class="deck" id="deckPreview">${['summary','analysis','recommendation','risks'].map((k,i)=>`<div class="slide-card"><h4>Slide ${i+1}: ${['Executive Summary','Evidence and Math','Recommendation','Risks and Next Steps'][i]}</h4><p>${esc(s[k]||fallback[k])}</p></div>`).join('')}</div></div><div style="margin-top:12px"></div></div>`; }
function capRubric(){ const r=capState.rubric; const items=[['structure','Problem structure','Separates demand, capacity, process, governance, and adoption.'],['quant','Quantitative rigor','Uses model outputs and labels assumptions instead of handwaving.'],['synthesis','Synthesis','Answer-first, with a clear fund or no-fund recommendation.'],['client','Client readiness','Names owner, sequencing, adoption, and decision risk.'],['honesty','Honesty','Does not overstate precision or claim the data proves more than it does.'],['action','Next step','Defines what to test next in the first 30 days.']]; const score=items.filter(x=>r[x[0]]).length*100/items.length; return `<div class="card"><div class="eyebrow">Partner review rubric</div><h2 style="font-size:20px">Score your work like a manager would</h2><div class="work-grid"><div class="rubric-grid">${items.map(x=>`<label class="rub-card"><input type="checkbox" data-cap-rubric="${x[0]}" ${r[x[0]]?'checked':''}><span><b>${x[1]}</b><small>${x[2]}</small></span></label>`).join('')}</div><div style="display:grid;place-items:center;gap:12px"><div class="score-ring" style="--p:${score}%"><span>${Math.round(score)}</span></div><p class="sub" style="text-align:center">80+ means the answer is client-ready. Below 60 means revise before presenting.</p><button class="ghost" data-cap-tab="slides" style="background:var(--accent);color:#fff;border-color:var(--accent)">Return to deck</button></div></div></div>`; }
let __capTimer=null;
function wireCapstone(){
  document.querySelectorAll('[data-cap-tab]').forEach(b=>{ b.onclick=()=>{ capState.tab=b.getAttribute('data-cap-tab'); saveCapstone(); render(); window.scrollTo({top:0,behavior:'smooth'}); }; });
  const st=document.getElementById('capStart'); if(st) st.onclick=()=>{ capState.started=!capState.started; saveCapstone(); capTimerTick(); render(); };
  const rs=document.getElementById('capReset'); if(rs) rs.onclick=()=>{ capState.secondsLeft=4500; capState.started=false; saveCapstone(); render(); };
  document.querySelectorAll('[data-cap-model]').forEach(inp=>{ inp.oninput=()=>{ capState.model[inp.getAttribute('data-cap-model')]=+inp.value||0; saveCapstone(); render(); }; });
  document.querySelectorAll('[data-cap-slide]').forEach(t=>{ t.oninput=()=>{ capState.slides[t.getAttribute('data-cap-slide')]=t.value; saveCapstone(); refreshDeckPreview(); }; });
  document.querySelectorAll('[data-cap-rubric]').forEach(c=>{ c.onchange=()=>{ capState.rubric[c.getAttribute('data-cap-rubric')]=c.checked; saveCapstone(); render(); }; });
  document.querySelectorAll('[data-cap-hyp]').forEach(el=>{ el.oninput=()=>{ const [i,k]=el.getAttribute('data-cap-hyp').split(':'); capState.hypotheses[+i][k]=el.value; saveCapstone(); }; });
  const ah=document.getElementById('addHyp'); if(ah) ah.onclick=()=>{ capState.hypotheses.push({h:'',e:'',c:'Medium'}); saveCapstone(); render(); };
  document.querySelectorAll('[data-cap-inbox]').forEach(b=>{ b.onclick=()=>{ const [id,i]=b.getAttribute('data-cap-inbox').split(':'); capState.inbox[id]=+i; saveCapstone(); render(); }; });
  document.querySelectorAll('[data-cap-red]').forEach(t=>{ t.oninput=()=>{ capState.redteam[t.getAttribute('data-cap-red')]=t.value; saveCapstone(); }; });
  const cm=document.getElementById('copyMemo'); if(cm) cm.onclick=()=>{ const txt=capMemoText(); navigator.clipboard&&navigator.clipboard.writeText(txt); const n=document.getElementById('copyNote'); if(n) n.textContent='Copied'; };
}
function refreshDeckPreview(){ const prev=document.getElementById('deckPreview'); if(!prev) return; const names=['Executive Summary','Evidence and Math','Recommendation','Risks and Next Steps']; const keys=['summary','analysis','recommendation','risks']; const fallback=['Recommendation in one sentence. Include funding decision and expected impact.','Key math and facts from the model or data room.','Operating model, technology, governance, and sequencing.','Main assumption, risk, and next step to de-risk.']; prev.innerHTML=keys.map((k,i)=>`<div class="slide-card"><h4>Slide ${i+1}: ${names[i]}</h4><p>${esc(capState.slides[k]||fallback[i])}</p></div>`).join(''); }
function capTimerTick(){ if(__capTimer) clearInterval(__capTimer); if(!capState.started) return; __capTimer=setInterval(()=>{ if(!capState.started) return; capState.secondsLeft=Math.max(0,capState.secondsLeft-1); if(capState.secondsLeft===0) capState.started=false; saveCapstone(); const c=document.getElementById('capClock'); if(c) c.textContent=capTime(); if(!capState.started) clearInterval(__capTimer); },1000); }

    {kind:'View', title:'Analyst Notebook', sub:'Hypotheses, evidence, assumptions, risks, and next steps', view:'notebook'},
    {kind:'View', title:'Case Study Lab', sub:'6 scored cases', view:'case'},
    {kind:'View', title:'Capstone Simulator', sub:'Data room, live model, deck builder, and partner rubric', view:'capstone'},
    {kind:'View', title:'Commercial Strategy Lab', sub:'Asset prioritization, market access, KOL synthesis, and diligence memo', view:'strategy'},

  ];

function openPalette(){
  closePalette();
  const back=document.createElement('div'); back.className='palette-backdrop'; back.id='cmdPalette';
  back.innerHTML=`<div class="palette" role="dialog" aria-label="Command palette"><div class="pal-search"><span>Search</span><input id="palInput" autocomplete="off" placeholder="Jump to a lesson, case, term, or page"></div><div class="pal-list" id="palList"></div></div>`;
  document.body.appendChild(back);
  const input=back.querySelector('#palInput'), list=back.querySelector('#palList');
  const draw=()=>{ const q=input.value.trim().toLowerCase(); let arr=paletteItems().filter(x=>(x.title+' '+x.sub+' '+x.kind).toLowerCase().includes(q)).slice(0,28); if(!arr.length) arr=[{kind:'None', title:'No match', sub:'Try a concept like HEOR, biosimilar, MECE, or safety.', view:'home'}]; list.innerHTML=arr.map((x,i)=>`<button class="pal-item ${i===0?'active':''}" data-i="${i}"><span class="pal-kind">${esc(x.kind)}</span><span><span class="pal-title">${esc(x.title)}</span><span class="pal-sub">${esc(x.sub||'')}</span></span><span class="pal-key">Enter</span></button>`).join(''); list.querySelectorAll('.pal-item').forEach((b,i)=>b.onclick=()=>go(arr[i])); };
  const go=(x)=>{ if(x.caseIndex!=null) state.caseIndex=x.caseIndex; if(x.query) state.glossaryQuery=x.query; state.view=x.view; closePalette(); render(); window.scrollTo({top:0,behavior:'smooth'}); };
  input.oninput=draw;
  input.onkeydown=(e)=>{ const btns=[...list.querySelectorAll('.pal-item')]; let idx=btns.findIndex(b=>b.classList.contains('active')); if(e.key==='ArrowDown'){e.preventDefault(); if(btns.length){btns[idx]?.classList.remove('active'); btns[Math.min(btns.length-1,idx+1)].classList.add('active');}} if(e.key==='ArrowUp'){e.preventDefault(); if(btns.length){btns[idx]?.classList.remove('active'); btns[Math.max(0,idx-1)].classList.add('active');}} if(e.key==='Enter'){e.preventDefault(); const active=list.querySelector('.pal-item.active')||list.querySelector('.pal-item'); if(active) active.click();} };
  back.onclick=(e)=>{ if(e.target===back) closePalette(); };
  draw(); setTimeout(()=>input.focus(),20);
}
function closePalette(){ const p=document.getElementById('cmdPalette'); if(p) p.remove(); }
function wireCoachTimer(){
  document.querySelectorAll('[data-timer]').forEach(b=>{ if(b.dataset.wired) return; b.dataset.wired='1'; b.onclick=()=>startCoachTimer(+b.getAttribute('data-timer')); });
  const r=document.getElementById('timerReset'); if(r && !r.dataset.wired){ r.dataset.wired='1'; r.onclick=()=>{ stopCoachTimer(); setTimerFace(0); }; }
}
function setTimerFace(sec){ const f=document.getElementById('timerFace'); if(!f) return; const m=Math.floor(sec/60), s=sec%60; f.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
function startCoachTimer(sec){ stopCoachTimer(); __timerEnd=Date.now()+sec*1000; setTimerFace(sec); __timerId=setInterval(()=>{ const left=Math.max(0,Math.ceil((__timerEnd-Date.now())/1000)); setTimerFace(left); if(left<=0){ stopCoachTimer(); try{ navigator.vibrate&&navigator.vibrate(120); }catch(e){} } },250); }
function stopCoachTimer(){ if(__timerId){ clearInterval(__timerId); __timerId=null; } }

applyFocusMode();
capTimerTick();
initAuth();
render();
</script>
</body>
</html>
