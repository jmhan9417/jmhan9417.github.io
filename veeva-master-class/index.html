{"term": "Profitability framework", "cat": "Finance", "def": "A diagnostic framework built on profit equals revenue minus costs. Use it when profits, margins, or earnings are down.", "ex": "A RIM project is not purely a profitability case, but its labor savings still come from cost reduction."},
{"term": "Revenue", "cat": "Finance", "def": "Money earned from selling products or services before subtracting costs.", "ex": "For a pharma product, launch-delay value may relate to delayed revenue, but you need client-provided assumptions."},
{"term": "Cost", "cat": "Finance", "def": "Money spent to operate, build, deliver, or support something.", "ex": "Implementation cost, validation cost, software support, and training are all costs in a Veeva case."},
{"term": "Fixed cost", "cat": "Finance", "def": "A cost that does not change much with volume in the short term.", "ex": "A base safety-team salary pool is mostly fixed over the next few months."},
{"term": "Variable cost", "cat": "Finance", "def": "A cost that moves with volume.", "ex": "Outsourced case-processing fees rise with the number of cases sent to the vendor."},
{"term": "Contribution margin", "cat": "Finance", "def": "Revenue minus variable cost, often used to see how much each unit contributes toward fixed cost and profit.", "ex": "In a trial case, cost per incremental enrolled patient is a similar unit-economics idea."},
{"term": "Gross margin", "cat": "Finance", "def": "Revenue minus direct cost of goods or services, divided by revenue.", "ex": "Less central in R&D operations cases, but useful in broader consulting interviews."},
{"term": "Operating margin", "cat": "Finance", "def": "Operating profit divided by revenue after operating expenses.", "ex": "A transformation may improve operating margin by reducing manual operations cost."},
{"term": "EBITDA", "cat": "Finance", "def": "Earnings before interest, taxes, depreciation, and amortization. Often used as a proxy for operating profitability.", "ex": "If an interviewer mentions EBITDA miss, use profit-tree thinking."},
{"term": "ROI", "cat": "Finance", "def": "Return on investment. A simple version is net benefit divided by investment.", "ex": "300,000 annual net benefit on 650,000 investment is about 46 percent annual simple ROI."},
{"term": "Payback period", "cat": "Finance", "def": "The time required for cumulative benefits to recover the upfront investment.", "ex": "650,000 divided by 300,000 annual net benefit gives about 2.2 years."},
{"term": "DCF", "cat": "Finance", "def": "Discounted cash flow. A valuation method that forecasts unlevered free cash flow, adds a terminal value, and discounts everything to present value, usually at WACC.", "ex": "Structure a DCF answer as forecast, terminal value, discounting, then the EV-to-equity bridge."},
{"term": "NPV", "cat": "Finance", "def": "Net present value. Future cash flows discounted back to today minus the upfront investment.", "ex": "A RIM case may have negative NPV on hard savings but positive NPV if risk-adjusted launch-delay value is included."},
{"term": "Discount rate", "cat": "Finance", "def": "The rate used to convert future cash flows into present value.", "ex": "A 10 percent discount rate values next year's 1 million dollars at about 909,000 dollars today."},
{"term": "WACC", "cat": "Finance", "def": "Weighted average cost of capital, often used as the discount rate in corporate valuation.", "ex": "If no WACC is provided, state the assumption rather than inventing certainty."},
{"term": "CAPEX", "cat": "Finance", "def": "Capital expenditure, money spent on long-term assets or capitalized implementation work.", "ex": "Some enterprise implementation costs may be treated as CAPEX depending on accounting policy."},
{"term": "OPEX", "cat": "Finance", "def": "Operating expense, recurring cost to run the business.", "ex": "Annual software support and business-admin headcount are OPEX."},
{"term": "TCO", "cat": "Finance", "def": "Total cost of ownership across the full lifecycle, not just purchase price.", "ex": "TCO includes implementation, validation, migration, training, licenses, support, and change management."},
{"term": "Run-rate savings", "cat": "Finance", "def": "Annualized savings expected once the change is fully implemented.", "ex": "Avoiding 2 FTE at 140,000 each creates 280,000 dollars of run-rate savings."},
{"term": "One-time cost", "cat": "Finance", "def": "A non-recurring cost required to implement or transition to the new state.", "ex": "Data migration and validation during a Veeva rollout are one-time costs."},
{"term": "Recurring cost", "cat": "Finance", "def": "A cost that continues every year or period after implementation.", "ex": "Support, maintenance, and admin ownership are recurring costs."},
{"term": "Hard savings", "cat": "Finance", "def": "Budget-visible savings, such as avoided hires, vendor spend reduction, or retiring a system.", "ex": "Avoided outsourcing fees are hard savings."},
{"term": "Strategic value", "cat": "Finance", "def": "Business value that is real but assumption-dependent, such as avoided launch delay or improved inspection readiness.", "ex": "Avoiding a 10-day launch delay may be worth more than labor savings, but the client must validate the value."},
{"term": "Sensitivity analysis", "cat": "Finance", "def": "Testing how the recommendation changes when key assumptions move.", "ex": "Vary productivity lift from 5 percent to 15 percent and see if payback still works."},
{"term": "Breakeven", "cat": "Finance", "def": "The point where benefits equal costs.", "ex": "If the pilot costs 300,000 dollars, one avoided 400,000 dollar delay month clears breakeven."},
{"term": "Opportunity cost", "cat": "Finance", "def": "The value of the best alternative use of time, capital, or resources.", "ex": "A delayed submission may tie up regulatory and clinical teams that could support another program."},
{"term": "FTE", "cat": "Operations", "def": "Full-time equivalent. A way to express labor capacity independent of individual headcount details.", "ex": "A 240-case monthly gap at 120 cases per FTE implies 2 FTE of capacity."},
{"term": "Fully loaded cost", "cat": "Operations", "def": "Employee cost including salary, benefits, payroll tax, overhead, and sometimes management burden.", "ex": "A safety associate may have a fully loaded cost of 140,000 dollars per year in a case assumption."},
{"term": "Throughput", "cat": "Operations", "def": "The amount of work completed per unit of time.", "ex": "960 safety cases processed per month is current throughput."},
{"term": "Capacity", "cat": "Operations", "def": "The maximum sustainable amount of work a team or system can process in a period.", "ex": "8 associates times 120 cases each gives 960 monthly case capacity."},
{"term": "Bottleneck", "cat": "Operations", "def": "The slowest or most constrained step that limits the whole process.", "ex": "If medical review queues are longest, adding intake staff may not reduce backlog."},
{"term": "Utilization", "cat": "Operations", "def": "The percentage of available capacity being used.", "ex": "A team at 100 percent utilization has no buffer for spikes or rework."},
{"term": "Cycle time", "cat": "Operations", "def": "The elapsed time from start to finish of a process.", "ex": "Submission assembly cycle time falls from 12 weeks to 8 weeks."},
{"term": "SLA", "cat": "Operations", "def": "Service-level agreement, a target for response or completion time.", "ex": "Serious safety cases may need strict SLA tracking."},
{"term": "Queue", "cat": "Operations", "def": "Work waiting to be processed.", "ex": "A growing safety backlog is a queue where intake exceeds completion."},
{"term": "Go-live", "cat": "Implementation", "def": "The point when a new process or system becomes active for users.", "ex": "Go-live is not the same as adoption or value realization."},
{"term": "Cutover", "cat": "Implementation", "def": "The controlled transition from old process or system to the new one.", "ex": "A safety-system cutover may include open-case migration and user-access validation."},
{"term": "Data migration", "cat": "Implementation", "def": "Moving data from old systems into a new system while preserving quality and traceability.", "ex": "Migrating product registration data into RIM requires ownership and validation."},
{"term": "User acceptance testing", "cat": "Implementation", "def": "Testing by business users to confirm the system supports real workflows.", "ex": "Safety associates test case intake, coding, review, and submission before go-live."},
{"term": "Super-user", "cat": "Implementation", "def": "A trained business user who supports peers and helps drive adoption.", "ex": "A country regulatory super-user helps local teams adopt the new RIM workflow."},
{"term": "Hypercare", "cat": "Implementation", "def": "The intensified support period right after go-live.", "ex": "For the first four weeks after launch, track defects, user questions, and adoption daily."},
{"term": "Source of truth", "cat": "Implementation", "def": "The authoritative system or owner for a data field or record.", "ex": "RIM should define the source of truth for product registration fields."},
{"term": "Data lineage", "cat": "Implementation", "def": "The path data takes from origin to use, including transformations and owners.", "ex": "Submission defects often come from unclear product-data lineage across markets."},
{"term": "Veeva Business Consulting", "cat": "Veeva Domain", "def": "Veeva's consulting group focused on improving life sciences operations through software, AI, data, and consulting working together.", "ex": "A consultant may redesign a safety operating model and align it to Veeva Safety."},
{"term": "Veeva Connections", "cat": "Veeva Domain", "def": "Veeva's approach to connecting processes and data across applications.", "ex": "Connecting clinical data to safety can reduce multiple data entry."},
{"term": "Case Intake Agent", "cat": "Veeva Domain", "def": "Veeva AI for Safety capability described by Veeva as automating case intake and identifying potential data anomalies.", "ex": "Use it as a possible future-state lever, not as a magic answer before diagnosis."},
{"term": "Case Narrative Agent", "cat": "Veeva Domain", "def": "Veeva AI for Safety capability described by Veeva as improving case narratives by correcting grammar, consolidating information, and improving readability.", "ex": "A narrative agent may reduce drafting friction, but the case still needs workflow and quality controls."},
{"term": "Vault Submissions", "cat": "Veeva Domain", "def": "Veeva application area supporting regulatory submission planning, assembly, and publishing.", "ex": "Relevant when the client struggles with eCTD submission cycle time."},
{"term": "Vault Registrations", "cat": "Veeva Domain", "def": "Veeva application area for tracking product registrations and market authorization data.", "ex": "Useful when global registration data are inconsistent across countries."},
{"term": "Study startup", "cat": "Veeva Domain", "def": "The work needed to get a clinical trial site ready to enroll patients.", "ex": "Contracts, regulatory documents, training, and system access can all delay activation."},
{"term": "Screen fail", "cat": "Veeva Domain", "def": "A patient who is screened for a trial but does not meet eligibility or cannot proceed.", "ex": "High screen-fail rate means media spend may create more work without enrollment."},
{"term": "Cost per enrolled patient", "cat": "Finance", "def": "Total recruitment or activation spend divided by incremental patients enrolled.", "ex": "A 300,000 dollar pre-screening program that adds 48 patients costs 6,250 dollars per incremental enrollee."},
{"term": "Drug lifecycle", "cat": "Industry", "def": "The path from discovery through preclinical, clinical trials, approval, launch, post-marketing, and lifecycle management.", "ex": "A regulatory-delay case and a launch-access case sit in different parts of the lifecycle."},
{"term": "Discovery", "cat": "Industry", "def": "Early research to identify targets, compounds, mechanisms, or therapeutic approaches.", "ex": "Discovery risk is mainly scientific and translational."},
{"term": "Preclinical", "cat": "Industry", "def": "Lab and animal work before human testing, including toxicology and pharmacology studies.", "ex": "Preclinical data supports an IND submission."},
{"term": "IND", "cat": "Regulatory", "def": "Investigational New Drug application, which allows clinical testing in humans to begin in the US.", "ex": "An IND package includes preclinical, manufacturing, and protocol information."},
{"term": "Phase 1", "cat": "Industry", "def": "First-in-human trials focused mainly on safety, tolerability, PK, and dose range.", "ex": "A Phase 1 oncology study may include dose escalation."},
{"term": "Phase 2", "cat": "Industry", "def": "Clinical trials focused on dose, early efficacy, and continued safety in the target patient population.", "ex": "A Phase 2 signal can shape Phase 3 endpoint selection."},
{"term": "Phase 3", "cat": "Industry", "def": "Large confirmatory trials designed to prove safety and efficacy for approval.", "ex": "Slow Phase 3 enrollment can delay the entire launch timeline."},
{"term": "NDA", "cat": "Regulatory", "def": "New Drug Application for FDA approval of a small-molecule drug.", "ex": "A successful Phase 3 program supports an NDA submission."},
{"term": "BLA", "cat": "Regulatory", "def": "Biologics License Application for FDA approval of a biologic product.", "ex": "Many monoclonal antibodies are approved through BLAs."},
{"term": "Post-marketing", "cat": "Industry", "def": "The period after approval, when safety, effectiveness, access, and lifecycle strategy continue.", "ex": "PV case processing and signal detection are post-marketing obligations."},
{"term": "Lifecycle management", "cat": "Industry", "def": "Strategies to extend or protect product value after launch.", "ex": "New indication, formulation, device, or adherence support before LOE."},
{"term": "Loss of exclusivity", "cat": "Industry", "def": "The point when patent or regulatory protection weakens and generic or biosimilar competition can enter.", "ex": "LOE can trigger rapid revenue erosion."},
{"term": "Patent cliff", "cat": "Industry", "def": "A period when one or more major products lose exclusivity, threatening company revenue.", "ex": "A client may need portfolio replacement or lifecycle strategy before a patent cliff."},
{"term": "Generic", "cat": "Industry", "def": "A small-molecule product approved as therapeutically equivalent to a reference listed drug, usually through an ANDA.", "ex": "Generic entry often accelerates after LOE."},
{"term": "Biosimilar", "cat": "Industry", "def": "A biological product that is highly similar to an already approved reference biologic, with no clinically meaningful differences.", "ex": "Biosimilar competition affects biologic lifecycle strategy."},
{"term": "Sponsor", "cat": "Stakeholder", "def": "The company or organization responsible for initiating and overseeing a clinical trial or development program.", "ex": "A biotech sponsor may outsource trial operations to a CRO but remains accountable."},
{"term": "CRO", "cat": "Stakeholder", "def": "Contract Research Organization, a vendor that supports clinical development activities.", "ex": "A CRO may manage site monitoring, data management, or trial operations."},
{"term": "Trial site", "cat": "Stakeholder", "def": "A hospital, clinic, or research center that enrolls and treats patients in a clinical trial.", "ex": "Site burden can limit enrollment even when the sponsor advertises heavily."},
{"term": "Investigator", "cat": "Stakeholder", "def": "A physician or researcher responsible for conducting a clinical trial at a site.", "ex": "Investigator engagement can affect enrollment and protocol adherence."},
{"term": "Site coordinator", "cat": "Stakeholder", "def": "The operational person at a trial site who manages screening, scheduling, documents, and patient logistics.", "ex": "Coordinators often know why screening actually fails."},
{"term": "FDA", "cat": "Stakeholder", "def": "US Food and Drug Administration, the regulator that reviews drugs, biologics, devices, labeling, safety, and quality.", "ex": "FDA approval does not automatically mean payer access."},
{"term": "EMA", "cat": "Stakeholder", "def": "European Medicines Agency, the EU agency involved in centralized medicine evaluation.", "ex": "Global regulatory strategy may need both FDA and EMA planning."},
{"term": "Payer", "cat": "Stakeholder", "def": "An organization that pays for healthcare, such as an insurer, Medicare plan, or health system.", "ex": "A payer may restrict coverage even after FDA approval."},
{"term": "PBM", "cat": "Stakeholder", "def": "Pharmacy Benefit Manager, an intermediary that manages pharmacy benefits, formularies, rebates, and utilization controls.", "ex": "PBM formulary status can determine patient access to a drug."},
{"term": "HCP", "cat": "Stakeholder", "def": "Healthcare professional, such as a physician, pharmacist, nurse, or advanced practitioner.", "ex": "HCP awareness and comfort affect uptake after launch."},
{"term": "KOL", "cat": "Stakeholder", "def": "Key Opinion Leader, a respected clinician or researcher who influences medical practice and scientific interpretation.", "ex": "KOL feedback can clarify why physicians hesitate to adopt a therapy."},
{"term": "MSL", "cat": "Stakeholder", "def": "Medical Science Liaison, a field-based medical affairs professional who supports scientific exchange with experts.", "ex": "MSLs gather insights and discuss evidence, not promotional sales claims."},
{"term": "Patient journey", "cat": "Commercial", "def": "The path patients take from symptoms to diagnosis, treatment decision, access, adherence, and outcomes.", "ex": "A launch may fail because patients drop out before diagnosis or prior authorization."},
{"term": "Segmentation and targeting", "cat": "Commercial", "def": "Dividing customers or HCPs into meaningful groups and prioritizing the highest-value or highest-need segments.", "ex": "Commercial teams may target high-volume specialists with relevant patient populations."},
{"term": "Omnichannel", "cat": "Commercial", "def": "Coordinated customer engagement across field, email, web, congress, remote, and other channels.", "ex": "A launch plan may combine rep visits, webinars, medical content, and digital reminders."},
{"term": "Launch strategy", "cat": "Commercial", "def": "The plan for bringing a product to market, including positioning, evidence, access, field model, education, and metrics.", "ex": "A strong launch strategy aligns clinical differentiation with payer value and HCP behavior."},
{"term": "Market access", "cat": "Market Access", "def": "The function focused on payer coverage, pricing, reimbursement, affordability, and patient access.", "ex": "Restrictive prior authorization is a market-access barrier."},
{"term": "Formulary", "cat": "Market Access", "def": "A payer or PBM list of covered drugs and their coverage conditions.", "ex": "Preferred formulary status can materially improve uptake."},
{"term": "Prior authorization", "cat": "Market Access", "def": "A payer requirement that approval be obtained before a therapy is covered.", "ex": "High prior-authorization burden can reduce treated patients."},
{"term": "Step therapy", "cat": "Market Access", "def": "A payer policy requiring patients to try one or more preferred therapies before another therapy is covered.", "ex": "Step therapy can delay access to a newer therapy."},
{"term": "Gross-to-net", "cat": "Market Access", "def": "The difference between list price and net revenue after rebates, discounts, fees, and chargebacks.", "ex": "A drug can have high list price but lower net revenue after rebates."},
{"term": "HEOR", "cat": "HEOR and Evidence", "def": "Health Economics and Outcomes Research, evidence work that studies value, outcomes, cost, burden, and resource use.", "ex": "HEOR supports payer value stories and reimbursement strategy."},
{"term": "RWE", "cat": "HEOR and Evidence", "def": "Real-world evidence generated from data outside traditional randomized trials, such as claims, EHR, registries, or patient-reported data.", "ex": "RWE may support post-launch evidence generation or payer discussions."},
{"term": "Claims data", "cat": "HEOR and Evidence", "def": "Administrative billing data that captures diagnoses, procedures, prescriptions, costs, and utilization.", "ex": "Claims can estimate treatment patterns but may lack clinical detail."},
{"term": "EHR data", "cat": "HEOR and Evidence", "def": "Electronic health record data containing clinical observations, labs, notes, diagnoses, and treatments.", "ex": "EHR data may capture disease severity better than claims but can be messy."},
{"term": "Registry", "cat": "HEOR and Evidence", "def": "A structured dataset tracking patients with a disease, exposure, or treatment over time.", "ex": "A registry can support long-term safety or outcomes evidence."},
{"term": "Value story", "cat": "Market Access", "def": "The evidence-based argument that a product's clinical and economic value justifies coverage and use.", "ex": "A payer value story may combine efficacy, safety, unmet need, budget impact, and real-world outcomes."},
{"term": "Budget impact model", "cat": "Market Access", "def": "A model estimating how adopting a therapy affects a payer's budget over a defined period.", "ex": "Even a cost-effective drug may face resistance if short-term budget impact is high."},
{"term": "Cost-effectiveness", "cat": "HEOR and Evidence", "def": "Analysis comparing cost and health outcomes of alternatives, often using cost per QALY or similar measures.", "ex": "Some markets require cost-effectiveness evidence for reimbursement."},
{"term": "QALY", "cat": "HEOR and Evidence", "def": "Quality-adjusted life year, a measure combining length and quality of life.", "ex": "A therapy may be evaluated by cost per QALY gained."},
{"term": "Medical Affairs", "cat": "Commercial", "def": "The function responsible for scientific exchange, evidence communication, KOL engagement, publications, and medical information.", "ex": "Medical Affairs handles scientific objections through medically governed channels."},
{"term": "Medical Information", "cat": "Commercial", "def": "The function that responds to unsolicited medical questions with accurate, balanced, and approved scientific information.", "ex": "A complex off-label question should route to Medical Information, not sales."},
{"term": "Scientific exchange", "cat": "Commercial", "def": "Non-promotional discussion of scientific evidence, typically led by Medical Affairs or MSLs.", "ex": "MSLs discuss data with KOLs within compliance boundaries."},
{"term": "Unmet need", "cat": "Industry", "def": "A gap where current therapies do not adequately address patient, clinician, or system needs.", "ex": "High unmet need can support priority development and strong launch positioning."},
{"term": "Standard of care", "cat": "Industry", "def": "The usual accepted treatment approach for a disease or patient segment.", "ex": "Payers compare a new therapy against standard of care, not against placebo alone."},
{"term": "Fast Track", "cat": "Regulatory", "def": "An FDA program to speed development and review of drugs for serious conditions with unmet need.", "ex": "Fast Track can add more frequent FDA interaction during development."},
{"term": "Breakthrough Therapy", "cat": "Regulatory", "def": "An FDA designation for therapies showing substantial early improvement over available options, adding intensive guidance.", "ex": "Strong Phase 2 data may support a Breakthrough Therapy request."},
{"term": "Accelerated Approval", "cat": "Regulatory", "def": "Approval based on a surrogate endpoint reasonably likely to predict benefit, with required confirmatory evidence.", "ex": "Accelerated Approval may rely on a biomarker while confirmatory trials continue."},
{"term": "Priority Review", "cat": "Regulatory", "def": "A shorter FDA review timeline for applications that would significantly improve treatment.", "ex": "Priority Review targets a faster action date than standard review."},
{"term": "Pre-IND meeting", "cat": "Regulatory", "def": "An early FDA meeting to align on the development plan before submitting an IND.", "ex": "A pre-IND meeting can de-risk endpoint and trial-design choices."},
{"term": "End-of-Phase-2 meeting", "cat": "Regulatory", "def": "An FDA meeting to align on Phase 3 design before pivotal trials begin.", "ex": "Endpoint agreement at End-of-Phase-2 reduces later approval risk."},
{"term": "eCTD Module 1", "cat": "Regulatory", "def": "The region-specific administrative section of a submission.", "ex": "Cover letters and application forms live in Module 1."},
{"term": "eCTD Module 3", "cat": "Regulatory", "def": "The quality and CMC section of a submission.", "ex": "Manufacturing and control data sit in Module 3."},
{"term": "eCTD Module 5", "cat": "Regulatory", "def": "The clinical study reports section of a submission.", "ex": "Pivotal trial reports are filed in Module 5."},
{"term": "Labeling", "cat": "Regulatory", "def": "The approved description of a product's indication, dosing, safety, and use.", "ex": "A narrow label can limit both commercial reach and access."},
{"term": "Regulatory variation", "cat": "Regulatory", "def": "A post-approval change to an approved product, such as a new indication, formulation, or manufacturing update.", "ex": "Adding an indication is managed as a regulatory variation."},
{"term": "Endpoint", "cat": "Clinical Science", "def": "The measured outcome used to judge a trial, such as survival, symptom change, or a biomarker.", "ex": "A meaningful primary endpoint is essential for approval."},
{"term": "Surrogate endpoint", "cat": "Clinical Science", "def": "A marker used as a stand-in for a clinical outcome, reasonably likely to predict benefit.", "ex": "Tumor shrinkage may serve as a surrogate for later outcomes."},
{"term": "Randomization", "cat": "Clinical Science", "def": "Randomly assigning participants to arms to reduce selection bias.", "ex": "Randomization balances known and unknown factors across groups."},
{"term": "Blinding", "cat": "Clinical Science", "def": "Concealing treatment assignment to reduce measurement bias.", "ex": "Double blinding hides assignment from both patients and assessors."},
{"term": "Control arm", "cat": "Clinical Science", "def": "The comparison group, receiving placebo or standard of care.", "ex": "Without a control arm, effect size is hard to interpret."},
{"term": "Statistical power", "cat": "Clinical Science", "def": "The probability of detecting a true effect if it exists, driving sample size.", "ex": "Underpowered trials risk missing a real benefit."},
{"term": "Adaptive design", "cat": "Clinical Science", "def": "A trial with pre-planned modifications such as sample-size re-estimation or dropping arms.", "ex": "Adaptive designs can save time if planned rigorously."},
{"term": "Inclusion and exclusion criteria", "cat": "Clinical Science", "def": "Rules defining who can enroll, shaping population, enrollment speed, and generalizability.", "ex": "Strict criteria may sharpen the signal but slow enrollment."},
{"term": "Phase objectives", "cat": "Clinical Science", "def": "The purpose of each trial phase: safety and dose in Phase 1, dose and early efficacy in Phase 2, confirmatory efficacy in Phase 3.", "ex": "A Phase 2 signal shapes Phase 3 endpoint choice."},
{"term": "ICSR", "cat": "Regulatory", "def": "Individual Case Safety Report, the structured record of a single adverse event.", "ex": "A serious unexpected reaction becomes an expedited ICSR."},
{"term": "Signal detection", "cat": "Clinical Science", "def": "Identifying patterns that may indicate a new or changing safety risk.", "ex": "A cluster of similar coded events can trigger signal evaluation."},
{"term": "Benefit-risk assessment", "cat": "Clinical Science", "def": "Weighing demonstrated benefit against known and potential harm for a defined population.", "ex": "Benefit-risk drives labeling and risk-management decisions."},
{"term": "REMS", "cat": "Regulatory", "def": "Risk Evaluation and Mitigation Strategy, a program to manage a serious risk beyond labeling.", "ex": "A REMS may require controlled distribution or monitoring."},
{"term": "PSUR / PBRER", "cat": "Regulatory", "def": "Periodic aggregate safety reports evaluating a product's safety profile over time.", "ex": "A PBRER summarizes cumulative and interval safety data."},
{"term": "Causality assessment", "cat": "Clinical Science", "def": "Judging whether a product plausibly caused an adverse event.", "ex": "Causality influences expedited reporting decisions."},
{"term": "Reference safety information", "cat": "Regulatory", "def": "The document defining what adverse events are already expected for a product.", "ex": "An unexpected serious event may require expedited reporting."},
{"term": "Data integrity", "cat": "Quality", "def": "Assurance that data is complete, consistent, accurate, and trustworthy throughout its lifecycle.", "ex": "Missing audit trails is a data-integrity failure."},
{"term": "ALCOA", "cat": "Quality", "def": "Data-integrity principles: Attributable, Legible, Contemporaneous, Original, Accurate, often extended with Complete, Consistent, Enduring, Available.", "ex": "Attributable data requires knowing who did what and when."},
{"term": "Change control", "cat": "Quality", "def": "A governed process for making changes to systems or processes without breaking compliance.", "ex": "A validated system change goes through change control."},
{"term": "Audit readiness", "cat": "Quality", "def": "An operating state where records, systems, and people are continuously inspection-ready.", "ex": "Audit readiness is built daily, not the week before an inspection."},
{"term": "GMP", "cat": "Manufacturing", "def": "Good Manufacturing Practice, the regulated standard for producing quality medicines.", "ex": "GMP governs the controlled manufacturing environment."},
{"term": "CMC", "cat": "Manufacturing", "def": "Chemistry, Manufacturing, and Controls, describing how a product is made, tested, and controlled.", "ex": "CMC forms Module 3 of a submission."},
{"term": "Tech transfer", "cat": "Manufacturing", "def": "Moving a manufacturing process between development and commercial scale or between sites.", "ex": "Tech transfer must preserve product quality through scale-up."},
{"term": "Scale-up", "cat": "Manufacturing", "def": "Increasing production from small to commercial volume while maintaining quality.", "ex": "Scale-up changes can affect quality if not controlled."},
{"term": "Cold chain", "cat": "Manufacturing", "def": "Temperature-controlled handling and distribution for sensitive products.", "ex": "Many biologics require unbroken cold chain."},
{"term": "Serialization", "cat": "Manufacturing", "def": "Unique product identifiers that support traceability and anti-counterfeiting.", "ex": "Serialization helps trace units through the supply chain."},
{"term": "Supply resilience", "cat": "Manufacturing", "def": "The ability to maintain supply despite disruptions, through backup sources and safety stock.", "ex": "A single-source material is a resilience risk."},
{"term": "Capacity planning", "cat": "Manufacturing", "def": "Matching production capacity to demand forecasts, launch timing, and safety stock.", "ex": "Underestimating launch demand can cause shortages."},
{"term": "Positioning", "cat": "Commercial", "def": "The differentiated reason a therapy matters for a defined patient segment versus alternatives.", "ex": "Clear positioning guides messaging and targeting."},
{"term": "Forecasting", "cat": "Commercial", "def": "Estimating future uptake using the patient funnel, access, and competitive share.", "ex": "A patient-based forecast is more defensible than a top-line guess."},
{"term": "Uptake curve", "cat": "Commercial", "def": "The pattern of adoption over time after launch.", "ex": "Access barriers can flatten the early uptake curve."},
{"term": "Field model", "cat": "Commercial", "def": "The structure and size of the field team and how it engages customers.", "ex": "An oversized field cannot fix an access barrier."},
{"term": "Launch metrics", "cat": "Commercial", "def": "Leading indicators such as awareness, access, first prescriptions, and repeat use.", "ex": "Leading metrics reveal barriers before total sales confirm failure."},
{"term": "Payer archetype", "cat": "Market Access", "def": "A grouping of payers by how they weigh clinical value, budget, and administration.", "ex": "One value message rarely fits every payer archetype."},
{"term": "Value dossier", "cat": "Market Access", "def": "A structured package of clinical, economic, and real-world evidence supporting coverage and price.", "ex": "A value dossier answers the payer's specific value question."},
{"term": "Health technology assessment", "cat": "Market Access", "def": "A formal evaluation of a therapy's value, sometimes using cost-effectiveness thresholds.", "ex": "Some markets require HTA before reimbursement."},
{"term": "Outcomes-based contract", "cat": "Market Access", "def": "An agreement tying payment to real-world performance on a measurable outcome.", "ex": "It shares risk when value is uncertain."},
{"term": "Comparative effectiveness", "cat": "HEOR and Evidence", "def": "Evidence comparing a therapy against relevant alternatives, not just placebo.", "ex": "Payers often want comparison versus standard of care."},
{"term": "Confounding", "cat": "HEOR and Evidence", "def": "An outside factor that influences both treatment and outcome, distorting the association.", "ex": "Sicker patients getting a therapy can confound results."},
{"term": "Selection bias", "cat": "HEOR and Evidence", "def": "Systematic differences between compared groups that distort conclusions.", "ex": "Comparing motivated adopters to others introduces selection bias."},
{"term": "Patient-reported outcomes", "cat": "HEOR and Evidence", "def": "Outcomes reported directly by patients, such as symptoms or quality of life.", "ex": "PROs can strengthen a value story with the patient experience."},
{"term": "Fit-for-purpose evidence", "cat": "HEOR and Evidence", "def": "Matching study design and data source to the specific decision it must support.", "ex": "A payer question needs comparative evidence, not just a large dataset."},
{"term": "Interoperability", "cat": "Digital and AI", "def": "The ability of systems to exchange and use data consistently.", "ex": "Poor interoperability forces duplicate data entry."},
{"term": "AI validation", "cat": "Digital and AI", "def": "Documented evidence that an AI capability performs reliably and stays controlled in regulated use.", "ex": "Regulated AI still requires validation and oversight."},
{"term": "Human oversight", "cat": "Digital and AI", "def": "Keeping accountable human review over automated or AI-supported decisions.", "ex": "Safety decisions retain human oversight even with AI support."},
{"term": "Source of truth", "cat": "Digital and AI", "def": "The authoritative system or owner for a data field or record.", "ex": "RIM can be the source of truth for registration data."},
{"term": "Licensing", "cat": "Finance", "def": "Acquiring rights to develop or sell another company's asset, often via upfront, milestones, and royalties.", "ex": "A biotech may license a compound from a partner."},
{"term": "Milestone payment", "cat": "Finance", "def": "A payment triggered by reaching a development, regulatory, or sales goal.", "ex": "An approval milestone pays on regulatory success."},
{"term": "Royalty", "cat": "Finance", "def": "A percentage of sales paid to a partner or licensor.", "ex": "Royalties scale payment with commercial success."},
{"term": "Risk-adjusted value", "cat": "Finance", "def": "Potential value weighted by probability of technical and regulatory success.", "ex": "An early asset is worth less until de-risked."},
{"term": "Probability of success", "cat": "Finance", "def": "The estimated chance an asset advances through a stage or to approval.", "ex": "Phase transition probabilities shape portfolio value."},
{"term": "Due diligence", "cat": "Finance", "def": "Structured assessment of an asset's science, regulatory, manufacturing, and commercial risks before a deal.", "ex": "Diligence can turn an exciting asset into a no-go."},
{"term": "Portfolio prioritization", "cat": "Consulting Method", "def": "Allocating finite resources across candidates using value, risk, fit, and timing.", "ex": "Prioritization protects the whole pipeline, not one favorite asset."},
{"term": "Standard of care", "cat": "Industry", "def": "The usual accepted treatment for a condition or segment.", "ex": "Payers compare a new therapy against standard of care."},
{"term": "Unmet need", "cat": "Industry", "def": "A gap where current therapies do not adequately serve patients or clinicians.", "ex": "High unmet need supports priority development and access."},
{"term": "Therapeutic area", "cat": "Industry", "def": "A disease domain such as oncology, immunology, cardiology, or rare disease, each with distinct dynamics.", "ex": "Rare-disease launches differ sharply from primary-care launches."},
{"term": "Biomarker", "cat": "Clinical Science", "def": "A measurable biological indicator used for diagnosis, selection, or response.", "ex": "A biomarker can define the eligible patient population."},
{"term": "Companion diagnostic", "cat": "Clinical Science", "def": "A test that identifies patients suited to a specific therapy.", "ex": "A targeted therapy may launch with a companion diagnostic."},
{"term": "510(k)", "cat": "Regulatory", "def": "An FDA pathway clearing a medical device shown substantially equivalent to a legally marketed device.", "ex": "Many lower-risk devices clear via 510(k)."},
{"term": "PMA", "cat": "Regulatory", "def": "Premarket Approval, the FDA pathway for higher-risk devices requiring clinical evidence.", "ex": "A novel high-risk device may need a PMA."},
{"term": "Combination product", "cat": "Regulatory", "def": "A product combining drug, device, or biologic components, with specialized regulatory handling.", "ex": "A prefilled autoinjector is a combination product."},
{"term": "FD&C Act", "cat": "Regulatory", "def": "The Federal Food, Drug, and Cosmetic Act, the primary law giving the FDA authority over drugs, biologics, devices, and more.", "ex": "Regulations and guidance flow from the authority of the FD&C Act."},
{"term": "Code of Federal Regulations", "cat": "Regulatory", "def": "The CFR, the body of binding federal regulations. Title 21 covers food and drugs.", "ex": "21 CFR Part 312 governs INDs; Part 11 governs electronic records."},
{"term": "Guidance document", "cat": "Regulatory", "def": "An FDA document describing current thinking and recommended approaches. Not legally binding but usually followed.", "ex": "Deviating from guidance is a risk decision, not automatically prohibited."},
{"term": "CDER", "cat": "Regulatory", "def": "The FDA Center for Drug Evaluation and Research, which reviews most drugs.", "ex": "A small-molecule NDA is typically reviewed by CDER."},
{"term": "CBER", "cat": "Regulatory", "def": "The FDA Center for Biologics Evaluation and Research, which reviews biologics such as vaccines and cell and gene therapies.", "ex": "A CAR-T therapy is reviewed by CBER."},

{"term": "BLA", "cat": "Regulatory", "def": "Biologics License Application, the pathway to approve a biologic.", "ex": "A monoclonal antibody is licensed through a BLA, not an NDA."},

{"term": "ICH E6 (GCP)", "cat": "Regulatory", "def": "The ICH Good Clinical Practice guideline for ethical, reliable clinical trials.", "ex": "E6 underpins informed consent and data reliability."},
{"term": "ICH E2", "cat": "Regulatory", "def": "The ICH guideline family for pharmacovigilance and safety reporting.", "ex": "E2 standards shape expedited safety reporting."},
{"term": "ICH Q9", "cat": "Quality", "def": "The ICH guideline on quality risk management.", "ex": "Q9 supports risk-based quality decisions."},
{"term": "ICH Q10", "cat": "Quality", "def": "The ICH guideline describing a pharmaceutical quality system.", "ex": "Q10 frames continual improvement of the quality system."},
{"term": "ICH M4 (CTD)", "cat": "Regulatory", "def": "The ICH guideline defining the Common Technical Document structure behind eCTD.", "ex": "M4 is why submissions share a common modular structure."},
{"term": "Common Technical Document", "cat": "Regulatory", "def": "The standardized submission structure, presented electronically as eCTD.", "ex": "The CTD organizes quality, nonclinical, and clinical content."},
{"term": "Orphan drug designation", "cat": "Regulatory", "def": "A designation supporting development for rare diseases with incentives such as exclusivity.", "ex": "Orphan status can change the economics of a rare-disease program."},
{"term": "Pediatric requirements", "cat": "Regulatory", "def": "Rules ensuring appropriate study of products in children.", "ex": "A sponsor may owe pediatric studies as part of approval commitments."},
{"term": "Real-world evidence guidance", "cat": "Regulatory", "def": "FDA guidance describing when and how real-world evidence may support regulatory decisions.", "ex": "RWE guidance shifts the question to fit-for-purpose design."},
{"term": "Post-marketing requirement", "cat": "Regulatory", "def": "A study or action the FDA requires after approval to confirm safety or benefit.", "ex": "Accelerated Approval often carries confirmatory post-marketing requirements."},
{"term": "505(b)(2)", "cat": "Regulatory", "def": "An FDA drug pathway that relies partly on data not developed by the applicant.", "ex": "A reformulation may use the 505(b)(2) pathway."},
{"term": "Regulatory exclusivity", "cat": "Industry", "def": "A period of market protection granted by regulation, separate from patents.", "ex": "Orphan and new-chemical-entity exclusivity delay competition."},
{"term": "Bioequivalence", "cat": "Clinical Science", "def": "Evidence that a generic performs the same as the reference drug in the body.", "ex": "Small-molecule generics must show bioequivalence."},
{"term": "Good Laboratory Practice", "cat": "Quality", "def": "GLP, the quality standard for nonclinical laboratory studies.", "ex": "Preclinical toxicology studies follow GLP."}
  ]
};

function keyOf(li,di){ return "l"+li+"-"+di; }
function caseChallengesFor(ci){ return (typeof CASE_CHALLENGES!=="undefined" && CASE_CHALLENGES[String(ci)]) || []; }
function allKnowledge(){ let a=[];
  DATA.levels.forEach((l,li)=>l.drills.forEach((d,di)=>{ if(d.type==="knowledge") a.push({key:keyOf(li,di), d, where:"level-"+li, title:"Level "+(li+1)+": "+l.title}); }));
  DATA.caseStudies.forEach((c,ci)=>caseChallengesFor(ci).forEach((d,si)=>{ if(d.type==="knowledge") a.push({key:"cc"+ci+"-"+si, d, where:"case:"+ci, title:c.title}); }));
  return a; }
function allScenario(){ let a=[];
  DATA.levels.forEach((l,li)=>l.drills.forEach((d,di)=>{ if(d.type==="scenario") a.push({key:keyOf(li,di), d, where:"level-"+li, title:"Level "+(li+1)+": "+l.title}); }));
  DATA.caseStudies.forEach((c,ci)=>caseChallengesFor(ci).forEach((d,si)=>{ if(d.type==="scenario") a.push({key:"cc"+ci+"-"+si, d, where:"case:"+ci, title:c.title}); }));
  return a; }
function computeKnowledge(){
  const ks = allKnowledge(); let correct=0;
  ks.forEach(({key,d})=>{ const idx=state.answers[key]; if(idx!=null && d.options[idx] && d.options[idx].correct) correct++; });
  return { correct, total:ks.length, pct: ks.length? Math.round(correct/ks.length*100):0 };
}
function computeReadiness(){
  const ss = allScenario(); let earned=0, max=0;
  ss.forEach(({key,d})=>{ max+=PTS.strong; const idx=state.answers[key]; if(idx!=null && d.options[idx]) earned += PTS[d.options[idx].tier]; });
  return { earned, max, pct: max? Math.round(earned/max*100):0 };
}
function levelDone(li){
  const l=DATA.levels[li]; return l.drills.every((d,di)=> state.answers[keyOf(li,di)]!=null);

if(st===2)return stageShell(3,'Read the exhibit, then synthesize',`<p class="interview-prompt">Take 60 seconds. Describe the chart, identify the decision-relevant pattern, and state what you would analyze next.</p><div class="exhibit-shell"><div class="exhibit-chart">${interviewExhibit(c,w)}</div><aside class="exhibit-notes"><h4>Exhibit notes</h4><ul>${c.notes.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></aside></div><div class="insight-options">${c.insights.map((x,i)=>`<button data-int-insight="${i}" class="${w.insight===i?'selected':''} ${w.submitted&&w.insight===i?x[1]:''}" aria-pressed="${w.insight===i}">${esc(x[0])}</button>`).join('')}</div>${nextButtons(st)}`);
if(st===3){const n=parseFloat(w.math);const checked=w.mathChecked;const ok=Number.isFinite(n)&&Math.abs(n-c.mathAnswer)<=c.tolerance;const reveal=w.submitted;return stageShell(4,'Do the math and explain the unit',`<p class="interview-prompt">${esc(c.mathQ)}</p><div class="math-box"><div class="math-input"><label>Your answer in ${esc(c.mathUnit)}</label><input id="intMath" type="number" step="any" value="${esc(w.math)}" placeholder="Enter a number"><div class="interview-actions"><button class="ghost primary" id="intMathCheck">Lock calculation</button></div></div><div class="math-result">${reveal?`<b>${ok?'Correct':'Recheck the setup'}</b><p>Model result: approximately ${c.mathAnswer} ${esc(c.mathUnit)}. Your recommendation still needs a sensitivity or caveat.</p>`:checked?'<b>Answer locked</b><p>Carry the number into your recommendation. Correctness is revealed after submission.</p>':'<b>Show your work aloud</b><p>State the equation, calculate, sense-check, then interpret the business meaning.</p>'}</div></div>${nextButtons(st)}`);}
if(st===4)return stageShell(5,'Handle the interviewer challenge',`<div class="interviewer-scene"><div class="interviewer-avatar" aria-hidden="true">PL</div><div class="pressure-card"><small>Practice Leader · live pushback</small><p>${esc(c.pressure)}</p></div></div><p class="sub">A strong response acknowledges the challenge, protects the recommendation, and names what evidence would change it.</p><div class="insight-options">${c.pressureOptions.map((x,i)=>`<button data-int-pressure="${i}" class="${w.pressure===i?'selected':''} ${w.submitted&&w.pressure===i?x[1]:''}" aria-pressed="${w.pressure===i}">${esc(x[0])}</button>`).join('')}</div>${nextButtons(st)}`);
const sc=interviewScore(c,w);const submitted=w.submitted;const dims=[['Structure',sc.clarify+sc.structure,25],['Analysis',sc.analysis,40],['Judgment',sc.judgment,15],['Synthesis',sc.synthesis,20]];return stageShell(6,'Deliver the 90-second recommendation',`<p class="interview-prompt">Lead with the answer. Give two or three reasons, quantify the most important finding, name one risk, and close with a next step.</p><div class="synthesis-box"><textarea id="intSynthesis" placeholder="Write the recommendation you would say out loud...">${esc(w.synthesis)}</textarea></div><div class="rubric-list">${['Recommendation comes first','Two or three evidence-backed reasons','At least one quantified insight','Main risk or uncertainty stated','Next step or decision gate stated'].map((x,i)=>`<label><input type="checkbox" data-int-rubric="${i}" ${w.rubric[i]?'checked':''}><span>${x}</span></label>`).join('')}</div><div class="interview-actions"><button class="ghost primary" id="intSubmit">${submitted?'Re-score case':'Submit case'}</button><button class="ghost" data-int-stage="4">Back to challenge</button></div>${submitted?`<div class="card" style="margin:26px 0 0"><div class="interview-report"><div class="score-ring" style="--score:${sc.total}"><b>${sc.total}</b></div><div><div class="eyebrow">Interview readiness</div><h3 style="font-size:28px;margin:8px 0 16px">${sc.total>=85?'Interview ready':sc.total>=70?'Close, but tighten the weak dimension':'Needs another coached run'}</h3><div class="score-bars">${dims.map(d=>{const pct=Math.round(d[1]/d[2]*100);return `<div class="score-line"><span>${d[0]}</span><div class="score-track"><i style="width:${pct}%"></i></div><b>${pct}%</b></div>`;}).join('')}</div></div></div><div class="pressure-card" style="margin-bottom:0"><small>Model synthesis</small><p>${esc(c.model)}</p></div></div>`:''}`);}
function interviewStageReady(c,w,st){if(st===0)return w.clarifiers.length>=2;if(st===1)return w.branches.length>=3;if(st===2)return w.insight!=null;if(st===3)return w.mathChecked&&Number.isFinite(parseFloat(w.math));if(st===4)return w.pressure!=null;return (w.synthesis||'').trim().length>=40;} function interviewStagePrompt(st){return ['Select at least two decision-relevant clarifying questions.','Select at least three branches before continuing.','Choose the insight you would say aloud.','Enter and lock a numeric answer before continuing.','Respond to the interviewer challenge.','Write at least 40 characters and check at least three rubric items.'][st]||'Complete this stage first.';} function nextButtons(st){return `<div class="interview-actions">${st>0?`<button class="ghost" data-int-stage="${st-1}">Back</button>`:''}<button class="ghost primary" data-int-stage="${Math.min(5,st+1)}">Continue to ${['structure','exhibit','math','challenge','synthesis','report'][st]}</button></div>`;}
function renderInterviewRoom(){const c=INTERVIEW_CASES[interviewState.caseIndex],w=interviewWork();return `<div class="card interview-hero"><div class="interview-hero-grid"><div><div class="eyebrow">Interview Room</div><h2>Work the case while the clock is running.</h2><p class="sub">Four original life sciences cases built around the actual interview sequence: clarify, structure, read an exhibit, calculate, handle pushback, and synthesize.</p></div><div class="interview-clock"><small>Case clock</small><b id="interviewTimerFace" role="timer" aria-live="polite">35:00</b><button class="ghost" id="interviewStart">${w.started?'Reset 35 min':'Start 35 min'}</button></div></div></div><div class="interview-cases">${INTERVIEW_CASES.map((x,i)=>`<button class="interview-case-card ${i===interviewState.caseIndex?'active':''}" data-int-case="${i}"><small>Case ${i+1} · ${esc(x.domain)}</small><h3>${esc(x.title)}</h3><p>${esc(x.decision)}</p><div class="case-difficulty" aria-label="Difficulty ${x.difficulty} of 5">${[1,2,3,4,5].map(n=>`<i class="${n<=x.difficulty?'on':''}"></i>`).join('')}</div></button>`).join('')}</div>${interviewStageNav()}${renderInterviewStage(c,w)}`;}

  document.querySelectorAll('[data-int-pressure]').forEach(b=>b.onclick=()=>{const w=interviewWork();w.pressure=+b.dataset.intPressure;w.notice='';saveInterview();render();});

const VAL_KEY='readytoconsult-valuation-v29';
let valuationState={mode:'dcf',dcf:{rev1:500,growth:10,ebitda:30,da:5,capex:6,nwc:2,tax:21,wacc:10,tg:2,debt:150,cash:80},rnpv:{value:3200,p2:40,p3:55,approval:90,cost2:120,cost3:200,costFile:10,platform:0,ask:800}};

function valNum(x,d){const n=Number(x);return Number.isFinite(n)?n:d;}
function valMoney(x){if(!Number.isFinite(x))return 'Invalid';const a=Math.abs(x);return (x<0?'−':'')+'$'+(a>=1000?(a/1000).toFixed(2)+'B':a.toFixed(a>=100?0:1)+'M');}
function valClamp(v,lo,hi){return Math.min(hi,Math.max(lo,v));}
function dcfCalc(input){
  const x=Object.assign({},input);x.rev1=valClamp(x.rev1,0,1e7);x.growth=valClamp(x.growth,-50,100);x.ebitda=valClamp(x.ebitda,-100,100);x.da=valClamp(x.da,0,100);x.capex=valClamp(x.capex,0,100);x.nwc=valClamp(x.nwc,-100,100);x.tax=valClamp(x.tax,0,60);x.wacc=valClamp(x.wacc,0.1,60);x.tg=valClamp(x.tg,-10,50);x.debt=valClamp(x.debt,0,1e7);x.cash=valClamp(x.cash,0,1e7);
  const g=x.growth/100,w=x.wacc/100,tg=x.tg/100,tax=x.tax/100;
  const fcfMargin=((x.ebitda-x.da)/100)*(1-tax)+x.da/100-x.capex/100-x.nwc/100;
  let rev=x.rev1,rows=[],pv=0;
  for(let y=1;y<=5;y++){if(y>1)rev*=1+g;const fcf=rev*fcfMargin,df=1/Math.pow(1+w,y),p=fcf*df;rows.push({y,rev,fcf,df,pv:p});pv+=p;}
  const last=rows[4].fcf,valid=w>tg,tv=valid?last*(1+tg)/(w-tg):NaN,pvTv=valid?tv/Math.pow(1+w,5):NaN,ev=pv+pvTv,equity=ev-x.debt+x.cash;
  return{rows,fcfMargin,pv,tv,pvTv,ev,equity,valid};
}
function rnpvCalc(input){const x=Object.assign({},input);x.value=valClamp(x.value,0,1e7);x.p2=valClamp(x.p2,0,100);x.p3=valClamp(x.p3,0,100);x.approval=valClamp(x.approval,0,100);x.cost2=valClamp(x.cost2,0,1e6);x.cost3=valClamp(x.cost3,0,1e6);x.costFile=valClamp(x.costFile,0,1e6);x.platform=valClamp(x.platform,-1e6,1e6);x.ask=valClamp(x.ask,0,1e7);const p2=x.p2/100,p3=x.p3/100,pa=x.approval/100,cum=p2*p3*pa,gross=x.value*cum,cost=x.cost2+p2*x.cost3+p2*p3*x.costFile,rnpv=gross-cost+x.platform,gap=x.ask-rnpv;return{cum,gross,cost,rnpv,gap};}
function valInput(key,label,value,note,step){return `<div class="val-input"><label>${label}${note?`<small>${note}</small>`:''}</label><input type="number" step="${step||1}" value="${value}" data-val-key="${key}"></div>`;}

${valInput('rev1','Year-1 revenue',x.rev1,'$M')}${valInput('growth','Annual revenue growth',x.growth,'%')}${valInput('ebitda','EBITDA margin',x.ebitda,'% of revenue')}${valInput('da','D&A',x.da,'% of revenue')}${valInput('capex','Capex',x.capex,'% of revenue')}${valInput('nwc','Change in NWC',x.nwc,'% of revenue')}${valInput('tax','Tax rate',x.tax,'%')}${valInput('wacc','WACC',x.wacc,'%',0.5)}${valInput('tg','Terminal growth',x.tg,'%',0.5)}${valInput('debt','Debt',x.debt,'$M')}${valInput('cash','Cash',x.cash,'$M')}</div></div>
<div class="val-results"><div class="val-kpis"><div class="val-kpi"><small>Enterprise value</small><b>${valMoney(c.ev)}</b><p>PV of explicit UFCF plus terminal value.</p></div><div class="val-kpi"><small>Equity value</small><b>${valMoney(c.equity)}</b><p>EV minus debt plus cash.</p></div><div class="val-kpi"><small>Terminal-value share</small><b>${c.valid?(c.ev>0?Math.round(c.pvTv/c.ev*100)+'%':'\u2014'):'Invalid'}</b><p>${c.valid?'High shares demand stronger sensitivity.':'WACC must exceed terminal growth.'}</p></div></div>
${dcfFlowCard(c,x)}<div class="card"><div class="eyebrow">Five-year cash flow</div><h2 style="font-size:21px">From operating forecast to UFCF</h2><div class="val-formula">UFCF = EBIT × (1 − tax) + D&A − capex − change in NWC<br>UFCF margin = ${(c.fcfMargin*100).toFixed(2)}% of revenue</div><div class="table-scroll" tabindex="0" aria-label="Five-year cash flow table. Scroll horizontally on a small screen."><table class="val-table"><thead><tr><th>Year</th><th>Revenue</th><th>UFCF</th><th>Discount factor</th><th>PV</th></tr></thead><tbody>${c.rows.map(r=>`<tr><td>${r.y}</td><td>${valMoney(r.rev)}</td><td>${valMoney(r.fcf)}</td><td>${r.df.toFixed(3)}</td><td>${valMoney(r.pv)}</td></tr>`).join('')}<tr><td><b>Terminal</b></td><td></td><td>${valMoney(c.tv)}</td><td>${(1/Math.pow(1+x.wacc/100,5)).toFixed(3)}</td><td><b>${valMoney(c.pvTv)}</b></td></tr></tbody></table></div></div>
<div class="card"><div class="eyebrow">Sensitivity</div><h2 style="font-size:21px">Enterprise value across WACC and terminal growth</h2><div class="val-sens"><div class="head">g \ WACC</div>${ws.map(v=>`<div class="head">${v.toFixed(1)}%</div>`).join('')}${gs.map(g=>`<div class="head">${g.toFixed(1)}%</div>${ws.map(w=>{const q=dcfCalc(Object.assign({},x,{wacc:w,tg:g}));const base=w===x.wacc&&g===x.tg;return `<div class="${base?'base':''}">${valMoney(q.ev)}</div>`;}).join('')}`).join('')}</div><p class="val-note">Do not pick the most favorable cell. Explain what evidence supports the risk and long-run growth assumptions.</p></div></div></div>`;}
function renderRnpvModel(){const x=valuationState.rnpv,c=rnpvCalc(x);const ps=[Math.max(1,x.p2-10),x.p2,Math.min(99,x.p2+10)],vs=[x.value*.8,x.value,x.value*1.2];return `<div class="val-layout"><div class="card val-controls"><div class="val-controls-head"><h3>Lead-asset assumptions</h3><p>Approved value is present value today if approval occurs. Costs are stage-gated.</p></div><div class="val-inputs">

<div class="val-results"><div class="val-kpis"><div class="val-kpi"><small>Cumulative approval probability</small><b>${(c.cum*100).toFixed(1)}%</b><p>${x.p2}% × ${x.p3}% × ${x.approval}%.</p></div><div class="val-kpi"><small>Lead + platform rNPV</small><b>${valMoney(c.rnpv)}</b><p>Risk-adjusted value minus expected costs.</p></div><div class="val-kpi"><small>Ask minus rNPV</small><b>${valMoney(c.gap)}</b><p>${c.gap>0?'Gap needs pipeline, synergy, or contingency.':'Ask is below modeled rNPV.'}</p></div></div>
${rnpvTreeCard(c,x)}<div class="card"><div class="eyebrow">Stage-gated value</div><h2 style="font-size:21px">Do not weight every cost by approval probability</h2><div class="val-formula">Risk-adjusted commercial value = ${x.p2}% × ${x.p3}% × ${x.approval}% × ${valMoney(x.value)} = ${valMoney(c.gross)}<br>Expected costs = ${valMoney(x.cost2)} + ${x.p2}% × ${valMoney(x.cost3)} + ${x.p2}% × ${x.p3}% × ${valMoney(x.costFile)} = ${valMoney(c.cost)}<br>rNPV = commercial value − expected costs + platform value = ${valMoney(c.rnpv)}</div><div class="table-scroll" tabindex="0" aria-label="Stage-gated value table. Scroll horizontally on a small screen."><table class="val-table"><thead><tr><th>Cash flow</th><th>Trigger probability</th><th>Nominal</th><th>Expected value</th></tr></thead><tbody><tr><td>Approved commercial value</td><td>${(c.cum*100).toFixed(1)}%</td><td>${valMoney(x.value)}</td><td>${valMoney(c.gross)}</td></tr><tr><td>Phase 2 cost</td><td>100%</td><td>${valMoney(x.cost2)}</td><td>${valMoney(x.cost2)}</td></tr><tr><td>Phase 3 cost</td><td>${x.p2}%</td><td>${valMoney(x.cost3)}</td><td>${valMoney(x.cost3*x.p2/100)}</td></tr><tr><td>Filing cost</td><td>${(x.p2*x.p3/100).toFixed(1)}%</td><td>${valMoney(x.costFile)}</td><td>${valMoney(x.costFile*x.p2*x.p3/10000)}</td></tr></tbody></table></div></div>
<div class="card"><div class="eyebrow">Sensitivity</div><h2 style="font-size:21px">rNPV across Phase 2 probability and approved value</h2><div class="val-sens"><div class="head">Value \ P2</div>${ps.map(v=>`<div class="head">${v.toFixed(0)}%</div>`).join('')}${vs.map(v=>`<div class="head">${valMoney(v)}</div>${ps.map(p=>{const q=rnpvCalc(Object.assign({},x,{p2:p,value:v}));const base=p===x.p2&&v===x.value;return `<div class="${base?'base':''}">${valMoney(q.rnpv)}</div>`;}).join('')}`).join('')}</div><p class="val-note">Ask what clinical evidence can move Phase 2 probability, and whether the approved-value model already reflects access, competition, and LOE.</p></div></div></div>`;}
function valFlowNode(x,t,sub,dark){return `<div class="vf-node ${dark?'vf-dark':''}"><b>${t}</b><small>${sub}</small></div>`;}
function dcfFlowCard(c,x){
  if(!c.valid) return `<div class="card"><div class="eyebrow">Follow the money</div><h2 style="font-size:21px">Model invalid</h2><p class="val-note">WACC must exceed terminal growth for a perpetuity to converge. Raise WACC or lower g.</p></div>`;
  const peak=Math.max(c.ev,c.equity,1), base=300, top=64, k=(base-top)/peak;
  const yv=v=>base-Math.max(0,v)*k;
  const bw=86, xs=[36,150,264,378,492,606];
  const lvl2=c.ev-x.debt;

function stableHash(str){ let h=2166136261>>>0; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function stableOptionOrder(n,key){ const a=Array.from({length:n},(_,i)=>i); if(n<2) return a; const h=stableHash(key); const off=h%n; const r=a.slice(off).concat(a.slice(0,off)); if(((h>>>5)&1) && n>2){ const first=r.shift(); r.reverse(); r.unshift(first); } return r; }

function drillPath(isK){

  return `<div class="drill-path" aria-label="Answer path">${steps.map((x,i)=>`<div class="path-step"><span>${String(i+1).padStart(2,'0')}</span><b>${x}</b></div>`).join('')}</div>`;

function renderDrill(li,di,d){
  const key=keyOf(li,di);
  const chosen=state.answers[key];
  const answered = chosen!=null;
  const isK = d.type==="knowledge";
  let opts="";
  const order=stableOptionOrder(d.options.length,"lesson-"+li+"-"+di);
  order.forEach((oi,rank)=>{
    const o=d.options[oi];
    let cls="opt", mk="", tag="", fbShown="";
    const letter=String.fromCharCode(65+rank);
    if(answered){
      cls+=" disabled show-fb";
      if(isK){
        if(o.correct){ cls+=" reveal-correct"; mk="correct"; tag=`<span class="tier-tag correct">Correct</span>`; }
        else if(oi===chosen){ cls+=" reveal-wrong"; mk="wrong"; tag=`<span class="tier-tag wrong">Your pick</span>`; }
      } else {
        cls+=" reveal-"+o.tier; mk=o.tier;
        const label=o.tier==="strong"?"Strong":o.tier==="weak"?"Weak":"Trap";
        tag=`<span class="tier-tag ${o.tier}">${label}</span>`;
        if(oi===chosen) tag+=`<span class="pts">your pick, ${PTS[o.tier]} pts</span>`;
      }
      if(oi===chosen) cls+=" chosen";
      fbShown=`<div class="fb">${esc(o.fb)}</div>`;
    }
    const mkContent = answered ? (isK ? (o.correct?"&#10003;":(oi===chosen?"&#10007;":letter)) : (o.tier==="strong"?"&#10003;":o.tier==="trap"?"&#10007;":"~")) : letter;
    opts+=`<button class="${cls}" data-li="${li}" data-di="${di}" data-oi="${oi}" data-pos="${rank}" ${answered?'disabled':''}>
        <span class="mk ${answered?mk:''}">${mkContent}</span>
        <span>${esc(o.text)}${tag}</span>
        ${answered?'':`<kbd class="opt-key">${rank+1}</kbd>`}
        ${fbShown}
      </button>`;
  });

  let banner="";
  if(answered){
    if(isK){
      const ok=d.options[chosen].correct;
      banner=`<div class="banner ${ok?'correct':'wrong'} show">Knowledge meter updated. Review the answer above.</div>`;
    } else {
      const t=d.options[chosen].tier;
      const msg = t==="strong"?"Strong answer. Full 10 points. This is the standard to internalize.":t==="weak"?"Partial answer. 5 points. Compare it with the stronger option.":"Trap answer. 0 points. Read why the structured option wins.";
      banner=`<div class="banner ${t} show">${msg}</div>`;
    }
    banner+=`<div style="margin-top:10px"><button class="ghost" data-retry="${key}">Try this drill again</button></div>`;
  }

  return `<div class="card" style="padding:0">
    <div class="drill" style="margin:0;border:none">
      <div class="dhead">
        <span class="kind ${isK?'know':'scen'}">${isK?'Knowledge check':'Application scenario'}</span>
        <span class="qmeta">${isK?'Concept comprehension':'Interviewer question &middot; choose the best answer'}</span>
      </div>
      ${!isK && d.speaker?`<div class="speaker">${esc(d.speaker)} asks:</div>`:''}
      <div class="qtext ${isK?'':'scenq'}">${esc(d.q)}</div>
      ${drillPath(isK)}
      <div class="opts">${opts}</div>
      ${banner}
    </div>
  </div>`;
}

function logRep(){ let pts=0; const tiers={strong:0,weak:0,trap:0}; sessionState.qs.forEach(i=>{ const q=DEEP_QS[i]; const pk=sessionState.picks[i]; const t=pk!=null?qTier(q,pk):'trap'; tiers[t]++; pts+=t==='strong'?10:t==='weak'?5:0; }); practicalState.repLog=practicalState.repLog||[]; practicalState.repLog.push({at:new Date().toISOString(), day:new Date().toISOString().slice(0,10), pts, max:sessionState.qs.length*10, strong:tiers.strong, weak:tiers.weak, trap:tiers.trap}); if(practicalState.repLog.length>60) practicalState.repLog=practicalState.repLog.slice(-60); savePractical(); }
function repStreak(){ const log=practicalState.repLog||[]; if(!log.length) return 0; const days=[...new Set(log.map(r=>r.day))].sort().reverse(); const one=86400000; let streak=0; let cursor=new Date(new Date().toISOString().slice(0,10)); if(days[0]!==cursor.toISOString().slice(0,10)){ cursor=new Date(cursor.getTime()-one); if(days[0]!==cursor.toISOString().slice(0,10)) return 0; } for(const d of days){ if(d===cursor.toISOString().slice(0,10)){ streak++; cursor=new Date(cursor.getTime()-one); } else break; } return streak; }
function repHistoryCard(){ const all=practicalState.repLog||[]; const log=all.slice(-8); if(!log.length) return ''; const streak=repStreak(); const best=Math.max(...all.map(r=>r.pts));
  const one=86400000; const today=new Date(new Date().toISOString().slice(0,10)).getTime(); const days=[]; for(let i=13;i>=0;i--){ const d=new Date(today-i*one).toISOString().slice(0,10); const dayReps=all.filter(r=>r.day===d); const bestPct=dayReps.length?Math.max(...dayReps.map(r=>Math.round(r.pts/r.max*100))):0; days.push({d,bestPct,n:dayReps.length}); }
  const weekAvg=(arr)=>{ const withReps=arr.filter(x=>x.n); return withReps.length?Math.round(withReps.reduce((a,x)=>a+x.bestPct,0)/withReps.length):0; };
  const thisWeek=weekAvg(days.slice(7)), lastWeek=weekAvg(days.slice(0,7));
  const trendTxt=thisWeek&&lastWeek?(thisWeek>=lastWeek?`Up ${thisWeek-lastWeek} points vs last week.`:`Down ${lastWeek-thisWeek} points vs last week.`):'Build a two-week base to see the trend.';
  return `<div class="card"><div class="eyebrow">Your reps</div><h2 style="font-size:22px">Recent sessions</h2><div class="rep-trend">${log.map(r=>{ const pct=Math.round(r.pts/r.max*100); return `<div class="rep-bar" title="${esc(r.day)}: ${r.pts}/${r.max}"><i style="height:${Math.max(8,pct)}%"></i><span>${r.pts}</span></div>`; }).join('')}</div><div class="rep-meta"><span><b>${streak}</b> day streak</span><span><b>${best}</b> best score</span><span><b>${all.length}</b> total reps</span></div>
  <div class="week-block"><div class="week-head"><b>Last 14 days</b><span>${esc(trendTxt)} This week ${thisWeek} percent, last week ${lastWeek} percent.</span></div><div class="week-grid">${days.map(x=>`<div class="week-col" title="${esc(x.d)}: ${x.n?x.bestPct+' percent best':'no rep'}"><i style="height:${Math.max(x.n?10:3,x.bestPct)}%" class="${x.n?'':'empty'} ${x.d===new Date().toISOString().slice(0,10)?'today':''}"></i><span>${x.d.slice(8)}</span></div>`).join('')}</div></div></div>`; }
function qTier(q,oi){ return (q.options[oi]&&q.options[oi][0])||'trap'; }
function categoryStats(){ const m={}; DEEP_QS.forEach((q,i)=>{ m[q.cat]=m[q.cat]||{cat:q.cat,total:0,answered:0,pts:0}; m[q.cat].total++; const a=practicalState.qbank[i]; if(a){ m[q.cat].answered++; const t=qTier(q,a.oi); m[q.cat].pts+=t==='strong'?10:t==='weak'?5:0; } }); return Object.values(m); }
function weakestCats(n){ const st=categoryStats().filter(c=>c.answered>0).map(c=>Object.assign({pct:Math.round(c.pts/(c.answered*10)*100)},c)).sort((a,b)=>a.pct-b.pct); return st.slice(0,n||3); }
function pickSessionQs(){ const missed=[],fresh=[],rest=[]; DEEP_QS.forEach((q,i)=>{ const a=practicalState.qbank[i]; if(!a) fresh.push(i); else if(qTier(q,a.oi)!=='strong') missed.push(i); else rest.push(i); }); const shuffle=a=>a.sort(()=>Math.random()-.5); const pool=shuffle(missed).concat(shuffle(fresh)).concat(shuffle(rest)); const out=[]; const cats=new Set(); pool.forEach(i=>{ if(out.length>=5) return; if(cats.has(DEEP_QS[i].cat) && pool.length-out.length>5) return; out.push(i); cats.add(DEEP_QS[i].cat); }); let k=0; while(out.length<5 && k<pool.length){ if(!out.includes(pool[k])) out.push(pool[k]); k++; } return out.slice(0,5); }
function renderSession(){
  if(sessionState.phase==='intro'){ const w=weakestCats(1)[0]; return `<div class="card problem-hero"><div class="eyebrow">Daily Rep</div><h2>Five questions. One honest sitting.</h2><p class="lede">A short mixed set that prioritizes what you missed and what you have not seen. Answer like a manager is across the table, then read every model answer.</p><div class="session-start"><button class="ghost session-cta" data-session-start>Start today&rsquo;s rep</button>${w&&w.pct<100?`<span class="session-note">Current weakest category: ${esc(w.cat)} at ${w.pct} percent.</span>`:w?`<span class="session-note">All drilled categories are clean so far. This rep mixes in unseen prompts.</span>`:'<span class="session-note">First rep: we will mix fundamentals and judgment.</span>'}</div></div>${repHistoryCard()}${sessionReportCard()}`; }
  const qi=sessionState.qs[sessionState.idx]; const q=DEEP_QS[qi]; const pick=sessionState.picks[qi]; const letters=['A','B','C','D']; const strongIdx=q.options.findIndex(o=>o[0]==='strong'); const order=stableOptionOrder(q.options.length,'dq-'+qi); const strongLetter=letters[order.indexOf(strongIdx)]||''; const parts=qVisualParts(q);
  if(sessionState.phase==='run'){
    const dots=sessionState.qs.map((x,i)=>`<span class="sdot ${i<sessionState.idx?'done':''} ${i===sessionState.idx?'now':''}"></span>`).join('');
    const solved=pick!=null;
    return `<div class="card session-bar"><div><div class="eyebrow">Daily Rep</div><h2 style="font-size:24px;margin:6px 0 0">Question ${sessionState.idx+1} of ${sessionState.qs.length}</h2></div><div class="sdots">${dots}</div></div>
    <div class="q-card q-card-visual"><div class="q-prompt-grid"><div class="q-prompt-main"><div class="q-kicker">${esc(q.cat)} &middot; ${esc(q.diff)}</div><h3>${esc(q.q)}</h3></div>${renderQVisual(q)}</div><div class="q-options">${order.map((oi,rank)=>{ const o=q.options[oi]; return `<button class="${solved&&pick===oi?'chosen '+o[0]:''} ${solved&&oi===strongIdx&&pick!==oi?'reveal-strong':''}" data-session-pick="${qi}:${oi}" ${solved?'disabled':''}><span class="opt-letter">${letters[rank]}</span><span>${esc(o[1])}</span></button>`; }).join('')}</div>
    ${solved?`<div class="q-feedback ${qTier(q,pick)}"><b>${qTier(q,pick).toUpperCase()}.</b> ${qFeedback(qTier(q,pick))}</div><div class="q-solve"><div class="q-solve-col"><b>Model answer &middot; ${strongLetter}</b><p>${esc(q.options[strongIdx][1])}</p></div><div class="q-solve-col"><b>How to get there</b><ol><li>Start from the facts: ${esc(parts[0].toLowerCase())}.</li><li>Name the tension: ${esc(parts[1].toLowerCase())}.</li><li>Commit at the decision point (${esc(parts[2].toLowerCase())}) and say what would change your mind.</li></ol></div></div><div class="session-next"><button class="ghost session-cta" data-session-next>${sessionState.idx+1<sessionState.qs.length?'Next question':'See session report'}</button></div>`:''}</div>`;
  }
  // summary
  let pts=0, tiers={strong:0,weak:0,trap:0}; const rows=sessionState.qs.map(i2=>{ const qq=DEEP_QS[i2]; const pk=sessionState.picks[i2]; const t=pk!=null?qTier(qq,pk):'trap'; tiers[t]++; pts+=t==='strong'?10:t==='weak'?5:0; return `<tr><td>${esc(qq.cat)}</td><td>${esc(qq.q.slice(0,86))}${qq.q.length>86?'&hellip;':''}</td><td class="t-${t}">${t}</td></tr>`; }).join('');
  const w2=weakestCats(1)[0];
  return `<div class="card problem-hero"><div class="eyebrow">Session report</div><h2>${pts}/${sessionState.qs.length*10} points this rep.</h2><p class="lede">${tiers.strong} strong &middot; ${tiers.weak} partial &middot; ${tiers.trap} trap. Strong answers state the logic, the caveat, and the next step.</p></div>
  <div class="card"><div class="eyebrow">This session</div><h2 style="font-size:22px">Question by question</h2><div class="problem-table-wrap" style="margin-top:14px"><table class="problem-table"><thead><tr><th>Category</th><th>Prompt</th><th>Result</th></tr></thead><tbody>${rows}</tbody></table></div><div class="session-next"><button class="ghost session-cta" data-session-start>Run another rep</button>${w2&&w2.pct<100?`<button class="ghost" data-session-drill="${esc(w2.cat)}">Drill weakest: ${esc(w2.cat)}</button>`:''}<button class="ghost" data-view="review">Open review</button></div></div>${repHistoryCard()}${sessionReportCard()}`;
}
function sessionReportCard(){ const st=categoryStats().filter(c=>c.answered>0); if(!st.length) return ''; const rows=st.map(c=>Object.assign({pct:Math.round(c.pts/(c.answered*10)*100)},c)).sort((a,b)=>a.pct-b.pct).slice(0,6); return `<div class="card"><div class="eyebrow">Readiness report</div><h2 style="font-size:22px">Category scorecard</h2><div class="report-rows">${rows.map(r=>`<div class="report-row"><span class="report-cat">${esc(r.cat)}</span><div class="score-track"><i style="width:${r.pct}%"></i></div><span class="report-pct">${r.pct}%<small class="report-n">${r.answered}/${r.total} answered</small></span><button class="ghost report-go" data-session-drill="${esc(r.cat)}">Drill</button></div>`).join('')}</div><p class="fig-note" style="margin-top:14px">Percent of points earned in the questions you have answered, per category. The count shows coverage: a category is only proven once most of its questions are answered. Drill the lowest rows first.</p></div>`; }
function wireSession(){
  document.querySelectorAll('[data-session-start]').forEach(b=>b.onclick=()=>{ sessionState={phase:'run',qs:pickSessionQs(),idx:0,picks:{}}; render(); window.scrollTo({top:0,behavior:'smooth'}); });
  document.querySelectorAll('[data-session-pick]').forEach(b=>b.onclick=()=>{ const [i,oi]=b.getAttribute('data-session-pick').split(':').map(Number); if(sessionState.picks[i]!=null) return; sessionState.picks[i]=oi; practicalState.qbank[i]={i,oi}; savePractical(); render(); });
  document.querySelectorAll('[data-session-next]').forEach(b=>b.onclick=()=>{ if(sessionState.idx+1<sessionState.qs.length){ sessionState.idx++; } else { sessionState.phase='done'; logRep(); } render(); window.scrollTo({top:0,behavior:'smooth'}); });
  document.querySelectorAll('[data-session-drill]').forEach(b=>b.onclick=()=>{ practicalState.activeQCat=b.getAttribute('data-session-drill'); savePractical(); state.view='qbank'; render(); window.scrollTo({top:0,behavior:'smooth'}); });
  document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{ state.view=b.getAttribute('data-view'); render(); window.scrollTo({top:0,behavior:'smooth'}); });
}
function focusNextCard(){ const st=categoryStats().filter(c=>c.answered>0); const w=weakestCats(1)[0]; const body=st.length?(w.pct<100?`Your weakest drilled category is <b>${esc(w.cat)}</b> at ${w.pct} percent. Run a five-question rep or drill it directly.`:`Every drilled category is clean so far. Keep the streak with a mixed rep on unseen prompts.`):`No drills answered yet. A five-question Daily Rep is the fastest way to find your baseline.`; return `<div class="card focus-card"><div class="focus-grid"><div><div class="eyebrow">Focus next</div><h2 style="font-size:26px;margin:8px 0 10px">One rep a day moves the needle.</h2><p class="sub" style="margin:0">${body}</p></div><div class="focus-actions"><button class="ghost session-cta" data-view="session">Start Daily Rep</button>${st.length?`<button class="ghost" data-session-drill="${esc(w.cat)}">Drill ${esc(w.cat)}</button>`:''}</div></div></div>`; }

/* ---------- v57 coach helper ---------- */
const COACH_TIPS={

 capstone:["Work tabs left to right: brief, data room, model, then memo.","Do not trust a single stakeholder quote. Check it against the data room."],
 strategy:["No asset wins every row. Choose, then defend the trade-off.","Use the sensitivity tab to find which assumption flips the answer."],
 valuation:["Start with the formula, then name the two assumptions that move value most.","Use DCF for operating cash flow and explicit PTRS for binary clinical risk.","Do not let terminal value hide LOE or use both PTRS and an extreme discount rate for the same risk."],

 interview:["Work the stages in order and say your logic aloud.","Use the scenario tabs to test whether your recommendation survives downside assumptions.","Paste your final synthesis here and ask me to critique it."],
 roleplay:["Answer the same case twice for two personas. The structure stays, the emphasis moves.","Name the stakeholder metric first. It earns you the right to disagree."],

 qbank:["Answer, then read the model answer and the three-step path.","The strong option always states logic, caveat, and next step. Copy that pattern.","Wrong picks collect in Review missed. Clear them the same day."],
 glossary:["Search beats scrolling. Look up terms the moment they block you.","Read the example sentence out loud. That is interview phrasing practice."],

 notebook:["Save answer patterns, not transcripts: hypothesis, evidence, risk, next step."],
