};
function coachContext(){ let v=state.view; if(v.startsWith('level-')){ const n=parseInt(v.split('-')[1],10); v=(n>=27)?'valuation':'syllabus'; } return COACH_TIPS[v]||COACH_TIPS.home; }
function coachViewName(){if(state.view.startsWith('level-')){const i=+state.view.split('-')[1];return 'Lesson '+(i+1)+': '+(DATA.levels[i]?.title||'Curriculum');}const names={home:'Overview',syllabus:'Curriculum',case:'Case Lab',capstone:'Capstone',strategy:'Strategy Lab',problem:'Problem Lab',interview:'Interview Room',roleplay:'Roleplay',practical:'Analyst Studio',session:'Daily Rep',qbank:'Drills',glossary:'Glossary',review:'Review missed',notebook:'Notebook',certificate:'Certificate',about:'About'};return names[state.view]||'ReadyToConsult';}
function coachHistory(){uiState.coachChat=Array.isArray(uiState.coachChat)?uiState.coachChat:[];return uiState.coachChat;}
function coachWelcome(){return {role:'assistant',text:'You are in '+coachViewName()+'. I can explain this screen, build a framework, challenge your recommendation, define a term, or critique an answer you paste here.'};}
function coachFramework(){const k=state.view.startsWith('level-')?'lesson':state.view;const maps={home:'Objective → evidence → decision → next step',lesson:'Concept → metric → trade-off → interview application',case:'Client decision → demand and capacity → economics → execution risk → recommendation',interview:'Clarify objective → case-specific structure → exhibit insight → math → pushback → synthesis',capstone:'Decision → data reliability → operating model → business case → roadmap',strategy:'Market attractiveness → evidence and access → economics → execution → option value',problem:'Decision → evidence → competing options → uncertainty → sequenced recommendation',practical:'Issue tree → dirty-data audit → sensitivity → client-ready answer',qbank:'Fact pattern → tension → decision → evidence that would change the answer'};return maps[k]||'Decision → drivers → evidence → trade-off → next step';}
function coachChallenge(){if(state.view==='interview'){const c=INTERVIEW_CASES[interviewState.caseIndex]||INTERVIEW_CASES[0];return c.pressure+'\n\nAnswer in three moves: acknowledge the concern, defend or revise the recommendation, then name the evidence that would change your mind.';}const q={case:'Your math works, but which assumption is most likely to fail?',capstone:'If the client funds only half the plan, what do you protect and what do you cut?',strategy:'Why is the smaller opportunity better than the larger market?',problem:'What evidence would make you reverse the recommendation?',practical:'Which dirty-data caveat could flip your answer?',qbank:'Can you defend that answer without repeating the option text?'};return q[state.view]||'What is the strongest argument against your recommendation, and what evidence would resolve it?';}
function coachGlossary(q){const x=q.toLowerCase().replace(/what is|define|explain|meaning of|\?/g,' ').trim();if(!x)return null;const hits=DATA.glossary.filter(function(g){return g.term.toLowerCase()===x||g.term.toLowerCase().includes(x)||x.includes(g.term.toLowerCase());}).sort(function(a,b){return (b.term.toLowerCase()===x?1:0)-(a.term.toLowerCase()===x?1:0);}).slice(0,2);if(!hits.length)return null;return hits.map(function(g){return g.term+': '+g.def+'\nInterview phrasing: '+g.ex;}).join('\n\n');}
function coachCritique(text){const t=text.trim(),first=t.slice(0,150);const checks=[{label:'Recommendation appears first',pass:/\b(i recommend|we recommend|my recommendation|the client should|we should)\b/i.test(first)},{label:'Evidence or a number supports the answer',pass:/\d|percent|%|million|months|patients|cases|sites/i.test(t)},{label:'Two or more reasons are signposted',pass:/\b(first|second|because|reason|driver|supported by)\b/i.test(t)},{label:'A risk, caveat, or assumption is named',pass:/\b(risk|caveat|uncertain|assumption|depends|downside|however)\b/i.test(t)},{label:'A next step or decision gate is stated',pass:/\b(next|pilot|validate|test|measure|gate|then|monitor)\b/i.test(t)}];const n=checks.filter(function(x){return x.pass;}).length;let out=n>=5?'Strong structure. Tighten wording and deliver it aloud under 90 seconds.':n>=3?'The core is there. Add the missing interview signals before delivery.':'This reads more like analysis notes than a recommendation. Lead with the decision and rebuild around evidence, risk, and next step.';if(t.length<80)out+=' It is also quite short for a defensible synthesis.';return {role:'assistant',text:out,checks:checks};}
function coachReply(input,action){const q=(input||'').trim();if(action==='explain')return {role:'assistant',text:coachContext().map(function(x,i){return (i+1)+'. '+x;}).join('\n')};if(action==='framework')return {role:'assistant',text:'Use this structure for '+coachViewName()+':\n\n'+coachFramework()+'\n\nSay the structure before analyzing. Then explain why each branch could change the decision.'};if(action==='challenge')return {role:'assistant',text:coachChallenge()};if(action==='critique'&&!q)return {role:'assistant',text:'Paste your recommendation in the message box. I will check whether it leads with the decision, uses evidence, names a risk, and ends with a next step.'};if(!q)return {role:'assistant',text:'Ask a question or choose one of the quick prompts below.'};if(action==='critique'||q.length>=100||/\b(i recommend|we recommend|the client should)\b/i.test(q))return coachCritique(q);if(/framework|structure|issue tree|approach/i.test(q))return {role:'assistant',text:'Use this structure:\n\n'+coachFramework()};if(/challenge|pushback|pressure|interviewer/i.test(q))return {role:'assistant',text:coachChallenge()};if(/explain this|this screen|what should i do/i.test(q))return {role:'assistant',text:coachContext().map(function(x,i){return (i+1)+'. '+x;}).join('\n')};if(/why.*(weak|wrong|answer)|what.*missing/i.test(q))return {role:'assistant',text:'A weak answer usually names a direction without enough decision logic. Check four things: does it state the recommendation, support it with evidence, acknowledge the main risk, and give a next step? Paste the exact answer and I will mark each signal.'};if(/help|stuck|hint|where.*start/i.test(q))return {role:'assistant',text:'Start here: '+((coachContext()&&coachContext()[0])||'clarify the decision, then identify the driver that could change it.')};const g=coachGlossary(q);if(g)return {role:'assistant',text:g};const ctx=coachContext()||[];const tip=ctx.length?ctx[0]:'clarify the decision and identify the evidence that could change it';return {role:'assistant',text:'I do not have an exact term match yet. Ask why an answer is weak, request a framework, or paste your recommendation for a structured critique. On this screen, focus on: '+tip};}
function coachMessageHtml(m){let checks='';if(m.checks){checks='<div class="coach-checks">'+m.checks.map(function(x){return '<div class="coach-check '+(x.pass?'pass':'miss')+'"><i>'+(x.pass?'✓':'!')+'</i><span>'+esc(x.label)+'</span></div>';}).join('')+'</div>';}return '<div class="coach-msg '+(m.role==='user'?'user':'assistant')+'"><small>'+(m.role==='user'?'You':'Coach')+'</small>'+esc(m.text)+checks+'</div>';}
function addCoachMessage(m){const h=coachHistory();h.push(m);if(h.length>40)h.splice(0,h.length-40);saveUI();}
function sendCoachMessage(text,action,label){const q=(text||'').trim();if(q)addCoachMessage({role:'user',text:q});else if(label)addCoachMessage({role:'user',text:label});addCoachMessage(coachReply(q,action));renderCoachBody();}
function toggleCoach(open){const el=document.getElementById('coachPanel');if(!el)return;const willOpen=open!==undefined?open:el.classList.contains('hidden');el.classList.toggle('hidden',!willOpen);if(willOpen){renderCoachBody();setTimeout(function(){document.getElementById('coachInput')?.focus();},30);}}
function renderCoachBody(){const body=document.getElementById('coachBody');if(!body)return;const hist=coachHistory(),msgs=hist.length?hist:[coachWelcome()];body.innerHTML='<div class="coach-chat-body"><div class="coach-thread" id="coachThread" role="log" aria-live="polite">'+msgs.map(coachMessageHtml).join('')+'</div><div class="coach-quick"><button data-coach-quick="explain" aria-label="Explain this screen">Explain this screen</button><button data-coach-quick="framework" aria-label="Give me a framework">Give me a framework</button><button data-coach-quick="challenge" aria-label="Give me interviewer pushback">Challenge me</button><button data-coach-quick="critique" aria-label="Critique my answer">Critique my answer</button></div><div class="coach-composer"><textarea id="coachInput" rows="1" placeholder="Ask a term or paste your recommendation..."></textarea><button class="coach-send" id="coachSend" aria-label="Send message">Send</button></div></div>';const thread=document.getElementById('coachThread');if(thread){thread.scrollTop=thread.scrollHeight;thread.lastElementChild?.scrollIntoView({block:'nearest'});}const inp=document.getElementById('coachInput'),send=document.getElementById('coachSend');const go=function(){const v=inp?.value||'';if(!v.trim())return;if(inp)inp.value='';sendCoachMessage(v);};if(send)send.onclick=go;if(inp){inp.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}};inp.oninput=function(){inp.style.height='auto';inp.style.height=Math.max(44,Math.min(120,inp.scrollHeight||44))+'px';};}document.querySelectorAll('[data-coach-quick]').forEach(function(b){b.onclick=function(){const a=b.dataset.coachQuick;if(a==='critique'){if(inp){inp.placeholder='Paste your 90-second recommendation here...';inp.focus();}sendCoachMessage('',a,'Critique my answer');}else sendCoachMessage('',a,b.textContent.trim());};});}

function qVisualParts(q){
  const map={
    "Case math":["Volume gap","Capacity math","Sensitivity"],
    "Strategy":["Market size","Evidence gap","Launch wedge"],
    "Regulatory":["Claim","Authority","Risk level"],
    "Data quality":["Conflicting data","Source of truth","Conditional answer"],
    "Fit and honesty":["Real work","Precise scope","Credibility"],
    "Market access":["Coverage gate","Evidence need","Payer value"],
    "Consulting communication":["Answer first","Caveat control","Next step"],
    "RWE":["Comparator","Bias check","Supported claim"],
    "Operations":["Symptom","Operating cadence","Owner"],
    "Finance":["Base case","Sensitivity","Staged go"],
    "Quality":["CAPA closure","Effectiveness","Recurrence"],
    "Interview presence":["Challenge","Fix assumption","Update answer"],
    "Portfolio":["Asset options","Risk-adjusted value","Financing milestone"],
    "Clinical strategy":["Enrollment funnel","Patient friction","Evidence integrity"],
    "AI and evidence":["Use case","Governance","Measurable value"],
    "AI governance":["LLM output","Validation","Audit trail"],
    "BD diligence":["rNPV upside","Biomarker risk","Staged diligence"],
    "Manufacturing":["Forecast","Batch release","Launch constraint"],
    "HEOR":["Model result","Durability assumption","Threshold"],
    "PV operations":["Late cases","Rework driver","Root cause"],
    "Clinical operations":["Activation","Screen failure","Funnel diagnosis"],
    "RIM":["Status conflict","Definition","Decision impact"],
    "Manager review":["Budget cut","Preserve driver","Trade-off"]
  };
  return map[q.cat]||["Context","Tension","Decision"];
}
function renderQVisual(q){
  const parts=qVisualParts(q);

}

function glossaryList(){
  const q=(document.getElementById("gsearch")?.value || state.glossaryQuery || "").trim().toLowerCase();
  const cat=state.glossaryCat||"All";
  const items=DATA.glossary.filter(g=>{
    const catOk = cat==="All" || g.cat===cat;
    const s=(g.term+" "+g.def+" "+g.ex+" "+g.cat).toLowerCase();
    return catOk && (q==="" || s.includes(q));
  });
  const el=document.getElementById("glist");
  if(!items.length){ el.innerHTML=`<div class="empty">No terms match that search. Try a shorter keyword or clear the filter.</div>`; return; }
  const limit = (!q && cat==="All") ? 36 : items.length;
  const shown = items.slice(0, limit);
  el.innerHTML=(limit<items.length?`<div class="show-all-note"><b>Start with search.</b> Showing the first ${limit} of ${items.length} terms so the knowledge base stays readable. Search or choose a category to narrow it.</div>`:"")+shown.map(g=>`
    <div class="gitem">
      <h4>${esc(g.term)} <span class="gcat">${esc(g.cat)}</span></h4>
      <div class="def">${esc(g.def)}</div>

}

const V18_TERMS = [
  {term:"Dirty data",cat:"Consulting Method",def:"Data that contains missing values, inconsistent definitions, duplicates, outliers, or conflicting sources.",ex:"A manager expects you to flag dirty data before building a recommendation."},
  {term:"Issue tree",cat:"Consulting Method",def:"A structured breakdown of a problem into mutually exclusive, collectively exhaustive branches.",ex:"A safety backlog issue tree separates demand, capacity, process quality, and governance."},
  {term:"Answer builder",cat:"Consulting Method",def:"A workspace that converts analysis into executive-ready recommendation language.",ex:"The answer builder forces you to write the synthesis, evidence, risk, and next step."},
  {term:"Manager prompt",cat:"Consulting Method",def:"A short instruction from a senior consultant that reframes the analysis and raises the bar.",ex:"A manager prompt may ask what assumption would flip the recommendation."},
  {term:"Data room",cat:"Consulting Method",def:"A collection of case facts, tables, interviews, and exhibits used for analysis.",ex:"A diligence case begins in the data room, not in the final deck."},
  {term:"Client-ready",cat:"Consulting Method",def:"Clear, concise, defensible enough to show to the client without heavy rework.",ex:"A client-ready page names the decision, evidence, risk, and next step."},
  {term:"Triangulation",cat:"Consulting Method",def:"Checking an answer against multiple sources or methods instead of relying on one number.",ex:"Market size should be triangulated from epidemiology, claims, and analog uptake."},
  {term:"Sensitivity",cat:"Finance",def:"A test showing how the conclusion changes when an assumption changes.",ex:"A recommendation is more defensible when the sensitivity shows the break-even point."},
  {term:"Break-even",cat:"Finance",def:"The point where benefit equals cost or where a decision flips.",ex:"If automation uplift falls below 11 percent, the program no longer breaks even."},
  {term:"Payer mix",cat:"Market Access",def:"The distribution of patients across commercial, Medicare, Medicaid, cash, or other payer types.",ex:"Payer mix changes gross-to-net and prior authorization burden."},
  {term:"Line of therapy",cat:"Clinical Science",def:"The treatment sequence position, such as first line, second line, or later line.",ex:"Moving from third line to second line can greatly expand addressable patients."},
  {term:"Evidence gap",cat:"HEOR and Evidence",def:"The missing proof needed for a stakeholder to accept the recommendation.",ex:"A payer evidence gap may be budget impact rather than efficacy."},
  {term:"Operating model",cat:"Operations",def:"How work is owned, governed, staffed, measured, and executed.",ex:"Technology alone fails if the operating model does not change."},
  {term:"Root cause",cat:"Quality",def:"The underlying reason a problem occurs, not merely its visible symptom.",ex:"A data-integrity finding may come from access governance, not one bad record."},
  {term:"Go/no-go",cat:"Finance",def:"A decision to continue, stop, or delay investment based on evidence and risk.",ex:"A diligence memo often ends with a go, no-go, or staged go recommendation."}
];
V18_TERMS.push(
  {term:"EBIT",cat:"Finance",def:"Earnings before interest and taxes. In a DCF, EBIT is taxed to calculate NOPAT before non-cash and reinvestment adjustments.",ex:"Revenue minus cash operating costs and D&A gives EBIT."},
  {term:"D&A",cat:"Finance",def:"Depreciation and amortization, a non-cash accounting expense added back when moving from NOPAT to free cash flow.",ex:"D&A reduces EBIT but is added back because the cash investment is captured in capex."},
  {term:"NOPAT",cat:"Finance",def:"Net operating profit after tax: EBIT multiplied by one minus the tax rate.",ex:"$100M EBIT at 21% tax produces $79M NOPAT."},
  {term:"Unlevered free cash flow (UFCF)",cat:"Finance",def:"Cash flow from operations after tax and reinvestment but before interest and debt payments, available to debt and equity holders.",ex:"UFCF equals NOPAT plus D&A minus capex minus change in NWC."},
  {term:"Levered free cash flow",cat:"Finance",def:"Cash flow available to equity holders after interest, debt issuance, and debt repayment.",ex:"Levered FCF is discounted at the cost of equity rather than WACC."},
  {term:"Net working capital",cat:"Finance",def:"Operating current assets minus operating current liabilities. Growth often consumes cash through a positive change in NWC.",ex:"Inventory growth before launch can reduce free cash flow even when EBIT rises."},
  {term:"Discount factor",cat:"Finance",def:"The factor used to convert a future cash flow into present value: one divided by one plus the discount rate raised to time.",ex:"At 10%, a year-3 dollar has a present-value factor near 0.75."},
  {term:"Explicit forecast period",cat:"Finance",def:"The years modeled one by one before terminal value, usually long enough to capture normalization or a known lifecycle transition.",ex:"A drug model may need explicit years through launch, peak, and LOE."},
  {term:"Terminal value",cat:"Finance",def:"Value of cash flows beyond the explicit forecast period, commonly estimated with perpetuity growth or an exit multiple.",ex:"Terminal value should not conceal a patent cliff that belongs in explicit forecasts."},
  {term:"Perpetuity growth method",cat:"Finance",def:"Terminal-value method equal to final forecast FCF times one plus g, divided by WACC minus g.",ex:"The method is invalid when g is greater than or equal to WACC."},
  {term:"Exit multiple method",cat:"Finance",def:"Terminal-value method that applies a market multiple to a final-year operating metric such as EBITDA.",ex:"Always compare the implied multiple from a perpetuity model with observable market ranges."},
  {term:"Enterprise value",cat:"Finance",def:"Value of the operating business available to all capital providers before the debt and cash bridge.",ex:"Present value of UFCF produces enterprise value."},
  {term:"Equity value",cat:"Finance",def:"Value attributable to common equity after subtracting debt and other senior claims and adding cash and non-operating assets.",ex:"Equity value equals enterprise value minus debt plus cash in a simple bridge."},
  {term:"EV-to-equity bridge",cat:"Finance",def:"Reconciliation from enterprise value to equity value using net debt, minority interest, preferred stock, and non-operating assets when material.",ex:"A positive DCF enterprise value can still imply weak equity value if debt is large."},
  {term:"Net debt",cat:"Finance",def:"Interest-bearing debt minus cash and cash equivalents.",ex:"Subtract net debt from enterprise value in a simple equity bridge."},
  {term:"Cash conversion",cat:"Finance",def:"How effectively accounting profit becomes cash after working capital, capex, and other non-cash adjustments.",ex:"A launch can show EBITDA profit while inventory and receivables consume cash."},
  {term:"Patient-based forecast",cat:"Commercial",def:"Bottom-up revenue forecast built from patient population, eligibility, access, treatment, share, price, and persistence.",ex:"A diagnosed-patient headline becomes credible only after each conversion step is modeled."},
  {term:"Prevalence model",cat:"Commercial",def:"Forecast based on the total population living with a condition at a point in time.",ex:"Chronic therapy models often start with prevalence and persistence."},
  {term:"Incidence model",cat:"Commercial",def:"Forecast based on new cases entering each period, often tracked as treatment cohorts over time.",ex:"An acute or one-time therapy may be better modeled from annual incidence."},
  {term:"Access-cleared pool",cat:"Market Access",def:"Patients who meet clinical criteria and can realistically obtain coverage after payer restrictions and authorization.",ex:"The access-cleared pool is usually smaller than the label-eligible pool."},
  {term:"Net price",cat:"Market Access",def:"Recognized price after rebates, chargebacks, discounts, and other gross-to-net deductions.",ex:"List price multiplied by one minus gross-to-net yields a simplified net price."},
  {term:"Launch ramp",cat:"Commercial",def:"Path from initial launch sales to peak sales as awareness, access, capacity, and adoption develop.",ex:"A slower ramp reduces NPV even if peak sales is unchanged."},
  {term:"Time to peak",cat:"Commercial",def:"Number of years from launch until the product reaches peak annual sales.",ex:"Oncology products may ramp differently from broad primary-care therapies."},
  {term:"Erosion curve",cat:"Commercial",def:"Modeled revenue decline after competitor entry, safety events, price pressure, or loss of exclusivity.",ex:"A sharp LOE erosion curve is more credible than perpetual growth for one drug."},
  {term:"PTRS",cat:"Portfolio",def:"Probability of technical and regulatory success, often modeled as stage-specific and cumulative probabilities.",ex:"Commercial value is weighted by cumulative PTRS through approval."},
  {term:"rNPV",cat:"Portfolio",def:"Risk-adjusted net present value. Commercial value weighted by cumulative probability of success, minus development costs weighted by the probability of reaching each stage.",ex:"A Phase 2 asset with 40%, 55%, and 90% stage probabilities has 19.8% cumulative PTRS, so rNPV is 19.8% of approved value minus expected stage-gated costs."},
  {term:"Cumulative probability",cat:"Portfolio",def:"Product of sequential conditional probabilities required to reach a later outcome.",ex:"40% x 55% x 90% equals 19.8% probability of approval."},
  {term:"Stage-gated cost",cat:"Portfolio",def:"Cost incurred only if the program successfully reaches the stage that requires it.",ex:"Phase 3 cost is weighted by probability of passing Phase 2."},
  {term:"Probability-weighted cash flow",cat:"Portfolio",def:"Cash flow multiplied by the probability that the state required to generate it occurs.",ex:"Approval-dependent revenue receives cumulative probability through approval."},
  {term:"Unrisked commercial value",cat:"Portfolio",def:"Present value of commercial cash flows assuming technical and regulatory success.",ex:"rNPV applies explicit probability to unrisked commercial value."},
  {term:"Pipeline SOTP",cat:"Portfolio",def:"Sum-of-the-parts valuation that adds each asset's rNPV plus other assets and balance-sheet adjustments.",ex:"A pipeline SOTP keeps lead-asset and platform assumptions separate."},
  {term:"Platform value",cat:"Portfolio",def:"Value of a technology platform's ability to generate future programs beyond currently named assets.",ex:"Platform value should be modeled from program generation, timing, probability, and economics rather than a plug."},
  {term:"Continuation value",cat:"Portfolio",def:"Expected value of proceeding from the current decision point, net of future cost and risk.",ex:"Advance when continuation value exceeds the next-stage investment and alternatives."},
  {term:"Sunk cost",cat:"Finance",def:"Past cost that is unrecoverable and should not determine whether to spend more today.",ex:"A phase-gate decision compares future value and future cost, not money already spent."},
  {term:"Real option",cat:"Portfolio",def:"Value of the right, but not the obligation, to invest later after uncertainty resolves.",ex:"A focused biomarker study can buy the option to fund Phase 3 after better evidence."},
  {term:"Kill criterion",cat:"Portfolio",def:"Predefined evidence or value threshold that triggers stopping or redesigning a program.",ex:"A kill criterion protects capital from escalation of commitment."},
  {term:"Tornado chart",cat:"Finance",def:"Sensitivity chart ranking assumptions by how much they move the valuation or outcome.",ex:"Peak share and PTRS may dominate a biotech tornado chart."},
  {term:"Scenario analysis",cat:"Finance",def:"Analysis that changes a coherent set of linked assumptions to represent base, downside, or upside worlds.",ex:"An access-downside scenario changes approval, abandonment, share, and ramp together."},
  {term:"Valuation range",cat:"Finance",def:"Defensible interval produced by scenarios and sensitivities rather than one false-precision point estimate.",ex:"The deal team may negotiate within a range anchored to evidence thresholds."},
  {term:"Biobucks",cat:"Deals",def:"Informal term for the headline sum of potential future biotech deal payments, most of which may be contingent.",ex:"$1B biobucks can have far lower expected present value."},
  {term:"Upfront payment",cat:"Deals",def:"Guaranteed payment made at signing or closing, before future milestones occur.",ex:"The upfront sets the buyer's immediate downside exposure."},
  {term:"Regulatory milestone",cat:"Deals",def:"Contingent payment triggered by a regulatory event such as submission acceptance or approval.",ex:"Expected value equals milestone times trigger probability, discounted to today. One deal often layers development, regulatory, and sales milestones."},
  {term:"Commercial milestone",cat:"Deals",def:"Contingent payment triggered by launch or achievement of specified sales levels.",ex:"A $500M-sales milestone needs both approval and threshold-attainment probabilities."},
  {term:"Royalty base",cat:"Deals",def:"Contractually defined sales amount to which the royalty rate is applied after permitted deductions and allocations.",ex:"A 12% royalty on net sales is not 12% of list-price revenue."},
  {term:"Tiered royalty",cat:"Deals",def:"Royalty structure in which rates increase or decrease across sales bands.",ex:"Rates may step from 10% to 15% once annual net sales exceed a threshold."},
  {term:"Earnout",cat:"Deals",def:"Post-closing contingent payment tied to future business or product performance.",ex:"An earnout can bridge disagreement about a launch forecast."},
  {term:"Contingent value right",cat:"Deals",def:"Right given to sellers or shareholders to receive payment if specified development, regulatory, or commercial events occur.",ex:"A CVR can bridge a biotech M&A valuation gap around an upcoming readout."},
  {term:"Sublicense income",cat:"Deals",def:"Payments received when a licensee grants some licensed rights to another party, often shared with the original licensor.",ex:"Sublicense-sharing percentages can materially change deal value."},
  {term:"Reversion rights",cat:"Deals",def:"Contract terms returning licensed rights to the licensor after termination or failure to develop.",ex:"Reversion mechanics determine whether the asset can be rescued with another partner."},
  {term:"Term sheet",cat:"Deals",def:"Usually non-binding document outlining major economic and control terms before definitive agreements.",ex:"A term sheet aligns upfront, milestones, royalties, governance, and diligence conditions."},
  {term:"Precedent transactions",cat:"Deals",def:"Prior comparable deals used to benchmark pricing and structure, adjusted for stage, indication, rights, and market conditions.",ex:"Headline deal value without probability and rights normalization can mislead."},
  {term:"Trading comparables",cat:"Finance",def:"Public-company valuation multiples used to contextualize a target relative to peers.",ex:"Pre-revenue biotech comps may use EV divided by probability-adjusted peak sales."},
  {term:"Control premium",cat:"Deals",def:"Premium paid above unaffected market value to acquire control of a company.",ex:"A control premium should not be confused with scientific or pipeline value."},

);
V18_TERMS.forEach(t=>{ if(!DATA.glossary.some(g=>g.term.toLowerCase()===t.term.toLowerCase())) DATA.glossary.push(t); });
function reEsc(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function termify(txt){
  const source=String(txt);
  const terms=V18_TERMS.concat(DATA.glossary.filter(g=>['rNPV','NPV','HEOR','RWE','ICSR','CAPA','gross-to-net','PoS','eCTD','RIM','Market access','Biosimilar','Interchangeability','Root cause','Operating model'].includes(g.term))).map(g=>g.term).sort((a,b)=>b.length-a.length);
  const ranges=[];
  terms.forEach(term=>{
    const rg=new RegExp('(^|[^A-Za-z0-9-])('+reEsc(term)+')(?=$|[^A-Za-z0-9-])','gi');
    let m;
    while((m=rg.exec(source))){
      const st=m.index+m[1].length, en=st+m[2].length;
      if(!ranges.some(r=>st<r.e && en>r.s)) ranges.push({s:st,e:en,term});
      if(m.index===rg.lastIndex) rg.lastIndex++;
    }
  });
  ranges.sort((a,b)=>a.s-b.s);
  let out='', pos=0;
  ranges.forEach(r=>{ out+=esc(source.slice(pos,r.s)); out+='<span class="term-def chip" tabindex="0" data-term="'+esc(r.term)+'">'+esc(source.slice(r.s,r.e))+'</span>'; pos=r.e; });
  out+=esc(source.slice(pos));
  return out;
}

DEEP_QS.push(
  {cat:"Portfolio", diff:"Partner", q:"A biotech has one large-market asset with payer evidence gaps and one orphan asset with cleaner biomarker data. The CEO asks which one to fund before a financing. What is the best framing?", options:[["strong","Frame the decision around risk-adjusted value to the next financing milestone, not raw market size. Compare endpoint credibility, access path, cost, time to inflection, and option value."],["weak","Back the large-market asset, since investors reward big TAM stories and the payer evidence gap can be closed later with a post-hoc HEOR package."],["trap","Back the orphan asset, since orphan pricing and regulatory incentives usually outweigh market size in risk-adjusted terms and rare-disease approvals face less payer scrutiny."]]},
  {cat:"Clinical strategy", diff:"Partner", q:"A rare-disease trial is behind enrollment. Adding countries is faster on paper, but patient groups say travel burden is the bottleneck. What should you do first?", options:[["strong","Diagnose the enrollment funnel before adding sites: activation time, screen failure, travel burden, retention, protocol deviations, and country data quality. Then combine patient-support levers with selective site expansion."],["weak","Add the countries with the largest diagnosed patient pools immediately, since enrollment scale problems are ultimately solved by widening the eligible base, and address travel burden once the new sites are live."],["trap","Relax the tightest inclusion criteria, since it is the cheapest and fastest way to expand the eligible pool, and the statisticians can adjust for the added heterogeneity in the analysis."]]},
  {cat:"Market access", diff:"Partner", q:"A launch team wants to promote the broadest GLP-1 population first, but payer restrictions and supply caps are severe. What is the senior answer?", options:[["strong","Prioritize a defensible launch wedge where evidence, access, HCP readiness, and supply can support uptake. Track PA approval, fill capacity, abandonment, and persistence before widening promotion."],["weak","Launch to the broadest eligible population, since demand is already strong, and stand up a payer-relations workstream in parallel to grind down prior-authorization friction as volume builds."],["trap","Target the self-pay and cash channel first, since it avoids payer friction entirely and early revenue momentum will strengthen the eventual access negotiation."]]},
  {cat:"AI and evidence", diff:"Partner", q:"Medical Affairs wants an AI engine for KOL insights, evidence gaps, and field next-best actions. Compliance is worried. Which pilot is most defensible?", options:[["strong","Start with reviewable evidence gap mapping or literature surveillance, with source traceability, human review, approved-use boundaries, monitoring, and audit logs before any field-facing recommendation."],["weak","Pilot literature surveillance and the field next-best-action module together, since running both in parallel lets the client compare evidence value against commercial adoption within one budget cycle."],["trap","Start with the field next-best-action module under manual approval, since its commercial value is the easiest to measure and early wins will fund the evidence work later."]]},
  {cat:"RWE", diff:"Hard", q:"A payer rejects a value story because the RWE comparator cohort is sicker than the treated cohort. What should the consultant say?", options:[["strong","Do not oversell the result. Diagnose confounding, define a better comparator strategy, run sensitivity analyses, and state what claim the evidence can and cannot support."],["weak","Reassure the payer that real-world data reflects actual practice better than trial populations, and offer to add a limitations slide to the value dossier."],["trap","Drop the comparator analysis from the dossier and lead with the unadjusted positive outcomes, since the cohort imbalance only invites more scrutiny."]]},
  {cat:"Operations", diff:"Partner", q:"A sponsor wants to cut clinical operations cost by centralizing monitoring, but site burden and data-query cycle time are worsening. What is the right problem statement?", options:[["strong","This is a throughput and quality trade-off, not just a cost case. Analyze monitoring productivity, query cycle time, protocol complexity, site burden, risk-based monitoring thresholds, and patient-impact metrics."],["weak","Centralize monitoring and negotiate stronger site-service SLAs, since the direct cost savings are contractual while the query-cycle risk is speculative and can be managed by exception reporting."],["trap","Centralize and raise per-monitor query throughput targets while trimming site training budgets, since standardized central processes should absorb the quality risk at lower unit cost."]]}
);

function renderDeepQBank(){ const cats=['All',...Array.from(new Set(DEEP_QS.map(q=>q.cat)))]; const active=practicalState.activeQCat||'All'; let list=DEEP_QS.map((q,i)=>Object.assign({i},q)).filter(q=>active==='All'||q.cat===active); const compactAll=active==='All'; const sc=practicalScore(); return `<div class="card studio-hero drill-hero"><div class="eyebrow">Drills</div><h2>Sharp reps for messy judgment.</h2><p class="lede">Not trivia. These prompts train the kind of answer you can defend when a manager pushes back.</p><div class="section-guide" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22);color:#eef7ff"><b style="color:#fff">Drill flow:</b> choose one category, answer a few prompts, then review the misses while the logic is fresh.</div><div class="studio-progress"><div class="mini"><h4>${sc.qAnswered}/${sc.qTotal}</h4><p>answered</p></div><div class="mini"><h4>${sc.qPts}/${sc.qMax}</h4><p>points</p></div><div class="mini"><h4>${sc.qMax?Math.round(sc.qPts/sc.qMax*100):0}%</h4><p>practical score</p></div></div><div class="q-tabs">${cats.map(c=>`<button class="q-tab ${active===c?'active':''}" data-q-cat="${esc(c)}">${esc(c)}</button>`).join('')}</div></div><div class="qbank-grid ${compactAll?'compact':''}">${list.map(q=>renderDeepQ(q)).join('')}</div>${compactAll?`<div class="show-all-note"><b>Keep it focused:</b> the default view shows five prompts. Pick a category when you want a targeted rep.</div>`:''}`; }
function renderDeepQ(q){
  const ans=practicalState.qbank[q.i];
  const chosen=ans&&q.options[ans.oi];
  const letters=['A','B','C','D'];
  const strongIdx=q.options.findIndex(o=>o[0]==='strong');
  const order=stableOptionOrder(q.options.length,'dq-'+q.i);
  const strongLetter=letters[order.indexOf(strongIdx)]||'';
  const parts=qVisualParts(q);
  const solve=chosen?`<div class="q-solve"><div class="q-solve-col"><b>Model answer &middot; ${strongLetter}</b><p>${esc(q.options[strongIdx][1])}</p></div><div class="q-solve-col"><b>How to get there</b><ol><li>Start from the facts: ${esc(parts[0].toLowerCase())}.</li><li>Name the tension that makes it hard: ${esc(parts[1].toLowerCase())}.</li><li>Commit at the decision point (${esc(parts[2].toLowerCase())}) and say what evidence would change your answer.</li></ol></div></div>`:'';
  return `<div class="q-card q-card-visual"><div class="q-prompt-grid"><div class="q-prompt-main"><div class="q-kicker">Prompt</div><h3>${esc(q.q)}</h3><div class="q-meta"><span>${esc(q.cat)}</span><span>${esc(q.diff)}</span></div></div>${renderQVisual(q)}</div><div class="q-options">${order.map((oi,rank)=>{ const o=q.options[oi]; return `<button class="${ans&&ans.oi===oi?'chosen '+o[0]:''}" data-q-pick="${q.i}:${oi}"><span class="opt-letter">${letters[rank]||String(rank+1)}</span><span>${esc(o[1])}</span></button>`; }).join('')}</div>${chosen?`<div class="q-feedback ${chosen[0]}"><b>${chosen[0].toUpperCase()}.</b> ${qFeedback(chosen[0])}</div>`:''}${solve}</div>`;
}
function qFeedback(t){ return t==='strong'?'This is manager-ready because it states the decision logic, caveat, and next analytic step.':t==='weak'?'Partly right, but it is too generic or misses the decision-driving assumption.':'Trap answer. It overclaims, skips structure, or confuses a symptom for the underlying problem.'; }
function wireDeepQBank(){ document.querySelectorAll('[data-q-cat]').forEach(b=>b.onclick=()=>{ practicalState.activeQCat=b.getAttribute('data-q-cat'); savePractical(); render(); window.scrollTo({top:0,behavior:'smooth'}); }); document.querySelectorAll('[data-q-pick]').forEach(b=>b.onclick=()=>{ const [i,oi]=b.getAttribute('data-q-pick').split(':').map(Number); practicalState.qbank[i]={i,oi}; savePractical(); render(); }); }

let __cloudSaveTimer=null;
function scheduleCloudSave(){ if(!cloud.user || !cloud.client) return; clearTimeout(__cloudSaveTimer); __cloudSaveTimer=setTimeout(saveCloudProgress,900); }
async function saveCloudProgress(){ if(!cloud.user || !cloud.client) return; cloud.saving=true; updateAuthButton(); const payload=snapshotForCloud(); const {error}=await cloud.client.from('readytoconsult_progress').upsert({user_id:cloud.user.id,data:payload,updated_at:payload.updatedAt}); cloud.saving=false; if(error){ cloud.status='error'; cloud.message='Cloud save failed'; console.warn(error); } else { cloud.status='cloud'; cloud.message='Synced'; cloud.lastSync=payload.updatedAt; } updateAuthButton(); }
async function loadCloudProgress(){ if(!cloud.user || !cloud.client) return; const {data,error}=await cloud.client.from('readytoconsult_progress').select('data,updated_at').eq('user_id',cloud.user.id).maybeSingle(); if(error){ cloud.status='error'; cloud.message='Cloud load failed'; updateAuthButton(); return; } if(data && data.data){ applyCloudSnapshot(data.data); cloud.status='cloud'; cloud.message='Cloud loaded'; cloud.lastSync=data.updated_at; } else { await saveCloudProgress(); cloud.status='cloud'; cloud.message='Cloud initialized'; } cloud.loaded=true; render(); }
async function initAuth(){ const client=initCloudClient(); if(!client){ cloud.status='local'; cloud.message='Cloud not configured'; updateAuthButton(); return; } const {data}=await client.auth.getSession(); cloud.user=data.session&&data.session.user||null; client.auth.onAuthStateChange((event,session)=>{ cloud.user=session&&session.user||null; cloud.status=cloud.user?'cloud':'local'; cloud.message=cloud.user?'Signed in':'Local only'; updateAuthButton(); if(cloud.user) loadCloudProgress(); }); if(cloud.user) await loadCloudProgress(); else updateAuthButton(); }

d.status='local'; cloud.message='Local only'; closeAuthModal(); render(); }; const magic=document.getElementById('magicBtn'); if(magic) magic.onclick=sendMagicLink;  }

]; return `<div class="card"><div class="eyebrow">Synthetic data pack</div><h2 style="font-size:20px">Proprietary-style diligence file, built from public-case patterns</h2><div class="synthetic-note"><b>Training data.</b> Synthetic case data, built to mimic an internal diligence pack: mixed sources, missing fields, conflicting ranges, and reliability flags.</div><table class="dirty-table"><thead><tr>${rows[0].map(x=>`<th>${esc(x)}</th>`).join('')}</tr></thead><tbody>${rows.slice(1).map(r=>`<tr><td>${esc(r[0])}</td><td><span class="source-pill">${esc(r[1])}</span></td><td>${esc(r[2])}</td><td>${esc(r[3])}</td><td>${esc(r[4])}</td><td class="${r[4]==='Low'?'flag':'okflag'}">${esc(r[5])}</td></tr>`).join('')}</tbody></table><div class="callout"><b>Analyst task:</b> never average sources blindly. Decide which source drives the model, which source is a risk flag, and which missing field requires diligence.</div></div>`; }
function stratDCF(prefix,over){ const base=Object.assign({},stratState.model,over||{}); const old=stratState.model; stratState.model=base; const c=stratCalc(prefix); stratState.model=old; const ramp=[.15,.35,.60,.80,1.0]; const disc=(base.discount||10)/100; let pv=0; ramp.forEach((r,i)=>{ const cf=c.gm*r; pv+=cf/Math.pow(1+disc,i+1); }); const npv=pv-base[prefix+'Launch']; const rnpv=(pv*(base[prefix+'PoS']/100))-base[prefix+'Launch']; return {npv,rnpv,peak:c.peak,gm:c.gm}; }
function strategySensitivity(){ const prefix=stratState.asset||'oph'; const label=prefix==='oph'?'Ophthalmology biosimilar':'Dermatology therapy'; const base=stratDCF(prefix,{}); const m=stratState.model; const tests=[
  ['Peak share +20%',{[prefix+'Share']:m[prefix+'Share']*1.2}],['Peak share -20%',{[prefix+'Share']:m[prefix+'Share']*.8}],['GTN +10 pts',{[prefix+'GTN']:m[prefix+'GTN']+10}],['GTN -10 pts',{[prefix+'GTN']:Math.max(0,m[prefix+'GTN']-10)}],['Price +10%',{[prefix+'Price']:m[prefix+'Price']*1.1}],['Price -10%',{[prefix+'Price']:m[prefix+'Price']*.9}],['PoS +15 pts',{[prefix+'PoS']:Math.min(100,m[prefix+'PoS']+15)}],['PoS -15 pts',{[prefix+'PoS']:Math.max(0,m[prefix+'PoS']-15)}],['Launch cost +25%',{[prefix+'Launch']:m[prefix+'Launch']*1.25}]
].map(x=>{ const val=stratDCF(prefix,x[1]).rnpv; return {name:x[0],delta:val-base.rnpv}; }).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta)); const max=Math.max(...tests.map(t=>Math.abs(t.delta)),1); return `<div class="card"><div class="eyebrow">NPV and sensitivity</div><h2 style="font-size:20px">WSO-style finance rigor for the commercial case</h2><p class="sub">Select an asset, then test which assumption moves risk-adjusted NPV most. This follows the public modeling principle of changing inputs and measuring output impact.</p><div class="strat-fields" style="margin-bottom:14px"><div class="strat-field"><label>Asset for sensitivity</label><select data-strat-asset><option value="oph" ${prefix==='oph'?'selected':''}>Ophthalmology biosimilar</option><option value="derm" ${prefix==='derm'?'selected':''}>Dermatology therapy</option></select></div><div class="strat-field"><label>Discount rate %</label><input type="number" data-strat-model="discount" value="${esc(m.discount||10)}"></div></div><div class="model-output" style="margin-bottom:14px"><div class="metric"><small>Selected asset</small><b style="font-size:18px">${esc(label)}</b></div><div class="metric"><small>Base NPV</small><b>${fmtM(base.npv)}</b></div><div class="metric"><small>Simplified rNPV proxy</small><b>${fmtM(base.rnpv)}</b></div><div class="metric"><small>Peak net revenue</small><b>${fmtM(base.peak)}</b></div></div>${tests.map(t=>{ const pct=Math.min(50,Math.abs(t.delta)/max*50); return `<div class="sens-row"><div class="sens-name">${esc(t.name)}</div><div class="sens-bar"><i class="${t.delta<0?'neg':''}" style="width:${pct}%;${t.delta<0?'':'left:50%'}"></i></div><div class="sens-val">${fmtM(t.delta)}</div></div>`; }).join('')}<div class="callout"><b>Interview move:</b> name the top two value drivers, then say exactly what diligence would confirm or disprove them. This is a simplified training proxy, not a full valuation model.</div></div>`; }
function strategyTranscripts(){ const rows=[

function strategyEvaluator(){ const items=[['math','Math proficiency','Calculations are correct and transparent.'],['assumptions','Assumptions and ambiguity','Key assumptions are stated and ambiguity is clarified.'],['think','Think out loud','Logic can be followed step by step.'],['creativity','Creativity and trends','Answer reflects payer, biosimilar, access, and market trends.'],['recommendation','Clear recommendation','Conclusion is confident and to the point.'],['findings','Key findings support','Recommendation is justified by the highest-impact facts.'],['next','Next steps','Names diligence actions needed to finish the case.']]; const done=items.filter(x=>stratState.evaluator[x[0]]).length; const pct=Math.round(done/items.length*100); return `<div class="card"><div class="eyebrow">WSO-style case evaluator</div><h2 style="font-size:20px">Score the answer the way case interview prep does</h2><p class="sub">This mirrors publicly described case-evaluation themes: math, assumptions, thinking aloud, creativity, recommendation, key findings, and next steps.</p><div class="work-grid"><div class="eval-grid">${items.map(x=>`<label class="eval-card"><input type="checkbox" data-strat-eval="${x[0]}" ${stratState.evaluator[x[0]]?'checked':''}><span><b>${x[1]}</b><small>${x[2]}</small></span></label>`).join('')}</div><div style="display:grid;place-items:center;gap:12px"><div class="score-ring" style="--p:${pct}%"><span>${pct}</span></div><p class="sub" style="text-align:center">80+ means the case answer is interview-ready. Below 70 means the memo still needs sharpening.</p></div></div></div>`; }
function strategyMarket(){ const d=stratCalc('derm'), o=stratCalc('oph'); const f=(k,l,p)=>`<div class="strat-field"><label>${l}</label><input type="number" data-strat-model="${k}" value="${esc(stratState.model[k])}"></div>`; return `<div class="card"><div class="eyebrow">Market sizing and value</div><h2 style="font-size:20px">Peak revenue and risk-adjusted value model</h2><p class="sub">This is intentionally simple but consultant-like: eligible pool x share x net price, then risk-adjust by probability of success and launch investment.</p><div class="strat-model"><div><div class="asset-tag">Dermatology inputs</div><div class="strat-fields">${f('dermPatients','Patients')}${f('dermEligible','Eligible %')}${f('dermShare','Peak share %')}${f('dermPrice','Annual price')}${f('dermGTN','GTN %')}${f('dermCOGS','COGS %')}${f('dermLaunch','Launch cost')}${f('dermPoS','PoS %')}</div><div class="asset-tag" style="margin-top:14px">Ophthalmology inputs</div><div class="strat-fields">${f('ophPatients','Patients')}${f('ophEligible','Eligible %')}${f('ophShare','Peak share %')}${f('ophPrice','Annual price')}${f('ophGTN','GTN %')}${f('ophCOGS','COGS %')}${f('ophLaunch','Launch cost')}${f('ophPoS','PoS %')}</div></div><div><table class="strat-table"><thead><tr><th>Asset</th><th>Treated</th><th>Peak net rev</th><th>Gross margin</th><th>Risk-adj value</th></tr></thead><tbody><tr><td>Dermatology</td><td>${Math.round(d.treated).toLocaleString()}</td><td>${fmtM(d.peak)}</td><td>${fmtM(d.gm)}</td><td><b class="${d.risk>0?'good':'bad'}">${fmtM(d.risk)}</b></td></tr><tr><td>Ophthalmology</td><td>${Math.round(o.treated).toLocaleString()}</td><td>${fmtM(o.peak)}</td><td>${fmtM(o.gm)}</td><td><b class="${o.risk>0?'good':'bad'}">${fmtM(o.risk)}</b></td></tr></tbody></table><div class="callout"><b>Synthesis prompt:</b> If the smaller market wins, explain why focus, access path, PoS, or launch cost offsets lower patient volume.</div></div></div></div>`; }

function strategyAccess(){ const items=[['tpp','Access-enabled TPP','Value drivers are explicit before Phase 3 or launch planning.'],['budget','Budget impact model','Payer can see per-member or plan-level affordability.'],['rwe','RWE or persistence plan','Evidence addresses real-world durability, adherence, or resource use.'],['coding','Coding and reimbursement path','Billing, coding, site of care, and patient OOP barriers are mapped.'],['kol','KOL and payer validation','External feedback tests whether the value story is credible.'],['contract','Contracting and GTN plan','Net price, rebates, and access tradeoffs are explicit.']]; return `<div class="card"><div class="eyebrow">Market access evidence</div><h2 style="font-size:20px">Build the payer-ready evidence plan</h2><p class="sub">A strong answer does not stop at FDA approval. It names what payers, HTA bodies, providers, and patients need to see.</p><div class="access-grid">${items.map(x=>`<div class="access-card ${stratState.access[x[0]]?'ready':''}"><h4>${x[1]}</h4><p>${x[2]}</p><label><input type="checkbox" data-strat-access="${x[0]}" ${stratState.access[x[0]]?'checked':''}> Included in plan</label></div>`).join('')}</div></div>`; }

function capCalc(){ const m=capState.model; const proposed=m.capacity*(1+m.automation/100)+m.fte*m.fteOutput; const status=m.intake-m.capacity; const burn=proposed-m.intake; const months=burn>0?m.backlog/burn:999; const backlogReduced=Math.min(m.backlog,Math.max(0,burn)*12); const gross=backlogReduced*m.lateCost; const cost=m.implementation+(m.fte*m.contractorCost*12); const net=gross-cost; const payback=net>0?cost/(Math.max(1,gross/12)):999; return {proposed,status,burn,months,backlogReduced,gross,cost,net,payback}; }
function money(n){ return '$'+Math.round(n).toLocaleString(); }
function capModel(){ const m=capState.model, c=capCalc(); const field=(k,label)=>`<div class="model-field"><label>${label}</label><input type="number" data-cap-model="${k}" value="${esc(m[k])}"></div>`; return `<div class="card"><div class="eyebrow">Interactive model</div><h2 style="font-size:20px">Capacity and business case builder</h2><p class="sub">Change assumptions and watch the recommendation economics move. This is the closest part to real work.</p><div class="work-grid"><div><div class="model-grid">${field('intake','Monthly intake')}${field('capacity','Current processed')}${field('backlog','Current backlog')}${field('automation','Automation uplift %')}${field('fte','Temporary FTE')}${field('fteOutput','Cases per FTE')}${field('lateCost','Value per late case avoided')}${field('implementation','Implementation cost')}${field('contractorCost','Monthly cost per FTE')}</div></div><div><div class="model-output"><div class="metric ${c.status>0?'bad':'good'}"><small>Status quo monthly gap</small><b>${Math.round(c.status)}</b></div><div class="metric ${c.burn>0?'good':'bad'}"><small>Proposed net burn</small><b>${Math.round(c.burn)}</b></div><div class="metric"><small>Months to clear backlog</small><b>${c.months>60?'Never':c.months.toFixed(1)}</b></div><div class="metric ${c.net>0?'good':'bad'}"><small>12-month net value</small><b>${money(c.net)}</b></div><div class="metric"><small>Backlog reduced in 12 mo</small><b>${Math.round(c.backlogReduced)}</b></div><div class="metric"><small>Payback months</small><b>${c.payback>60?'N/A':c.payback.toFixed(1)}</b></div></div></div></div><div class="callout" style="margin-top:14px"><b>Consultant synthesis prompt:</b> Does the model support funding the program? If yes, what governance condition must be true for the recommendation to hold?</div></div>`; }
function capCalcFor(overrides){ const old=capState.model; capState.model=Object.assign({},old,overrides||{}); const out=capCalc(); capState.model=old; return out; }
function capScenarios(){ const m=capState.model; const rows=[

return `<div class="card"><div class="eyebrow">Scenario compare</div><h2 style="font-size:20px">Stress-test the recommendation</h2><p class="sub">Managers will ask what happens if the assumptions are wrong. Compare conservative, base, and aggressive cases before presenting.</p><table class="scenario-table"><thead><tr><th>Scenario</th><th>Automation</th><th>Temp FTE</th><th>Months to clear</th><th>12-mo net value</th><th>Payback</th><th>Readout</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.name}</td><td>${r.m.automation}%</td><td>${r.m.fte}</td><td>${r.c.months>60?'Never':r.c.months.toFixed(1)}</td><td><b class="${r.c.net>0?'good':'bad'}">${money(r.c.net)}</b></td><td>${r.c.payback>60?'N/A':r.c.payback.toFixed(1)+' mo'}</td><td>${r.c.net>0?'Fundable if governance holds':'Not fundable on economics alone'}</td></tr>`).join('')}</tbody></table><div class="callout"><b>Partner prompt:</b> If the conservative case is weak, explain which risk you would de-risk first before asking for full funding.</div></div>`; }
function capHypotheses(){ const hs=capState.hypotheses||[]; return `<div class="card"><div class="eyebrow">Hypothesis tracker</div><h2 style="font-size:20px">Manage the case like a consultant</h2><p class="sub">Write hypotheses, evidence, and confidence. This trains the habit of testing a point of view rather than collecting facts forever.</p><div class="hyp-grid"><label>Hypothesis</label><label>Evidence or disconfirming fact</label><label>Confidence</label>${hs.map((h,i)=>`<div class="hyp-row"><textarea data-cap-hyp="${i}:h">${esc(h.h)}</textarea><textarea data-cap-hyp="${i}:e">${esc(h.e)}</textarea><select data-cap-hyp="${i}:c"><option ${h.c==='Low'?'selected':''}>Low</option><option ${h.c==='Medium'?'selected':''}>Medium</option><option ${h.c==='High'?'selected':''}>High</option></select></div>`).join('')}</div><div style="margin-top:12px"><button class="ghost" id="addHyp">Add hypothesis</button></div></div>`; }

function capMemoText(){ const c=capCalc(), s=capState.slides; return `To: COO and R&D leadership\nSubject: Safety operations transformation recommendation\n\nRecommendation\n${s.summary||'Fund a staged 12-month safety operations program if governance and triage standardization are included, not as a technology-only implementation.'}\n\nEvidence\nCurrent intake is ${capState.model.intake} cases per month against ${capState.model.capacity} processed, creating a status quo gap of ${Math.round(c.status)} cases per month. Under the current modeled assumptions, proposed net burn is ${Math.round(c.burn)} cases per month, backlog reduction over 12 months is ${Math.round(c.backlogReduced)} cases, and 12-month net value is ${money(c.net)}.\n\nOperating answer\n${s.recommendation||'Sequence the work in two gates: first standardize triage and add temporary capacity, then implement workflow automation once rules and ownership are clear.'}\n\nRisks and next steps\n${s.risks||'The main risk is overstating the value per late case avoided or underestimating adoption friction. First 30 days should validate triage variation, confirm quality controls, and lock the conservative case.'}`; }
function capMemo(){ const memo=capMemoText(); return `<div class="card"><div class="eyebrow">Client-ready memo</div><h2 style="font-size:20px">Generate a one-page executive memo</h2><p class="sub">This converts your model and slide work into a concise written deliverable. Use it to rehearse executive communication.</p><div class="memo-box" id="memoBox">${esc(memo)}</div><div class="memo-actions"><button class="ghost" id="copyMemo">Copy memo</button><span class="copy-note" id="copyNote"></span></div></div>`; }
function capSlides(){ const s=capState.slides; const input=(k,title,ph)=>`<div class="slide-input"><label style="font-size:11px;text-transform:uppercase;letter-spacing:.55px;color:var(--muted);font-weight:900">${title}</label><textarea data-cap-slide="${k}" placeholder="${ph}">${esc(s[k])}</textarea></div>`; const fallback={summary:'Recommendation in one sentence. Include funding decision and expected impact.',analysis:'Key math and facts from the model or data room.',recommendation:'Operating model, technology, governance, and sequencing.',risks:'Main assumption, risk, and next step to de-risk.'}; return `<div class="card"><div class="eyebrow">Slide builder</div><h2 style="font-size:20px">Build a mini executive deck</h2><p class="sub">Write concise slide content. The preview forces answer-first consulting communication.</p><div class="slide-grid"><div>${input('summary','Slide 1: Executive summary','Fund the 12-month program because...')}${input('analysis','Slide 2: Evidence and math','The backlog is growing by...')}${input('recommendation','Slide 3: Recommendation','Prioritize triage standardization, workflow automation, and temporary capacity...')}${input('risks','Slide 4: Risks and next steps','The recommendation depends on...')}</div><div class="deck" id="deckPreview">${['summary','analysis','recommendation','risks'].map((k,i)=>`<div class="slide-card"><h4>Slide ${i+1}: ${['Executive Summary','Evidence and Math','Recommendation','Risks and Next Steps'][i]}</h4><p>${esc(s[k]||fallback[k])}</p></div>`).join('')}</div></div><div style="margin-top:12px"></div></div>`; }

function openPalette(){

  back.onclick=(e)=>{ if(e.target===back) closePalette(); };
  draw(); setTimeout(()=>input.focus(),20);
}
