<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0b1220" />
<title>Life Sciences Consulting Interview Course | R&D Business Consultant</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%230f2A43'/%3E%3Ctext x='21' y='33' text-anchor='middle' font-family='Georgia, serif' font-weight='600' font-size='26' fill='%23f7f5f1'%3ER%3C/text%3E%3Ccircle cx='33' cy='31' r='2.6' fill='%23c8a668'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f1ea; --bg2:#ede7dc; --card:#fffdf8; --card2:#f9f6ee;
    --ink:#172033; --muted:#647084; --quiet:#8a93a4;
    --navy:#10233f; --navy2:#173b69; --blue:#265d9f; --blue2:#2f72c8;
    --aqua:#2f6feb; --gold:#b9852f; --red:#b0404a; --green:#167a56;
    --line:#ded8cc; --line2:#c9d4e2;
    --soft-blue:#e8f0fb; --soft-green:#e7f4ed; --soft-gold:#fbf1dc; --soft-red:#fbe9ea;
    --shadow:0 1px 1px rgba(16,24,40,.04),0 14px 35px rgba(27,39,67,.10);
    --shadow2:0 20px 60px rgba(15,28,50,.18);
    --radius:18px; --radius-sm:12px; --max:1240px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  html,body{margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:
    radial-gradient(circle at top left,rgba(47,114,200,.12),transparent 34rem),
    linear-gradient(180deg,var(--bg),#f7f5ef 42%,#f6f3ec);line-height:1.56;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:"IBM Plex Serif",Georgia,serif;color:var(--navy);line-height:1.18;margin:0;letter-spacing:-.015em}
  a{color:var(--blue);text-decoration:none}
  button{font-family:inherit}

  header.top{position:sticky;top:0;z-index:40;color:#edf4ff;background:rgba(11,18,32,.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.10)}
  .top-inner{max-width:var(--max);margin:0 auto;padding:13px 22px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between}
  .brand{display:flex;flex-direction:column;gap:2px;position:relative;padding-left:14px}
  .brand:before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:4px;border-radius:99px;background:linear-gradient(180deg,var(--blue2),var(--aqua))}
  .brand h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:.05px}
  .brand span{color:#b9c8df;font-size:12.5px;font-weight:500}
  .meters{display:flex;gap:12px;flex-wrap:wrap}
  .meter{background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.13);border-radius:14px;padding:9px 13px;min-width:206px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .meter .mlabel{display:flex;gap:12px;justify-content:space-between;align-items:baseline;font-size:10.5px;color:#b9c8df;letter-spacing:.5px;text-transform:uppercase;font-weight:800;white-space:nowrap}
  .meter .mval{font-size:16px;color:#fff;font-weight:800;font-family:"IBM Plex Serif",serif}
  .bar{height:7px;background:rgba(255,255,255,.13);border-radius:99px;margin-top:7px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:99px;transition:width .55s cubic-bezier(.2,.7,.2,1)}
  .bar.k > i{background:linear-gradient(90deg,#6db2ff,#9ed0ff)}
  .bar.r > i{background:linear-gradient(90deg,#3cc28a,#98e0bf)}

  .wrap{max-width:var(--max);margin:0 auto;padding:26px 22px;display:grid;grid-template-columns:278px minmax(0,1fr);gap:24px;align-items:start}
  nav.side{position:sticky;top:94px;background:rgba(255,253,248,.88);backdrop-filter:blur(16px);border:1px solid rgba(222,216,204,.9);border-radius:22px;padding:12px;box-shadow:var(--shadow)}
  nav.side .navhdr{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--quiet);font-weight:900;padding:9px 10px 5px}
  .navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:transparent;color:#2b3648;padding:10px 10px;border-radius:12px;font-size:13.2px;cursor:pointer;font-weight:650;transition:background .15s,transform .15s,color .15s}
  .navbtn:hover{background:#f0ece4;transform:translateX(2px)}
  .navbtn.active{background:linear-gradient(135deg,#e8f0fb,#f7fbff);color:var(--navy);box-shadow:inset 0 0 0 1px #d7e4f6}
  .navbtn .num{flex:0 0 25px;height:25px;border-radius:9px;background:#ece7dc;color:#687386;font-size:11px;font-weight:900;display:grid;place-items:center;font-family:"IBM Plex Serif",serif}
  .navbtn.active .num{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff}
  .navbtn .dot{margin-left:auto;font-size:12px;color:var(--green)}

  main{min-width:0}
  .card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;margin-bottom:22px;position:relative;overflow:hidden}
  .card:before{content:"";position:absolute;inset:0 0 auto 0;height:1px;background:linear-gradient(90deg,transparent,rgba(47,114,200,.22),transparent)}
  .hero{background:linear-gradient(135deg,#fffdf8 0%,#f8f3e8 46%,#edf4fb 100%);padding:34px}
  .hero:after{content:"";position:absolute;right:-120px;top:-130px;width:310px;height:310px;border-radius:50%;background:radial-gradient(circle,rgba(47,114,200,.16),transparent 65%)}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.85px;font-weight:900;color:var(--blue)}
  .card h2{font-size:25px;margin:7px 0 4px;max-width:820px}
  .card .sub{color:var(--muted);font-size:14px;margin-bottom:2px}
  .lede{font-size:15.7px;color:#3b4758;max-width:74ch;margin:12px 0 0}

  .brief{background:linear-gradient(180deg,#fff,#f7f3eb);border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:16px;padding:20px 22px;margin:20px 0 6px;box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
  .brief .btag{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--navy);margin-bottom:9px}
  .brief p{margin:0 0 11px;font-size:14.7px;color:#2f3a4c}
  .brief p:last-child{margin-bottom:0}
  .brief .we{background:#fff;border:1px dashed #cec7ba;border-radius:12px;padding:13px 15px;font-size:13.8px;margin-top:10px}
  .brief .we b{color:var(--navy)}

  .concept-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px}
  .chip{background:#f1ece2;color:#465369;border:1px solid #ded6c7;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer;transition:.15s}
  .chip:hover{background:var(--soft-blue);border-color:#c6d8ef;color:var(--blue)}

  .drill{border:1px solid var(--line);border-radius:18px;padding:20px;background:linear-gradient(180deg,#fff,#fffaf1)}
  .drill .dhead{display:flex;align-items:center;gap:10px;margin-bottom:5px}
  .kind{font-size:10.5px;font-weight:900;letter-spacing:.7px;text-transform:uppercase;padding:4px 10px;border-radius:8px}
  .kind.know{background:var(--soft-blue);color:#174d8e}
  .kind.scen{background:#f0eafb;color:#5b3eb2}
  .qmeta{margin-left:auto;font-size:12px;color:var(--quiet)}
  .speaker{font-size:12.5px;color:var(--muted);font-style:italic;margin:3px 0 8px}
  .qtext{font-size:15.8px;font-weight:750;color:var(--ink);margin:7px 0 15px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{position:relative;text-align:left;border:1.5px solid #dcd5c9;background:#fff;border-radius:14px;padding:13px 15px 13px 44px;font-size:14px;color:#2b3542;cursor:pointer;transition:border-color .15s,background .15s,transform .15s,box-shadow .15s;width:100%}
  .opt:hover{border-color:#bed3ef;background:#fbfdff;transform:translateY(-1px);box-shadow:0 8px 18px rgba(27,39,67,.07)}
  .opt .mk{position:absolute;left:13px;top:13px;width:21px;height:21px;border-radius:8px;border:1.5px solid #c4ccd6;display:grid;place-items:center;font-size:11px;font-weight:900;color:#8a94a2;background:#fff}
  .opt.chosen{border-color:var(--blue)}
  .opt.disabled{cursor:default}
  .opt.reveal-strong,.opt.reveal-correct{border-color:#9bcfb6;background:var(--soft-green)}
  .opt.reveal-weak{border-color:#e1c078;background:var(--soft-gold)}
  .opt.reveal-trap,.opt.reveal-wrong{border-color:#e3a7ad;background:var(--soft-red)}
  .opt .mk.strong,.opt .mk.correct{border-color:var(--green);color:#fff;background:var(--green)}
  .opt .mk.weak{border-color:var(--gold);color:#fff;background:var(--gold)}
  .opt .mk.trap,.opt .mk.wrong{border-color:var(--red);color:#fff;background:var(--red)}
  .tier-tag{display:inline-block;margin-left:8px;font-size:10px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:6px;vertical-align:middle}
  .tier-tag.strong,.tier-tag.correct{background:var(--green);color:#fff}
  .tier-tag.weak{background:var(--gold);color:#fff}
  .tier-tag.trap,.tier-tag.wrong{background:var(--red);color:#fff}
  .fb{margin-top:9px;font-size:13.2px;color:#37424f;background:rgba(255,255,255,.72);border-top:1px dashed #cfc8bd;padding-top:9px;display:none}
  .opt.show-fb .fb{display:block}
  .pts{font-size:12px;font-weight:800;color:var(--muted);margin-left:6px}

  .banner{margin-top:14px;border-radius:14px;padding:13px 15px;font-size:13.5px;display:none;align-items:center;gap:10px;border:1px solid transparent}
  .banner.show{display:flex}
  .banner.strong,.banner.correct{background:var(--soft-green);color:#0d5c39;border-color:#b7e2ca}
  .banner.weak{background:var(--soft-gold);color:#76510f;border-color:#ecd7a6}
  .banner.trap,.banner.wrong{background:var(--soft-red);color:#8a1f28;border-color:#eebfc3}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
  .mini{border:1px solid var(--line);border-radius:16px;padding:17px 18px;background:linear-gradient(180deg,#fff,#faf7f0);box-shadow:0 8px 22px rgba(27,39,67,.05)}
  .mini h4{font-size:15px;margin-bottom:7px}
  .mini p{margin:0;font-size:13.5px;color:var(--muted)}
  .steps{counter-reset:s;margin:12px 0 0;padding:0;list-style:none}
  .steps li{position:relative;padding:11px 0 11px 44px;border-bottom:1px solid var(--line);font-size:14px;color:#344054}
  .steps li:last-child{border-bottom:none}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:10px;width:29px;height:29px;border-radius:10px;background:var(--soft-blue);color:#174d8e;font-weight:900;display:grid;place-items:center;font-family:"IBM Plex Serif",serif;font-size:13px}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .lg{display:flex;align-items:center;gap:8px;font-size:13px;border:1px solid var(--line);border-radius:999px;padding:8px 13px;background:#fff}
  .lg b{font-family:"IBM Plex Serif",serif}
  .sw{width:12px;height:12px;border-radius:4px}
  .callout{background:linear-gradient(135deg,#edf5ff,#f8fbff);border:1px solid #c8dbf2;border-radius:15px;padding:15px 17px;font-size:13.7px;color:#1b3566;margin-top:15px}

  .case-switch{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 4px}
  .casebtn{border:1px solid var(--line);background:#fff;color:#334155;border-radius:999px;padding:9px 13px;font-size:12.5px;font-weight:800;cursor:pointer;transition:.15s}
  .casebtn:hover{transform:translateY(-1px);box-shadow:0 7px 16px rgba(27,39,67,.07)}
  .casebtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .casegrid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px}
  .casebox{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#faf7f1);padding:16px 18px}
  .casebox h4{font-size:15px;margin-bottom:9px;color:var(--navy)}
  .casebox ul{margin:0;padding-left:18px;color:#3a4657;font-size:13.6px}
  .casebox li{margin:6px 0}
  .case-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13.4px;margin-top:12px;overflow:hidden;border-radius:15px;border:1px solid var(--line)}
  .case-table th,.case-table td{border-bottom:1px solid var(--line);padding:11px 12px;text-align:left;vertical-align:top}
  .case-table tr:last-child td{border-bottom:none}
  .case-table th{background:#edf3fb;color:var(--navy);font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.45px}
  .case-table td{background:#fffdf8}
  .case-table tr:nth-child(even) td{background:#faf7f0}

  .persona-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:15px;margin-top:17px}
  .persona-card{display:grid;grid-template-columns:58px 1fr;gap:14px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#fff,#faf7f0);padding:17px;box-shadow:var(--shadow);transition:.16s}
  .persona-card:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}
  .avatar{width:55px;height:55px;border-radius:18px;background:linear-gradient(135deg,var(--navy),var(--blue2));color:#fff;display:grid;place-items:center;font-family:"IBM Plex Serif",serif;font-weight:800;font-size:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
  .persona-card h4{font-size:15.5px;margin:0 0 2px}
  .persona-role{font-size:12.5px;color:var(--blue);font-weight:850;margin-bottom:6px}
  .persona-tone{font-size:13px;color:var(--muted);margin-bottom:8px}
  .persona-card ul{margin:0;padding-left:17px;font-size:13px;color:#3a4657}
  .persona-prompt{grid-column:1/-1;background:#f4f7fb;border-left:4px solid var(--blue);border-radius:0 12px 12px 0;padding:10px 12px;font-size:13.2px;color:#2b3542}

  .gtools{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:18px 0}
  .search{flex:1;min-width:230px;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:14px;padding:10px 13px;background:#fff}
  .search input{border:none;outline:none;font-size:14px;width:100%;color:var(--ink);font-family:inherit;background:transparent}
  .filters{display:flex;gap:7px;flex-wrap:wrap}
  .fbtn{border:1px solid var(--line);background:#fff;color:#3a4657;border-radius:999px;padding:7px 12px;font-size:12.3px;font-weight:800;cursor:pointer}
  .fbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .gitem{border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:12px;background:#fff;box-shadow:0 8px 22px rgba(27,39,67,.04)}
  .gitem h4{font-size:16px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .gcat{font-size:10px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:#f0ece4;color:#5d6675}
  .gitem .def{font-size:14px;color:#2b3542;margin:8px 0}
  .gitem .ex{font-size:13.2px;color:var(--muted);background:#faf7f0;border-left:4px solid #d8cfc1;padding:9px 12px;border-radius:0 10px 10px 0}
  .gitem .ex b{color:var(--navy)}
  .empty{color:var(--muted);font-size:14px;padding:22px;text-align:center}

  .foot{max-width:var(--max);margin:0 auto;padding:6px 22px 36px;color:#8a93a4;font-size:12px}
  .ghost{border:1px solid var(--line);background:#fff;color:#526075;border-radius:12px;padding:8px 14px;font-size:12.5px;font-weight:850;cursor:pointer;transition:.15s}
  .ghost:hover{background:#f0ece4;color:var(--ink);transform:translateY(-1px)}

  @media (max-width:980px){
    .wrap{grid-template-columns:1fr;padding:18px}
    nav.side{position:static}
    .grid2,.casegrid,.persona-grid{grid-template-columns:1fr}
    header.top{position:static}
    .meter{min-width:180px}
  }
  @media (max-width:560px){
    .top-inner{padding:12px 14px}.wrap{padding:14px}.card,.hero{padding:22px}.card h2{font-size:22px}.meters{width:100%}.meter{flex:1;min-width:145px}.persona-card{grid-template-columns:1fr}.avatar{width:48px;height:48px}
  }
  /* ===== v6 lofty + interactive ===== */
  .ringm{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:16px;padding:8px 16px 8px 8px;min-width:150px}
  .ring{width:46px;height:46px;transform:rotate(-90deg);flex:0 0 auto}
  .ring circle{fill:none;stroke-width:4.5;stroke-linecap:round}
  .ring .ring-bg{stroke:rgba(255,255,255,.16)}
  .ring-fg{stroke-dasharray:119.38;stroke-dashoffset:119.38;transition:stroke-dashoffset .85s cubic-bezier(.2,.75,.2,1);filter:drop-shadow(0 0 4px rgba(109,178,255,.35))}
  .ring-fg.kf{stroke:#6db2ff}
  .ring-fg.rf{stroke:#45cf97;filter:drop-shadow(0 0 4px rgba(69,207,151,.35))}
  .ringlab{display:flex;flex-direction:column;line-height:1.02}
  .ringlab .mval{font-size:17px;color:#fff;font-weight:800;font-family:"IBM Plex Serif",serif}
  .ringlab small{font-size:9.5px;color:#b9c8df;text-transform:uppercase;letter-spacing:.7px;font-weight:800}

  main.view-enter{animation:viewIn .42s cubic-bezier(.2,.7,.2,1)}
  @keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .reveal{opacity:1;transform:none}
  .reveal.in{opacity:1;transform:none;transition:opacity .35s ease var(--d,0ms),transform .35s cubic-bezier(.2,.7,.2,1) var(--d,0ms)}

  .hero{background:
    radial-gradient(circle at 88% -10%,rgba(47,114,200,.20),transparent 42%),
    radial-gradient(circle at -5% 115%,rgba(42,157,143,.16),transparent 45%),
    linear-gradient(135deg,#fffdf8 0%,#f7f2e7 48%,#eef4fb 100%)}
  .hero:after{content:"";position:absolute;right:-120px;top:-130px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(47,114,200,.15),transparent 66%);animation:float1 12s ease-in-out infinite}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-14px,18px)}}

  .cmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:10px;margin-top:6px}
  .cmap-item{position:relative;display:flex;align-items:center;gap:9px;text-align:left;border:1px solid var(--line);background:linear-gradient(180deg,#fff,#faf7f0);border-radius:13px;padding:11px 12px;cursor:pointer;transition:.16s;overflow:hidden}
  .cmap-item:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(27,39,67,.10);border-color:#c6d8ef}
  .cmap-item.done{border-color:#a9dcc4;background:linear-gradient(180deg,#f4fbf7,#eaf6ef)}
  .cmap-num{flex:0 0 26px;height:26px;border-radius:8px;background:#ece7dc;color:#5d6675;font-weight:900;font-size:12px;display:grid;place-items:center;font-family:"IBM Plex Serif",serif}
  .cmap-item.done .cmap-num{background:linear-gradient(135deg,var(--green),#2aa06f);color:#fff}
  .cmap-t{flex:1;font-size:12.6px;font-weight:700;color:#2b3648;line-height:1.2}
  .cmap-prog{font-size:10.5px;font-weight:800;color:var(--quiet);white-space:nowrap}
  .cmap-item.done .cmap-prog{color:var(--green)}

  .lvl-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .lvl-head-main{min-width:0}
  .lvl-badge{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--line2);background:var(--soft-blue);border-radius:14px;padding:9px 14px;min-width:66px}
  .lvl-badge b{font-family:"IBM Plex Serif",serif;font-size:18px;color:var(--navy)}
  .lvl-badge small{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:#5d6675;font-weight:800}
  .lvl-badge.done{background:var(--soft-green);border-color:#a9dcc4}
  .lvl-badge.done b{color:var(--green)}
  .lvl-progress{height:7px;border-radius:99px;background:#ece7dc;margin:14px 0 2px;overflow:hidden}
  .lvl-progress > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--aqua));transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .kbd-hint{font-size:12px;color:var(--quiet);margin-top:10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .kbd-hint kbd{font-family:inherit;font-size:11px;font-weight:800;background:#fff;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 7px;color:#3a4657}

<script>
/* =====================================================================
   DATA. Edit here to change every level, drill, and glossary entry.
   All learner content is written in plain professional English.
   Scenario tiers: strong = 10 pts, weak = 5 pts, trap = 0 pts.
   ===================================================================== */

const DATA = {
  levels: [
    /* ---------- LEVEL 1 ---------- */
    {
      title: "Structured Thinking: MECE and Issue Trees",
      subtitle: "Break any problem into clean, testable pieces",
      concepts: ["MECE","Issue tree","Framework","Driver tree"],
      brief: [
        "MECE stands for Mutually Exclusive, Collectively Exhaustive. A set of buckets is Mutually Exclusive when nothing falls into two buckets at once, and Collectively Exhaustive when the buckets together cover everything with no gaps. Consultants prize MECE because it prevents both double-counting and blind spots, which is how you keep an analysis trustworthy.",
        "An issue tree is a MECE breakdown built specifically for the problem in front of you. You take the core question, split it into a few non-overlapping drivers, then split each of those again until you reach something you can actually measure or test. A framework, by contrast, is a pre-made template such as a generic profit or market-entry model that you borrow. Frameworks are fast, but they often fit the problem loosely. A strong consultant usually builds a bespoke issue tree rather than forcing a stock framework onto a client situation."
      ],
      worked: "A sponsor asks why a clinical trial is enrolling patients too slowly. A weak answer lists random ideas. A MECE issue tree splits enrollment into number of active sites, times patients screened per site, times screen-to-enroll conversion rate. Every possible cause now lives under exactly one branch, so you can investigate methodically instead of guessing.",
      drills: [
        { type:"knowledge", q:"A consultant splits a hospital pharmacy's costs into: (a) drug purchasing, (b) staff labor, (c) high-cost specialty drugs, (d) other overhead. Is this split MECE?",
          options:[
            {text:"No. It is not mutually exclusive.", correct:true, fb:"Correct. High-cost specialty drugs are a subset of drug purchasing, so those two buckets overlap and the split double-counts. A MECE version would be purchasing, labor, and overhead, with specialty as a sub-branch under purchasing."},
            {text:"Yes. It is fully MECE.", correct:false, fb:"Not quite. Specialty drugs already sit inside drug purchasing, so the buckets overlap. Overlap breaks the Mutually Exclusive half of MECE."},
            {text:"Yes, because the 'other overhead' bucket makes it exhaustive.", correct:false, fb:"An 'other' bucket can help with the exhaustive half, but it does nothing about the overlap between specialty drugs and purchasing, which is the actual problem here."}
          ]},
        { type:"knowledge", q:"Which statement about issue trees versus frameworks is true?",
          options:[
            {text:"An issue tree is built for the specific problem; a framework is a reusable, pre-made template.", correct:true, fb:"Correct. Issue trees are custom-built and tend to fit the situation exactly. Frameworks are borrowed templates that are fast but often fit loosely."},
            {text:"They are two names for the same thing.", correct:false, fb:"They are related but not the same. One is bespoke to the problem, the other is a stock template."},
            {text:"A framework is always more rigorous than an issue tree.", correct:false, fb:"Often the reverse. A stock framework forced onto a client problem can miss the real drivers that a bespoke issue tree would catch."}
          ]},
        { type:"scenario", speaker:"Practice Leader", q:"A sponsor's clinical trial is enrolling patients far too slowly. Take a moment. How would you structure this problem?",
          options:[
            {tier:"strong", fb:"This is structured, hypothesis-ready thinking that fits the consulting profile described in public Veeva materials. It is bespoke, MECE, testable, and it resists jumping to a solution.", text:"I would build an issue tree. Enrollment equals number of active sites, times patients screened per site, times screen-to-enroll conversion rate. I would test each branch to find where the drop-off is before recommending anything."},
            {tier:"weak", fb:"It shows effort but not structure. The factors overlap, nothing is prioritized, and there is no clear tree to test against.", text:"There could be many reasons: the protocol, the sites, the patients, the competition. I would look into all of them."},
            {tier:"trap", fb:"Jumping to a solution before structuring the problem is the classic trap. Adding sites is useless if the real bottleneck is conversion. A consulting interviewer expects analysis before prescription.", text:"They should add more trial sites and run more patient advertising."}
          ]},
        { type:"scenario", speaker:"Practice Leader", q:"Give me a MECE way to break down a pharmacy's total prescription volume.",
          options:[
            {tier:"strong", fb:"Clean and MECE. Every prescription is either new or a refill, with no overlap and no gap.", text:"New prescriptions and refills. Every script is one or the other, nothing overlaps, and nothing is left out."},
            {tier:"weak", fb:"Brand, generic, and specialty is a common split, but specialty drugs can themselves be brand or generic, so the buckets overlap. It is close but not clean.", text:"Brand-name, generic, and specialty prescriptions."},
            {tier:"trap", fb:"These categories overlap heavily. A single script could be profitable and insured and from a frequent customer all at once, so this is not a real breakdown.", text:"Profitable scripts, insured scripts, and frequent-customer scripts."}
          ]}
      ]
    },

    /* ---------- LEVEL 2 ---------- */
    {
      title: "Hypothesis-Driven Problem Solving and the So-What",
      subtitle: "Move fast with a testable answer, and always land the implication",
      concepts: ["Hypothesis-driven","So-what","Synthesis vs summary","80/20"],
      brief: [
        "Hypothesis-driven problem solving means you start with a best-guess answer and then test it, instead of boiling the ocean by analyzing everything. You form a clear, falsifiable statement such as 'enrollment is slow mainly because screen-to-enroll conversion is low at three large sites,' then you go pull only the data that would confirm or kill that hypothesis. This keeps the work fast and focused, which is how consultants operate under tight timelines.",
        "The so-what is the decision-relevant implication of a fact. Data on its own is inert. Synthesis turns it into a conclusion the client can act on. Beginners tend to summarize, meaning they restate what the numbers say. Experts synthesize, meaning they tell you what the numbers mean and what to do next. The 80/20 rule is the habit of spending your energy on the 20 percent of drivers that explain 80 percent of the outcome."
      ],
      worked: "The fact is 'Site A converts 8 percent of screened patients while Sites B and C convert 30 percent.' A summary repeats that. The so-what is: 'Site A's screening funnel is the bottleneck, so fixing its eligibility pre-check would lift total enrollment more than adding new sites, and that is where we should focus first.' The synthesis names the driver, ranks the action, and points to a next step.",
      drills: [
        { type:"knowledge", q:"A safety team clears about 500 cases per associate per year, but one site clears only 300 per associate. What is the so-what?",
          options:[
            {text:"That site is understaffed or has a process bottleneck, so it is the first place to investigate for added capacity.", correct:true, fb:"Correct. This names the likely driver and points to an action, which is synthesis."},
            {text:"That site clears 300 cases per associate per year.", correct:false, fb:"That just restates the fact. Restating is a summary, not a so-what."},
            {text:"The whole team is failing and should be replaced.", correct:false, fb:"That over-reaches. One low site does not mean the whole team is failing, and you have not diagnosed the cause yet."}
          ]},
        { type:"knowledge", q:"Which is the best one-line definition of hypothesis-driven problem solving?",
          options:[
            {text:"Start with a likely answer, then test it with targeted data.", correct:true, fb:"Correct. You lead with a falsifiable best guess and gather only the data that confirms or kills it."},
            {text:"Analyze every possible factor exhaustively before forming any view.", correct:false, fb:"That is boiling the ocean, which is the opposite of hypothesis-driven work. It is thorough but slow and unfocused."},
            {text:"Ask the client what they think the answer is and go with that.", correct:false, fb:"A hypothesis is your own testable guess, not a handoff of the thinking to the client."}
          ]},
        { type:"scenario", speaker:"Practice Leader", q:"Here is the data: Site A converts 8 percent of screened patients, Sites B and C convert 30 percent. So what?",
          options:[
            {tier:"strong", fb:"This is a real so-what. It names the bottleneck, ranks the highest-leverage action, and gives a next step.", text:"Site A's screening funnel is the bottleneck. Fixing its eligibility pre-check would lift total enrollment more than adding new sites, so I would focus there first."},
            {tier:"weak", fb:"This is a summary, not a so-what. It restates the numbers without telling the client what to do.", text:"Site A is converting much lower than Sites B and C."},
            {tier:"trap", fb:"This over-reaches beyond the data. Low conversion could be a fixable process issue; you have not diagnosed the cause, so recommending a shutdown is premature.", text:"Site A is failing and should be shut down."}
          ]},
        { type:"scenario", speaker:"Practice Leader", q:"A client's safety case backlog keeps growing and you have limited time. How would you approach it?",

{
  "title":"DCF Foundations: From Operating Forecast to Equity Value",
  "subtitle":"Build the cash-flow logic behind an investment recommendation",
  "concepts":["Revenue forecast","EBITDA","EBIT","Unlevered free cash flow","WACC","Discount factor","Terminal value","Enterprise value","Equity value","Sensitivity table"],
  "brief":[
    "A discounted cash flow model converts an operating forecast into present value. Start with revenue, subtract operating costs to reach EBITDA, subtract depreciation and amortization to reach EBIT, tax EBIT to get NOPAT, then add back non-cash depreciation and subtract capital expenditure and the change in net working capital. The result is unlevered free cash flow, or UFCF: EBIT times one minus the tax rate, plus D&A, minus capex, minus change in NWC. Because UFCF belongs to all capital providers, discount it at WACC, not the cost of equity.",
    "DCF has two value blocks. The explicit forecast period captures cash flow year by year. Terminal value captures value after the explicit period, commonly with the perpetuity-growth formula: final-year FCF times one plus g, divided by WACC minus g. Sum the present values to get enterprise value. Then bridge to equity value by subtracting debt and adding cash. A strong model tests WACC, terminal growth, margin, and revenue assumptions instead of hiding behind one precise output. If WACC is less than or equal to terminal growth, the model is structurally invalid."
  ],
  "worked":"A mature specialty product has year-1 revenue of $500M, 10% annual revenue growth for five years, and a 16.75% UFCF margin. UFCF is $83.75M in year 1 and grows to about $122.6M in year 5. At 10% WACC and 2% terminal growth, terminal value at year 5 is about $1.56B. The five annual cash flows contribute about $381M of present value and terminal value contributes about $971M, for enterprise value near $1.35B. With $150M debt and $80M cash, equity value is about $1.28B. The next step is sensitivity, not false precision.",
  "drills":[
    {"type":"knowledge","q":"Which formula correctly builds unlevered free cash flow from EBIT?","options":[
      {"text":"EBIT x (1 - tax rate) + D&A - capex - change in net working capital.","correct":true,"fb":"Correct. This produces cash flow before interest payments and therefore belongs to debt and equity holders."},
      {"text":"Net income + interest expense - debt repayment + new borrowing.","correct":false,"fb":"That mixes financing flows into operating value and is not the standard UFCF bridge."},
      {"text":"Revenue - COGS - SG&A, with no adjustment for taxes or investment.","correct":false,"fb":"That is closer to operating profit and ignores tax, capex, and working-capital needs."}
    ]},
    {"type":"knowledge","q":"A DCF produces enterprise value. What is the usual bridge to equity value?","options":[
      {"text":"Enterprise value minus debt plus cash, with other claims and non-operating assets adjusted when material.","correct":true,"fb":"Correct. Enterprise value belongs to all capital providers; equity is the residual after the capital-structure bridge."},
      {"text":"Enterprise value plus debt minus cash, because debt funds future growth.","correct":false,"fb":"Debt is a claim senior to equity, so it is subtracted rather than added."},
      {"text":"Enterprise value multiplied by WACC, because WACC represents the equity share.","correct":false,"fb":"WACC is a discount rate, not an ownership percentage."}
    ]},
    {"type":"scenario","speaker":"Practice Leader","q":"Your model's terminal value is 82% of enterprise value. The client asks whether that invalidates the DCF. What do you say?","options":[
      {"tier":"strong","text":"Not automatically, but it means the answer is highly dependent on long-run assumptions. I would show WACC and terminal-growth sensitivities, compare the implied terminal multiple with market reality, and extend the explicit forecast if the product has a visible patent cliff or launch ramp the terminal formula is masking.","fb":"Correct. A high terminal-value share is a diagnostic that calls for stronger sensitivity and explicit lifecycle modeling, not an automatic rejection."},
      {"tier":"weak","text":"It is acceptable because terminal value is often the largest component of DCF, so I would retain the base case and mention the concentration in a footnote.","fb":"This is directionally true but does not test whether the terminal assumptions are credible for the asset."},
      {"tier":"trap","text":"It invalidates the model, so I would remove terminal value and value only the five explicit forecast years to keep the answer conservative.","fb":"Removing all value after year five usually understates a going concern and does not solve the modeling question."}
    ]},
    {"type":"scenario","speaker":"Investment Committee","q":"A deal is attractive only at 8% WACC and 4% terminal growth, but unattractive at 10% and 2%. How do you frame the decision?","options":[
      {"tier":"strong","text":"The thesis is assumption-sensitive, not robust. I would identify what evidence supports the lower risk and higher durable growth, show the valuation range, and recommend a staged or contingent structure unless the client can underwrite those assumptions with specific evidence.","fb":"Correct. The recommendation follows the sensitivity rather than selecting the most favorable cells."},
      {"tier":"weak","text":"Use the 8% and 4% case because management knows the business best, but disclose the conservative case so the committee can see the range.","fb":"Management input matters, but choosing the favorable case without evidence creates circular valuation."},
      {"tier":"trap","text":"Average the two valuations into a midpoint, since the truth is usually between management's assumptions and the conservative case.","fb":"Averaging unsupported scenarios does not create a defensible expected value."}
    ]}
  ]
},
{
  "title":"Drug Revenue Forecasting: Patients, Access, Uptake, and LOE",
  "subtitle":"Turn epidemiology and market access into a defensible sales curve",
  "concepts":["Prevalence","Incidence","Diagnosed pool","Clinical eligibility","Access-cleared pool","Market share","Price per patient","Gross-to-net","Uptake curve","Peak sales","Persistence","Loss of exclusivity"],
  "brief":[
    "A drug forecast should be built from patients, not a top-down market headline. A common prevalence model is diagnosed patients times clinical eligibility times access clearance times treatment rate times market share times annual net price. An incidence model follows new patients entering each year and may need cohort persistence. Gross-to-net converts list-price revenue into recognized net sales after rebates, chargebacks, discounts, and patient-support programs. Do not multiply the full diagnosed population by list price unless the label, access, treatment, and share assumptions truly support it.",
    "Sales are a curve, not a single peak-sales number. Model launch uptake, time to peak, persistence, competitor entry, indication expansion, capacity constraints, and loss of exclusivity. Small molecules, biologics, and one-time therapies have different shapes. Before LOE, price and share may evolve gradually. At LOE, generic or biosimilar entry can create a sharp erosion step, so a standard perpetual terminal value may be inappropriate. The most important sensitivity is often not the price alone but the interaction of access, share, persistence, and supply."
  ],
  "worked":"A therapy targets 120,000 diagnosed patients. Sixty percent are label-eligible, 55% become access-cleared, 20% reach peak share, annual list price is $80,000, and gross-to-net is 25%. The addressable treated population at peak is 7,920 and net price is $60,000, producing peak net sales of about $475M. If uptake reaches 20%, 45%, 70%, 90%, and 100% of peak over years 1 to 5, revenue is about $95M, $214M, $333M, $428M, and $475M before persistence and capacity adjustments.",
  "drills":[
    {"type":"knowledge","q":"Using 120,000 diagnosed patients, 60% eligibility, 55% access clearance, 20% peak share, $80,000 list price, and 25% gross-to-net, what are peak net sales?","options":[
      {"text":"About $475M: 120,000 x 60% x 55% x 20% x $80,000 x 75%.","correct":true,"fb":"Correct. Every funnel step and the net-price factor must be applied."},
      {"text":"About $1.27B: eligible patients x $80,000 x 55% access.","correct":false,"fb":"This omits the 20% market-share assumption and the gross-to-net deduction."},
      {"text":"About $1.92B: full diagnosed population x 20% share x $80,000.","correct":false,"fb":"This ignores clinical eligibility, access, and gross-to-net."}
    ]},
    {"type":"knowledge","q":"Why can a perpetual terminal-growth formula be misleading for a single drug?","options":[
      {"text":"A drug often faces finite exclusivity and a discrete LOE erosion pattern rather than stable perpetual growth.","correct":true,"fb":"Correct. Explicit patent and competition dynamics are often more credible than perpetual growth."},
      {"text":"Drug cash flows are never discounted because patent protection guarantees sales.","correct":false,"fb":"Patent protection does not remove commercial, technical, or time-value risk."},
      {"text":"Terminal value applies only to manufacturing companies with physical assets.","correct":false,"fb":"Terminal value can apply broadly, but the chosen method must fit the asset lifecycle."}
    ]},
    {"type":"scenario","speaker":"Commercial Strategy Lead","q":"The team forecasts peak sales from total prevalence and list price. What should you challenge first?","options":[
      {"tier":"strong","text":"Rebuild the funnel from diagnosed to eligible to access-cleared to treated patients, then apply realistic share, net price, persistence, and supply constraints. The highest-value challenge is identifying which step actually limits treated volume rather than debating one headline market-size number.","fb":"Correct. A patient funnel exposes the conversion assumptions that create or destroy the forecast."},
      {"tier":"weak","text":"Keep the prevalence model but apply a blanket 30% haircut to peak sales, since that roughly captures access and execution risk without overcomplicating the model.","fb":"A haircut is quick but hides which assumption drives the shortfall and cannot support an operational recommendation."},
      {"tier":"trap","text":"Use the total prevalence and list price because launch forecasts should represent the full upside opportunity; access and share belong in the downside sensitivity only.","fb":"This treats a theoretical ceiling as a base forecast and systematically overstates value."}

    {"type":"scenario","speaker":"Portfolio Committee","q":"Peak sales are unchanged, but the launch ramp slows from three years to six years. Why does value fall?","options":[
      {"tier":"strong","text":"Later cash flow has lower present value and may leave fewer high-revenue years before competitor entry or LOE. I would quantify the timing loss and test whether access, supply, or adoption investments can accelerate the ramp economically.","fb":"Correct. Time to peak changes both discounting and the number of protected high-sales years."},
      {"tier":"weak","text":"Value falls mainly because investors dislike slow stories, even though the lifetime economics are unchanged once peak sales is reached.","fb":"Perception matters, but the core effect is cash-flow timing and lifecycle compression."},
      {"tier":"trap","text":"Value should not change because peak sales is the same, so the slower ramp is only a presentation issue rather than an economic difference.","fb":"DCF is explicitly sensitive to when cash flow arrives."}

{
  "title":"Biotech rNPV and Pipeline Sum-of-the-Parts",
  "subtitle":"Value binary clinical assets without double-counting risk",
  "concepts":["rNPV","PTRS","Cumulative probability","Stage-gated cost","Probability-weighted cash flow","Unrisked value","Risk-adjusted value","Pipeline SOTP","Platform value","Double-counting risk"],
  "brief":[
    "Risk-adjusted NPV extends DCF for binary development risk. Forecast the asset's cash flows if approved, then weight each future cash flow by the probability that the asset reaches the stage required to generate it. Revenue receives cumulative probability through approval. Phase 3 cost is weighted only by the probability of reaching Phase 3, and filing cost only by the probability of reaching filing. This asymmetry matters: downstream costs disappear if the program fails early, while commercial value requires success through every gate.",
    "Pipeline sum-of-the-parts adds the rNPV of each asset, plus cash and non-operating value, minus debt and shared corporate costs. Keep platform value separate unless you can explain the programs, timing, probability, and economics behind it. Do not both probability-weight cash flows and use an extreme discount rate intended to capture the same clinical risk. Use explicit PTRS for technical and regulatory risk, then a defensible discount rate for time and residual commercial risk. Run sensitivity on phase probability, approved value, development cost, time to launch, and LOE."
  ],
  "worked":"An oncology asset entering Phase 2 has a 40% Phase 2 pass rate, 55% Phase 3 pass rate, and 90% approval rate. Approved commercial value is $3.2B in present-value terms. Remaining costs are $120M now, $200M only after Phase 2 success, and $10M only after Phase 3 success. Cumulative approval probability is 19.8%. Risk-adjusted commercial value is $633.6M. Expected cost is $120M + 40% x $200M + 40% x 55% x $10M = $202.2M. rNPV is about $431.4M before platform value or deal synergies.",
  "drills":[
    {"type":"knowledge","q":"Which cash flow should be multiplied by cumulative probability of approval?","options":[
      {"text":"Commercial cash flow that exists only if all remaining development and regulatory stages succeed.","correct":true,"fb":"Correct. Commercial value requires success through all remaining gates."},
      {"text":"Every remaining development cost, including the Phase 2 cost already committed today.","correct":false,"fb":"Costs are weighted by the probability of reaching the stage when they are incurred; today's committed cost is not probability-weighted."},
      {"text":"Cash on the balance sheet, because it supports the program through approval.","correct":false,"fb":"Existing cash is not contingent on clinical success."}
    ]},
    {"type":"knowledge","q":"What is a common rNPV double-counting error?","options":[
      {"text":"Probability-weighting clinical outcomes and also using an extreme discount rate to capture the same binary risk.","correct":true,"fb":"Correct. Risk should be modeled explicitly once, with the discount rate covering time and residual risk."},
      {"text":"Discounting later cash flows more than near-term cash flows.","correct":false,"fb":"That is the normal time-value effect of discounting."},
      {"text":"Separating each pipeline asset before adding them into SOTP.","correct":false,"fb":"Asset-level separation is the foundation of pipeline SOTP."}

  "brief":[
    "Licensing deals split value across time and outcomes. The upfront is guaranteed. Development and regulatory milestones pay only when specified events occur. Commercial milestones depend on sales thresholds. Royalties are usually a percentage of defined net sales and may be tiered. The royalty base matters as much as the headline rate because permitted deductions, combination-product allocation, geographic scope, and sublicense terms change what gets paid. From the licensee perspective, contingent payments reduce downside; from the licensor perspective, they preserve participation in upside.",
    "Value every component on an expected present-value basis. Multiply each milestone by the probability of reaching it and discount it to today. Model royalties from the same net-sales curve used in the asset DCF, then probability-weight and discount them. An earnout or contingent value right can bridge a valuation gap when parties disagree about an upcoming catalyst. Deal comparables provide market context, but different indications, stages, rights, and probabilities make headline biobucks a poor substitute for economic value. The negotiation zone lies between each party's risk-adjusted value and alternatives."
  ],
  "worked":"A license includes $100M upfront, $80M on Phase 2 success in two years, $150M on Phase 3 success in five years, and $250M on approval in six years. With 40% Phase 2 success, 55% Phase 3 success after that, 90% approval after Phase 3, and 10% discount rate, milestone present values are about $26M, $20M, and $28M. Before royalties, expected present value is roughly $174M including the upfront, not the $580M headline biobucks. Royalties must be valued separately from the product's net-sales curve.",
  "drills":[
    {"type":"knowledge","q":"Why is headline biobucks not the same as expected deal value?","options":[
      {"text":"Most milestones are contingent, probability-weighted, and paid years later, so their present expected value is much lower than the sum of nominal payments.","correct":true,"fb":"Correct. Timing and the probability of each trigger matter."},
      {"text":"Biobucks excludes the upfront payment and includes only royalties already earned.","correct":false,"fb":"Headline biobucks usually includes future milestones, not just earned royalties."},
      {"text":"Accounting rules prohibit milestones from having any value before approval.","correct":false,"fb":"Milestones have expected economic value before approval even if accounting treatment differs."}
    ]},
    {"type":"knowledge","q":"What most directly determines the economic value of a 12% royalty?","options":[
      {"text":"The defined net-sales base, sales curve, territory, duration, probability of launch, and discounting.","correct":true,"fb":"Correct. A headline rate without its base and lifecycle is incomplete."},
      {"text":"The number of pages in the license agreement and the licensor's financing need.","correct":false,"fb":"These do not determine the royalty cash flow."},
      {"text":"The drug's list price only, because rebates do not affect royalties.","correct":false,"fb":"Royalties are commonly based on defined net sales after specified deductions."}
    ]},
    {"type":"scenario","speaker":"Deal Team Lead","q":"Buyer values the asset at $450M; seller insists on $800M because a Phase 2 readout is six months away. What structure best bridges the gap?","options":[
      {"tier":"strong","text":"Keep upfront value near the buyer's risk-adjusted case and move the disputed value into a milestone or CVR tied to the Phase 2 endpoint and later approval. Specify objective triggers, timing, control of development, and what happens if the program or strategy changes.","fb":"Correct. Contingent structure allocates the disputed scientific risk to the outcome that resolves it."},
      {"tier":"weak","text":"Split the difference at $625M upfront because both parties have credible models, then use a small commercial milestone to preserve goodwill if sales outperform.","fb":"A midpoint ignores which uncertainty creates the valuation gap and places most risk upfront."},
      {"tier":"trap","text":"Match the $800M ask but lower the royalty rate, since the buyer will recover the premium automatically if the asset reaches the market.","fb":"This shifts value without testing whether the expected economics support the upfront premium."}
    ]},
    {"type":"scenario","speaker":"Licensing Counsel","q":"The business team compares two offers only by upfront and royalty rate. What is missing?","options":[
      {"tier":"strong","text":"Build full expected value: probability and timing of each milestone, royalty base and tiers, territories and rights, sublicense economics, development obligations, termination and reversion, control of evidence generation, and the partner's ability to execute. Economics and control must be read together.","fb":"Correct. The nominal rate is only one element of value and risk."},
      {"tier":"weak","text":"Add total headline milestones and choose the offer with the largest nominal package, using partner reputation as a tie-breaker if the totals are close.","fb":"This improves completeness but still ignores probability, timing, and contractual control."},
      {"tier":"trap","text":"Choose the highest upfront because it is the only guaranteed component; all other terms are too uncertain to compare reliably before the deal is signed.","fb":"Guaranteed value matters, but ignoring contingent economics and execution rights can destroy long-term value."}

  "brief":[
    "A valuation is an input to a decision, not the decision itself. Sensitivity analysis moves one assumption at a time to identify the value driver. Scenario analysis changes a coherent set of assumptions. A break-even calculation asks what must be true for the investment to create value. Tornado charts rank the assumptions that move value most. Portfolio analysis then adds capital, scientific, operational, and strategic constraints: an attractive asset can still be the wrong priority if it consumes scarce trial capacity or duplicates correlated risk across the portfolio.",
    "Drug development also creates real options. Advancing one phase buys the right, not the obligation, to invest again after new data. The relevant decision at a gate is often whether continuation value exceeds the next-stage cost, not whether sunk spending will be recovered. Stop rules protect capital when evidence crosses a predefined threshold. Partnering can preserve upside while reducing capital need. Out-licensing, indication sequencing, and platform investment create different option paths. A consultant should recommend advance, partner, defer, or stop with explicit triggers and what evidence would change the answer."
  ],
  "worked":"Asset A has $450M rNPV but needs $250M over two years. Asset B has $280M rNPV and needs $60M. With only $200M available, A is not executable without financing or a partner. B creates less absolute value but much more value per near-term dollar and preserves capital for another program. The right recommendation is not automatically B: test strategic fit, correlation, capacity, and whether partnering A can preserve its option value without exhausting the budget.",

      {"text":"The next clinical phase cost that must be paid if the program advances.","correct":false,"fb":"Future cost is directly relevant to the advance decision."},
      {"text":"A milestone payment triggered only by future success.","correct":false,"fb":"A contingent future payment belongs in the continuation economics."}
    ]},
    {"type":"knowledge","q":"What is the difference between sensitivity and scenario analysis?","options":[
      {"text":"Sensitivity changes one driver at a time; scenarios change a coherent set of linked assumptions.","correct":true,"fb":"Correct. Both are useful but answer different questions."},
      {"text":"Sensitivity is qualitative; scenarios are always statistical Monte Carlo simulations.","correct":false,"fb":"Sensitivity is often quantitative, and scenarios do not require Monte Carlo."},

  glossary: [
    {term:"MECE", cat:"Consulting Method", def:"Mutually Exclusive, Collectively Exhaustive. Buckets that do not overlap and together leave no gaps. The test of a trustworthy breakdown.", ex:"Splitting prescriptions into new and refills is MECE. Splitting into brand, generic, and specialty is not, because specialty overlaps brand and generic."},
    {term:"Issue tree", cat:"Consulting Method", def:"A MECE breakdown built for the specific problem, split down until each branch is measurable or testable.", ex:"Enrollment equals active sites, times patients screened per site, times conversion rate."},
    {term:"Framework", cat:"Consulting Method", def:"A pre-made, reusable template such as a generic profit or market-entry model. Fast to apply but often fits a client situation loosely.", ex:"Reaching for a stock profit framework when the real question is why one trial site converts poorly."},
    {term:"Driver tree", cat:"Consulting Method", def:"An issue tree whose branches are the quantitative drivers of an outcome, so you can see which lever moves the result most.", ex:"Total revenue equals volume times price times mix, each of which can be pulled apart further."},
    {term:"Hypothesis-driven", cat:"Consulting Method", def:"Start with a likely, falsifiable answer, then gather only the data that would confirm or kill it. The opposite of boiling the ocean.", ex:"Lead hypothesis: the backlog grew because intake outpaced one processing step. Then pull just that step's cycle time."},
    {term:"80/20", cat:"Consulting Method", def:"The Pareto habit of focusing on the roughly 20 percent of drivers that explain about 80 percent of the outcome.", ex:"Two of eight sites drive most of the enrollment shortfall, so fix those first."},
    {term:"Market sizing", cat:"Consulting Method", def:"Reaching a defensible estimate from a few explicit assumptions, built top-down or bottom-up, when perfect data is unavailable.", ex:"15 products times 400 reports each gives about 6,000 adverse-event cases a year."},
    {term:"Back-of-envelope", cat:"Consulting Method", def:"Quick, clean arithmetic done to a reasonable order of magnitude, with the assumptions stated openly.", ex:"Round numbers and simple multiplication to reach a ballpark you can defend."},
    {term:"Segmentation", cat:"Consulting Method", def:"Dividing a population into meaningful, non-overlapping groups so each can be analyzed on its own terms.", ex:"Sorting trial sites into high, medium, and low converters before diagnosing the laggards."},
    {term:"Sanity check", cat:"Consulting Method", def:"Testing an answer against a second, independent angle. A mismatch is a signal to recheck an assumption, not to hide it.", ex:"6,000 cases would need about 12 associates. The client has 3, so an assumption is off."},
    {term:"So-what", cat:"Communication", def:"The decision-relevant implication of a fact. It names the driver, ranks the action, and points to a next step.", ex:"Site A is the bottleneck, so fixing its pre-check lifts enrollment more than adding sites."},
    {term:"Synthesis vs summary", cat:"Communication", def:"A summary restates what the data says. Synthesis says what the data means and what to do about it.", ex:"Summary: Site A converts lower. Synthesis: Site A's funnel is the bottleneck to fix first."},
    {term:"Pyramid principle", cat:"Communication", def:"Communicate answer-first: state the conclusion, then the two or three reasons, then detail only if asked.", ex:"'Consolidate to one system. Three reasons: cost, reporting speed, audit risk.'"},
    {term:"Answer-first", cat:"Communication", def:"Leading with the recommendation before the supporting reasoning, so a busy stakeholder gets the point immediately.", ex:"'No, keep it in-house for now,' before explaining why."},
    {term:"Signposting", cat:"Communication", def:"Telling the listener your structure before the details, so they can follow you without effort.", ex:"'I have three reasons; the first is cost, the second is timeline, the third is risk.'"},
    {term:"Veeva (PBC)", cat:"Veeva Domain", def:"Veeva Systems, a major cloud-software company for life sciences and a Public Benefit Corporation whose public materials emphasize do the right thing.", ex:"Being a PBC is why this course emphasizes integrity and honesty."},
    {term:"Veeva Vault", cat:"Veeva Domain", def:"Veeva's content-and-data cloud that runs the regulated documents and data of drug companies across the product lifecycle.", ex:"A single platform holding trial documents, submissions, quality records, and safety cases."},
    {term:"Development Cloud", cat:"Veeva Domain", def:"The R&D side of Veeva Vault, spanning Clinical, Regulatory, Quality, and Safety applications.", ex:"The suite an R&D Business Consultant most often works across."},
    {term:"Vault Clinical", cat:"Veeva Domain", def:"The clinical-trial applications: CTMS for study operations and the eTMF for the trial master file of required documents.", ex:"Tracking site activity and storing every required trial document in one place."},
    {term:"Vault Regulatory (RIM)", cat:"Veeva Domain", def:"Regulatory Information Management. Manages health-authority submissions and registrations, including eCTD publishing.", ex:"The right pillar when a client's FDA submissions are slow or disorganized."},
    {term:"eCTD", cat:"Veeva Domain", def:"Electronic Common Technical Document, the standardized electronic format FDA requires for many major submission types.", ex:"Assembling an NDA into the eCTD structure for FDA review."},
    {term:"Vault Quality", cat:"Veeva Domain", def:"The quality management applications: deviations, CAPAs, controlled documents, and training records.", ex:"Logging a manufacturing deviation and driving the corrective action to closure."},
    {term:"Vault Safety", cat:"Veeva Domain", def:"The pharmacovigilance applications: adverse-event case intake, processing, and regulatory reporting.", ex:"Receiving an adverse-event report, coding it, and filing it within required timelines."},
    {term:"GxP", cat:"Regulatory", def:"The family of Good Practice regulations (GCP, GLP, GMP, and others) that govern quality and integrity across regulated life sciences work.", ex:"A validated system with audit trails so trial data holds up to GxP inspection."},
    {term:"21 CFR Part 11", cat:"Regulatory", def:"The FDA rule governing electronic records and electronic signatures, requiring audit trails, access controls, and validated systems.", ex:"Why e-signatures and complete audit trails are core to Veeva's software."},
    {term:"ICH-GCP", cat:"Regulatory", def:"The international Good Clinical Practice standard for designing, conducting, and reporting clinical trials ethically and reliably.", ex:"Ensuring informed consent and accurate source data across trial sites."},
    {term:"MedDRA", cat:"Regulatory", def:"The Medical Dictionary for Regulatory Activities, a standardized terminology for coding adverse events and medical conditions.", ex:"Coding a reported symptom to a MedDRA Preferred Term for consistent safety analysis."},
    {term:"Orange Book", cat:"Regulatory", def:"The FDA publication listing approved drugs with therapeutic-equivalence codes that indicate whether a generic is substitutable for a brand.", ex:"Grounding a generic-equivalence check in the Orange Book's equivalence codes."},
    {term:"IND / NDA / BLA / ANDA", cat:"Regulatory", def:"Core FDA application types: IND to begin trials, NDA for a new drug, BLA for a biologic, and ANDA for a generic.", ex:"An MS in Regulatory Science covers preparing and structuring these submissions."},
    {term:"STAR method", cat:"Fit and Behavioral", def:"A behavioral-answer structure: Situation, Task, Action, Result. Weight most of the answer on your own Action and end on a concrete Result.", ex:"Brief context, then what you specifically did, then the 25 percent volume gain."},
    {term:"STAR plus Reflection", cat:"Fit and Behavioral", def:"STAR with a short closing on what you learned, which turns a good story into a memorable one.", ex:"Ending a turnaround story with the lesson about how PBM terms drive pharmacy margin."},
    {term:"Integrity (PBC)", cat:"Fit and Behavioral", def:"Veeva public materials emphasize high integrity, honesty, and the value do the right thing.", ex:"Choosing the precise, verifiable answer over the impressive-sounding one."},
    {term:"Intellectual honesty", cat:"Fit and Behavioral", def:"Saying exactly what is true, including limits, so a follow-up question or reference check can only confirm you.", ex:"'The core is deployed; the second feature is built but not yet released.'"},
    {term:"Shipped vs designed", cat:"Fit and Behavioral", def:"Distinguishing what is actually live and validated from what is architected or planned. Precise scoping is itself a consulting skill.", ex:"GenericCheck's core is shipped and in beta, with the data model as your real contribution."}

    ,
    {term:"Problem statement", cat:"Consulting Method", def:"A one-sentence description of what must be solved, for whom, by when, and why it matters.", ex:"Reduce the safety backlog within 6 months while preserving regulatory compliance."},
    {term:"Client objective", cat:"Consulting Method", def:"The outcome the client cares about, written as a business decision or measurable target.", ex:"Stop backlog growth and protect regulatory reporting timelines."},
    {term:"Workplan", cat:"Consulting Method", def:"The sequence of analyses, interviews, data pulls, and deliverables needed to answer the case question.", ex:"Week 1 process map, week 2 data pull, week 3 pilot design, week 4 recommendation deck."},
    {term:"Root cause", cat:"Consulting Method", def:"The underlying driver that creates the visible symptom. Solving symptoms without root cause usually fails.", ex:"The symptom is backlog. The root cause may be duplicate entry plus weak triage, not just low headcount."},
    {term:"KPI", cat:"Consulting Method", def:"Key Performance Indicator, the metric used to track whether an operation is improving.", ex:"Backlog size, case cycle time, rework rate, and overdue follow-ups."},
    {term:"Leading metric", cat:"Consulting Method", def:"A metric that moves before the final outcome and helps predict it.", ex:"Daily intake completeness predicts future rework and cycle time."},
    {term:"Lagging metric", cat:"Consulting Method", def:"A metric that confirms what already happened.", ex:"Monthly backlog size confirms whether the system improved, but only after the fact."},
    {term:"Benchmarking", cat:"Consulting Method", def:"Comparing performance against another site, peer group, historical baseline, or standard to identify a gap.", ex:"Site A converts 8 percent of patients while Sites B and C convert 30 percent."},
    {term:"Operating model", cat:"Consulting Method", def:"How work gets done: roles, responsibilities, process flow, governance, metrics, and tools.", ex:"A safety operating model defines who triages cases, who codes them, who follows up, and who escalates overdue reports."},
    {term:"RACI", cat:"Consulting Method", def:"A responsibility matrix: Responsible, Accountable, Consulted, Informed. It prevents role confusion.", ex:"Safety associate is Responsible for coding, safety lead is Accountable for quality release."},
    {term:"Stakeholder map", cat:"Consulting Method", def:"A view of who is affected, who decides, who influences, and who may resist change.", ex:"Drug safety, regulatory affairs, clinical operations, quality, IT validation, and medical affairs all touch safety workflow."},
    {term:"Change management", cat:"Consulting Method", def:"The actions that help people adopt a new process or system: communication, training, champions, governance, and feedback loops.", ex:"Piloting a new triage workflow with two products before rolling it across the portfolio."},
    {term:"Implementation roadmap", cat:"Consulting Method", def:"A phased plan showing what happens when, who owns it, and what decision gates control the next phase.", ex:"Discovery, pilot, standardize, validate, rollout, measure."},
    {term:"Risk and mitigation", cat:"Consulting Method", def:"A credible plan names what could go wrong and what you will do to reduce that risk.", ex:"Risk: adoption failure. Mitigation: train super-users and track compliance weekly."},
    {term:"Decision gate", cat:"Consulting Method", def:"A point where the team decides whether to continue, change, or stop based on evidence.", ex:"Scale safety-system standardization only if the workflow pilot reduces rework."},
    {term:"Executive summary", cat:"Communication", def:"A short, answer-first page that gives the recommendation, evidence, impact, and next steps.", ex:"Pilot workflow redesign now, decide on system rollout after 4 weeks of data."},
    {term:"Recommendation slide", cat:"Communication", def:"The slide that states what the client should do and why, usually at the start of the deck.", ex:"Do not start with big-bang rollout. Pilot the workflow, then scale the system path."},
    {term:"Appendix", cat:"Communication", def:"Backup detail that supports the story but would distract from the main recommendation if placed up front.", ex:"Full assumption table, interview notes, and detailed process map."},
    {term:"Clinical operations", cat:"Veeva Domain", def:"The function that plans and runs clinical trials, including sites, milestones, enrollment, monitoring, and trial documents.", ex:"A slow site-activation process is a clinical-operations issue."},
    {term:"Protocol", cat:"Veeva Domain", def:"The clinical-trial plan that defines objectives, endpoints, eligibility, procedures, visits, and analysis.", ex:"Strict eligibility criteria can reduce screen-to-enroll conversion."},
    {term:"Enrollment funnel", cat:"Veeva Domain", def:"The movement from potential patient to screened patient to enrolled participant.", ex:"Active sites times screened patients per site times conversion rate."},
    {term:"Site activation", cat:"Veeva Domain", def:"The work needed before a trial site can enroll patients: contracting, regulatory documents, training, and system access.", ex:"If many sites are selected but not active, site activation is the bottleneck."},
    {term:"CTMS", cat:"Veeva Domain", def:"Clinical Trial Management System, used to manage trial operations, milestones, sites, monitoring, and study activity.", ex:"Vault CTMS tracks which sites are active and where monitoring is delayed."},
    {term:"eTMF", cat:"Veeva Domain", def:"Electronic Trial Master File, the required document repository proving the trial was conducted properly.", ex:"Missing informed-consent or site-training documents create inspection risk."},
    {term:"RIM", cat:"Veeva Domain", def:"Regulatory Information Management, the system and process for managing submissions, registrations, commitments, and health-authority interactions.", ex:"Vault RIM supports submission planning and eCTD publishing."},
    {term:"QMS", cat:"Veeva Domain", def:"Quality Management System, the process and tools for deviations, CAPAs, change control, controlled documents, and training.", ex:"A late safety report may trigger a deviation and CAPA."},
    {term:"CAPA", cat:"Regulatory", def:"Corrective and Preventive Action. Corrective action addresses an existing nonconformity and prevents its recurrence. Preventive action addresses a potential issue before it ever occurs.", ex:"Corrective: clear overdue cases. Preventive: standardize intake and triage rules."},
    {term:"Deviation", cat:"Regulatory", def:"A departure from an approved procedure, requirement, or expected process that must be documented and assessed.", ex:"Missing a regulatory safety-reporting timeline may be logged as a deviation."},
    {term:"ICSR", cat:"Regulatory", def:"Individual Case Safety Report, the structured report for one adverse-event case.", ex:"A serious unexpected adverse reaction becomes an ICSR with required reporting timelines."},
    {term:"E2B", cat:"Regulatory", def:"The ICH electronic standard for transmitting individual safety case reports between companies and regulators.", ex:"A safety system may generate E2B files for regulatory submission."},
    {term:"Seriousness", cat:"Regulatory", def:"A safety classification based on outcomes such as death, life-threatening event, hospitalization, disability, congenital anomaly, or other medically important condition.", ex:"A serious case needs faster triage and regulatory attention."},
    {term:"Expectedness", cat:"Regulatory", def:"Whether an adverse event is already described in the product's reference safety information or labeling.", ex:"A serious unexpected event may trigger expedited reporting."},
    {term:"Signal detection", cat:"Regulatory", def:"The process of identifying patterns in safety data that may suggest a new or changed risk.", ex:"A cluster of similar MedDRA-coded events can become a signal for review."},
    {term:"Aggregate safety report", cat:"Regulatory", def:"A periodic report evaluating safety and benefit-risk across cases and time, such as the PSUR or PBRER (Periodic Benefit-Risk Evaluation Report).", ex:"Case-level ICSR data rolls up into aggregate safety reporting."},
    {term:"Computer system validation", cat:"Regulatory", def:"Documented evidence that a regulated software system performs as intended and stays controlled over time.", ex:"A new safety workflow must be validated before regulated use."},
    {term:"Audit trail", cat:"Regulatory", def:"A secure record of who did what, when, and why in a regulated system.", ex:"Part 11 compliance depends on complete audit trails and controlled e-signatures."},
    {term:"Role-based access", cat:"Regulatory", def:"System permissions assigned by job role so users can only perform appropriate actions.", ex:"A case processor can code events, while a safety lead can medically review and approve."},
    {term:"SOP", cat:"Regulatory", def:"Standard Operating Procedure, the controlled document that defines how regulated work must be performed.", ex:"The safety-case intake SOP defines required fields, triage rules, and escalation timing."}
